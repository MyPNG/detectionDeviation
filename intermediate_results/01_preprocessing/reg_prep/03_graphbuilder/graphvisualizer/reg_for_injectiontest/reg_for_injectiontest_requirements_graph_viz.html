 data breach;"}, {"color": "#2B6CB0", "id": "REG-165", "label": "REG-165", "shape": "dot", "size": 20, "title": "id: REG-165\narticle: 33\nnode_type: Provision\nparagraph: 3(d)\nsystem_name: Art33(3(d))\ntext: The notification referred to in paragraph 1 shall at least: (d) describe the measures taken or proposed to be taken by the controller to address the personal data breach, including, where appropriate, measures to mitigate its possible adverse effects."}, {"color": "#2B6CB0", "id": "REG-166", "label": "REG-166", "shape": "dot", "size": 20, "title": "id: REG-166\narticle: 33\nnode_type: Provision\nparagraph: 4\nsystem_name: Art33(4)\ntext: Where, and in so far as, it is not possible to provide the information at the same time, the information may be provided in phases without undue further delay."}, {"color": "#2B6CB0", "id": "REG-167", "label": "REG-167", "shape": "dot", "size": 20, "title": "id: REG-167\narticle: 33\nnode_type: Provision\nparagraph: 5\nsystem_name: Art33(5)\ntext: The controller shall document any personal data breaches, comprising the facts relating to the personal data breach, its effects and the remedial action taken."}, {"color": "#2B6CB0", "id": "REG-168", "label": "REG-168", "shape": "dot", "size": 20, "title": "id: REG-168\narticle: 33\nnode_type: Provision\nparagraph: 5\nsystem_name: Art33(5)\ntext: That documentation shall enable the supervisory authority to verify compliance with this Article."}, {"color": "#2B6CB0", "id": "REG-169", "label": "REG-169", "shape": "dot", "size": 20, "title": "id: REG-169\narticle: 34\nnode_type: Provision\nparagraph: 1\nsystem_name: Art34(1)\ntext: When the personal data breach is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall communicate the personal data breach to the data subject without undue delay."}, {"color": "#C53030", "id": "Art34", "label": "Art34", "shape": "dot", "size": 28, "title": "id: Art34\narticle_number: 34\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-170", "label": "REG-170", "shape": "dot", "size": 20, "title": "id: REG-170\narticle: 34\nnode_type: Provision\nparagraph: 2\nsystem_name: Art34(2)\ntext: The communication to the data subject referred to in paragraph 1 of this Article shall describe in clear and plain language the nature of the personal data breach and contain at least the information and measures referred to in points (b), (c) and (d) of Article 33(3)."}, {"color": "#2B6CB0", "id": "REG-171", "label": "REG-171", "shape": "dot", "size": 20, "title": "id: REG-171\narticle: 34\nnode_type: Provision\nparagraph: 3\nsystem_name: Art34(3)\ntext: The communication to the data subject referred to in paragraph 1 shall not be required if any of the following conditions are met:"}, {"color": "#2B6CB0", "id": "REG-172", "label": "REG-172", "shape": "dot", "size": 20, "title": "id: REG-172\narticle: 34\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art34(3(a))\ntext: The communication to the data subject referred to in paragraph 1 shall not be required if any of the following conditions are met: (a) the controller has implemented appropriate technical and organisational protection measures, and those measures were applied to the personal data affected by the personal data breach, in particular those that render the personal data unintelligible to any person who is not authorised to access it, such as encryption;"}, {"color": "#2B6CB0", "id": "REG-173", "label": "REG-173", "shape": "dot", "size": 20, "title": "id: REG-173\narticle: 34\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art34(3(b))\ntext: The communication to the data subject referred to in paragraph 1 shall not be required if any of the following conditions are met: (b) the controller has taken subsequent measures which ensure that the high risk to the rights and freedoms of data subjects referred to in paragraph 1 is no longer likely to materialise;"}, {"color": "#2B6CB0", "id": "REG-174", "label": "REG-174", "shape": "dot", "size": 20, "title": "id: REG-174\narticle: 34\nnode_type: Provision\nparagraph: 3(c)\nsystem_name: Art34(3(c))\ntext: The communication to the data subject referred to in paragraph 1 shall not be required if any of the following conditions are met: (c) it would involve disproportionate effort."}, {"color": "#2B6CB0", "id": "REG-175", "label": "REG-175", "shape": "dot", "size": 20, "title": "id: REG-175\narticle: 34\nnode_type: Provision\nparagraph: 3(c)\nsystem_name: Art34(3(c))\ntext: In such a case, there shall instead be a public communication or similar measure whereby the data subjects are informed in an equally effective manner."}, {"color": "#2B6CB0", "id": "REG-176", "label": "REG-176", "shape": "dot", "size": 20, "title": "id: REG-176\narticle: 34\nnode_type: Provision\nparagraph: 4\nsystem_name: Art34(4)\ntext: If the controller has not already communicated the personal data breach to the data subject, the supervisory authority, having considered the likelihood of the personal data breach resulting in a high risk, may require it to do so"}, {"color": "#2B6CB0", "id": "REG-177", "label": "REG-177", "shape": "dot", "size": 20, "title": "id: REG-177\narticle: 34\nnode_type: Provision\nparagraph: 4\nsystem_name: Art34(4)\ntext: or may decide that any of the conditions referred to in paragraph 3 are met."}, {"color": "#2B6CB0", "id": "REG-178", "label": "REG-178", "shape": "dot", "size": 20, "title": "id: REG-178\narticle: 40\nnode_type: Provision\nparagraph: 1\nsystem_name: Art40(1)\ntext: The Member States, the supervisory authorities, the Board and the Commission shall encourage the drawing up of codes of conduct intended to contribute to the proper application of this Regulation, taking account of the specific features of the various processing sectors and the specific needs of micro, small and medium-sized enterprises."}, {"color": "#C53030", "id": "Art40", "label": "Art40", "shape": "dot", "size": 28, "title": "id: Art40\narticle_number: 40\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-179", "label": "REG-179", "shape": "dot", "size": 20, "title": "id: REG-179\narticle: 40\nnode_type: Provision\nparagraph: 2\nsystem_name: Art40(2)\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to:"}, {"color": "#2B6CB0", "id": "REG-180", "label": "REG-180", "shape": "dot", "size": 20, "title": "id: REG-180\narticle: 40\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art40(2(a))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (a) fair and transparent processing;"}, {"color": "#2B6CB0", "id": "REG-181", "label": "REG-181", "shape": "dot", "size": 20, "title": "id: REG-181\narticle: 40\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art40(2(b))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (b) the legitimate interests pursued by controllers in specific contexts;"}, {"color": "#2B6CB0", "id": "REG-182", "label": "REG-182", "shape": "dot", "size": 20, "title": "id: REG-182\narticle: 40\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art40(2(c))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (c) the collection of personal data;"}, {"color": "#2B6CB0", "id": "REG-183", "label": "REG-183", "shape": "dot", "size": 20, "title": "id: REG-183\narticle: 40\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art40(2(d))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (d) the pseudonymisation of personal data;"}, {"color": "#2B6CB0", "id": "REG-184", "label": "REG-184", "shape": "dot", "size": 20, "title": "id: REG-184\narticle: 40\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art40(2(e))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (e) the information provided to the public and to data subjects;"}, {"color": "#2B6CB0", "id": "REG-185", "label": "REG-185", "shape": "dot", "size": 20, "title": "id: REG-185\narticle: 40\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art40(2(f))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (f) the exercise of the rights of data subjects;"}, {"color": "#2B6CB0", "id": "REG-186", "label": "REG-186", "shape": "dot", "size": 20, "title": "id: REG-186\narticle: 40\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art40(2(g))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (g) the information provided to, and the protection of, children, and the manner in which the consent of the holders of parental responsibility over children is to be obtained;"}, {"color": "#2B6CB0", "id": "REG-187", "label": "REG-187", "shape": "dot", "size": 20, "title": "id: REG-187\narticle: 40\nnode_type: Provision\nparagraph: 2(h)\nsystem_name: Art40(2(h))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (h) the measures and procedures referred to in Articles 24 and 25 and the measures to ensure security of processing referred to in Article 32;"}, {"color": "#2B6CB0", "id": "REG-188", "label": "REG-188", "shape": "dot", "size": 20, "title": "id: REG-188\narticle: 40\nnode_type: Provision\nparagraph: 2(i)\nsystem_name: Art40(2(i))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (i) the notification of personal data breaches to supervisory authorities and the communication of such personal data breaches to data subjects;"}, {"color": "#2B6CB0", "id": "REG-189", "label": "REG-189", "shape": "dot", "size": 20, "title": "id: REG-189\narticle: 40\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art40(2(j))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (j) the transfer of personal data to third countries or international organisations; or"}, {"color": "#2B6CB0", "id": "REG-190", "label": "REG-190", "shape": "dot", "size": 20, "title": "id: REG-190\narticle: 40\nnode_type: Provision\nparagraph: 2(k)\nsystem_name: Art40(2(k))\ntext: Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to: (k) out-of-court proceedings and other dispute resolution procedures for resolving disputes between controllers and data subjects with regard to processing, without prejudice to the rights of data subjects pursuant to Articles 77 and 79."}, {"color": "#2B6CB0", "id": "REG-191", "label": "REG-191", "shape": "dot", "size": 20, "title": "id: REG-191\narticle: 40\nnode_type: Provision\nparagraph: 3\nsystem_name: Art40(3)\ntext: In addition to adherence by controllers or processors subject to this Regulation, codes of conduct approved pursuant to paragraph 5 of this Article and having general validity pursuant to paragraph 9 of this Article may also be adhered to by controllers or processors that are not subject to this Regulation pursuant to Article 3 in order to provide appropriate safeguards within the framework of personal data transfers to third countries or international organisations under the terms referred to in point (e) of Article 46(2)."}, {"color": "#2B6CB0", "id": "REG-192", "label": "REG-192", "shape": "dot", "size": 20, "title": "id: REG-192\narticle: 40\nnode_type: Provision\nparagraph: 3\nsystem_name: Art40(3)\ntext: Such controllers or processors shall make binding and enforceable commitments, via contractual or other legally binding instruments, to apply those appropriate safeguards including with regard to the rights of data subjects."}, {"color": "#2B6CB0", "id": "REG-193", "label": "REG-193", "shape": "dot", "size": 20, "title": "id: REG-193\narticle: 40\nnode_type: Provision\nparagraph: 4\nsystem_name: Art40(4)\ntext: A code of conduct referred to in paragraph 2 of this Article shall contain mechanisms which enable the body referred to in Article 41(1) to carry out the mandatory monitoring of compliance with its provisions by the controllers or processors which undertake to apply it, without prejudice to the tasks and powers of supervisory authorities competent pursuant to Article 55 or 56."}, {"color": "#2B6CB0", "id": "REG-194", "label": "REG-194", "shape": "dot", "size": 20, "title": "id: REG-194\narticle: 40\nnode_type: Provision\nparagraph: 5\nsystem_name: Art40(5)\ntext: Associations and other bodies referred to in paragraph 2 of this Article which intend to prepare a code of conduct or to amend or extend an existing code shall submit the draft code, amendment or extension to the supervisory authority which is competent pursuant to Article 55."}, {"color": "#2B6CB0", "id": "REG-195", "label": "REG-195", "shape": "dot", "size": 20, "title": "id: REG-195\narticle: 40\nnode_type: Provision\nparagraph: 5\nsystem_name: Art40(5)\ntext: The supervisory authority shall provide an opinion on whether the draft code, amendment or extension complies with this Regulation"}, {"color": "#2B6CB0", "id": "REG-196", "label": "REG-196", "shape": "dot", "size": 20, "title": "id: REG-196\narticle: 40\nnode_type: Provision\nparagraph: 5\nsystem_name: Art40(5)\ntext: and shall approve that draft code, amendment or extension if it finds that it provides sufficient appropriate safeguards."}, {"color": "#2B6CB0", "id": "REG-197", "label": "REG-197", "shape": "dot", "size": 20, "title": "id: REG-197\narticle: 40\nnode_type: Provision\nparagraph: 6\nsystem_name: Art40(6)\ntext: Where the draft code, or amendment or extension is approved in accordance with paragraph 5, and where the code of conduct concerned does not relate to processing activities in several Member States, the supervisory authority shall register and publish the code."}, {"color": "#2B6CB0", "id": "REG-198", "label": "REG-198", "shape": "dot", "size": 20, "title": "id: REG-198\narticle: 40\nnode_type: Provision\nparagraph: 7\nsystem_name: Art40(7)\ntext: Where a draft code of conduct relates to processing activities in several Member States, the supervisory authority which is competent pursuant to Article 55 shall, before approving the draft code, amendment or extension, submit it in the procedure referred to in Article 63 to the Board which shall provide an opinion on whether the draft code, amendment or extension complies with this Regulation or, in the situation referred to in paragraph 3 of this Article, provides appropriate safeguards."}, {"color": "#2B6CB0", "id": "REG-199", "label": "REG-199", "shape": "dot", "size": 20, "title": "id: REG-199\narticle: 40\nnode_type: Provision\nparagraph: 8\nsystem_name: Art40(8)\ntext: Where the opinion referred to in paragraph 7 confirms that the draft code, amendment or extension complies with this Regulation, or, in the situation referred to in paragraph 3, provides appropriate safeguards, the Board shall submit its opinion to the Commission."}, {"color": "#2B6CB0", "id": "REG-200", "label": "REG-200", "shape": "dot", "size": 20, "title": "id: REG-200\narticle: 40\nnode_type: Provision\nparagraph: 9\nsystem_name: Art40(9)\ntext: The Commission may, by way of implementing acts, decide that the approved code of conduct, amendment or extension submitted to it pursuant to paragraph 8 of this Article have general validity within the Union."}, {"color": "#2B6CB0", "id": "REG-201", "label": "REG-201", "shape": "dot", "size": 20, "title": "id: REG-201\narticle: 40\nnode_type: Provision\nparagraph: 9\nsystem_name: Art40(9)\ntext: Those implementing acts shall be adopted in accordance with the examination procedure set out in Article 93(2)."}, {"color": "#2B6CB0", "id": "REG-202", "label": "REG-202", "shape": "dot", "size": 20, "title": "id: REG-202\narticle: 40\nnode_type: Provision\nparagraph: 10\nsystem_name: Art40(10)\ntext: The Commission shall ensure appropriate publicity for the approved codes which have been decided as having general validity in accordance with paragraph 9."}, {"color": "#2B6CB0", "id": "REG-203", "label": "REG-203", "shape": "dot", "size": 20, "title": "id: REG-203\narticle: 40\nnode_type: Provision\nparagraph: 11\nsystem_name: Art40(11)\ntext: The Board shall collate all approved codes of conduct, amendments and extensions in a register"}, {"color": "#2B6CB0", "id": "REG-204", "label": "REG-204", "shape": "dot", "size": 20, "title": "id: REG-204\narticle: 40\nnode_type: Provision\nparagraph: 11\nsystem_name: Art40(11)\ntext: and shall make them publicly available by way of appropriate means."}, {"color": "#2B6CB0", "id": "REG-205", "label": "REG-205", "shape": "dot", "size": 20, "title": "id: REG-205\narticle: 42\nnode_type: Provision\nparagraph: 1\nsystem_name: Art42(1)\ntext: The Member States, the supervisory authorities, the Board and the Commission shall encourage, in particular at Union level, the establishment of data protection certification mechanisms and of data protection seals and marks, for the purpose of demonstrating compliance with this Regulation of processing operations by controllers and processors."}, {"color": "#C53030", "id": "Art42", "label": "Art42", "shape": "dot", "size": 28, "title": "id: Art42\narticle_number: 42\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-206", "label": "REG-206", "shape": "dot", "size": 20, "title": "id: REG-206\narticle: 42\nnode_type: Provision\nparagraph: 1\nsystem_name: Art42(1)\ntext: The specific needs of micro, small and medium-sized enterprises shall be taken into account."}, {"color": "#2B6CB0", "id": "REG-207", "label": "REG-207", "shape": "dot", "size": 20, "title": "id: REG-207\narticle: 42\nnode_type: Provision\nparagraph: 2\nsystem_name: Art42(2)\ntext: In addition to adherence by controllers or processors subject to this Regulation, data protection certification mechanisms, seals or marks approved pursuant to paragraph 5 of this Article may be established for the purpose of demonstrating the existence of appropriate safeguards provided by controllers or processors that are not subject to this Regulation pursuant to Article 3 within the framework of personal data transfers to third countries or international organisations under the terms referred to in point (f) of Article 46(2)."}, {"color": "#2B6CB0", "id": "REG-208", "label": "REG-208", "shape": "dot", "size": 20, "title": "id: REG-208\narticle: 42\nnode_type: Provision\nparagraph: 2\nsystem_name: Art42(2)\ntext: Such controllers or processors shall make binding and enforceable commitments, via contractual or other legally binding instruments, to apply those appropriate safeguards, including with regard to the rights of data subjects."}, {"color": "#2B6CB0", "id": "REG-209", "label": "REG-209", "shape": "dot", "size": 20, "title": "id: REG-209\narticle: 42\nnode_type: Provision\nparagraph: 3\nsystem_name: Art42(3)\ntext: The certification shall be voluntary and available via a process that is transparent."}, {"color": "#2B6CB0", "id": "REG-210", "label": "REG-210", "shape": "dot", "size": 20, "title": "id: REG-210\narticle: 42\nnode_type: Provision\nparagraph: 4\nsystem_name: Art42(4)\ntext: A certification pursuant to this Article does not reduce the responsibility of the controller or the processor for compliance with this Regulation and is without prejudice to the tasks and powers of the supervisory authorities which are competent pursuant to Article 55 or 56."}, {"color": "#2B6CB0", "id": "REG-211", "label": "REG-211", "shape": "dot", "size": 20, "title": "id: REG-211\narticle: 42\nnode_type: Provision\nparagraph: 5\nsystem_name: Art42(5)\ntext: A certification pursuant to this Article shall be issued by the certification bodies referred to in Article 43 or by the competent supervisory authority, on the basis of criteria approved by that competent supervisory authority pursuant to Article 58(3) or by the Board pursuant to Article 63."}, {"color": "#2B6CB0", "id": "REG-212", "label": "REG-212", "shape": "dot", "size": 20, "title": "id: REG-212\narticle: 42\nnode_type: Provision\nparagraph: 5\nsystem_name: Art42(5)\ntext: Where the criteria are approved by the Board, this may result in a common certification, the European Data Protection Seal."}, {"color": "#2B6CB0", "id": "REG-213", "label": "REG-213", "shape": "dot", "size": 20, "title": "id: REG-213\narticle: 42\nnode_type: Provision\nparagraph: 6\nsystem_name: Art42(6)\ntext: The controller or processor which submits its processing to the certification mechanism shall provide the certifi cation body referred to in Article 43, or where applicable, the competent supervisory authority, with all information and access to its processing activities which are necessary to conduct the certification procedure."}, {"color": "#2B6CB0", "id": "REG-214", "label": "REG-214", "shape": "dot", "size": 20, "title": "id: REG-214\narticle: 42\nnode_type: Provision\nparagraph: 7\nsystem_name: Art42(7)\ntext: Certification shall be issued to a controller or processor for a maximum period of three years"}, {"color": "#2B6CB0", "id": "REG-215", "label": "REG-215", "shape": "dot", "size": 20, "title": "id: REG-215\narticle: 42\nnode_type: Provision\nparagraph: 7\nsystem_name: Art42(7)\ntext: and may be renewed, under the same conditions, provided that the relevant requirements continue to be met."}, {"color": "#2B6CB0", "id": "REG-216", "label": "REG-216", "shape": "dot", "size": 20, "title": "id: REG-216\narticle: 42\nnode_type: Provision\nparagraph: 7\nsystem_name: Art42(7)\ntext: Certification shall be withdrawn, as applicable, by the certification bodies referred to in Article 43 or by the competent supervisory authority where the requirements for the certification are not or are no longer met."}, {"color": "#2B6CB0", "id": "REG-217", "label": "REG-217", "shape": "dot", "size": 20, "title": "id: REG-217\narticle: 42\nnode_type: Provision\nparagraph: 8\nsystem_name: Art42(8)\ntext: The Board shall collate all certification mechanisms and data protection seals"}, {"color": "#2B6CB0", "id": "REG-218", "label": "REG-218", "shape": "dot", "size": 20, "title": "id: REG-218\narticle: 42\nnode_type: Provision\nparagraph: 8\nsystem_name: Art42(8)\ntext: and marks in a register and shall make them publicly available by any appropriate means."}, {"color": "#2B6CB0", "id": "REG-219", "label": "REG-219", "shape": "dot", "size": 20, "title": "id: REG-219\narticle: 45\nnode_type: Provision\nparagraph: 1\nsystem_name: Art45(1)\ntext: A transfer of personal data to a third country or an international organisation may take place where the Commission has decided that the third country, a territory or one or more specified sectors within that third country, or the international organisation in question ensures an adequate level of protection."}, {"color": "#C53030", "id": "Art45", "label": "Art45", "shape": "dot", "size": 28, "title": "id: Art45\narticle_number: 45\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-220", "label": "REG-220", "shape": "dot", "size": 20, "title": "id: REG-220\narticle: 45\nnode_type: Provision\nparagraph: 1\nsystem_name: Art45(1)\ntext: Such a transfer shall not require any specific authorisation."}, {"color": "#2B6CB0", "id": "REG-221", "label": "REG-221", "shape": "dot", "size": 20, "title": "id: REG-221\narticle: 45\nnode_type: Provision\nparagraph: 2\nsystem_name: Art45(2)\ntext: When assessing the adequacy of the level of protection, the Commission shall, in particular, take account of the following elements:"}, {"color": "#2B6CB0", "id": "REG-222", "label": "REG-222", "shape": "dot", "size": 20, "title": "id: REG-222\narticle: 45\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art45(2(a))\ntext: When assessing the adequacy of the level of protection, the Commission shall, in particular, take account of the following elements: (a) the rule of law, respect for human rights and fundamental freedoms, relevant legislation, both general and sectoral, including concerning public security, defence, national security and criminal law and the access of public authorities to personal data, as well as the implementation of such legislation, data protection rules, professional rules and security measures, including rules for the onward transfer of personal data to another third country or international organisation which are complied with in that country or international organisation, case-law, as well as effective and enforceable data subject rights and effective administrative and judicial redress for the data subjects whose personal data are being transferred;"}, {"color": "#2B6CB0", "id": "REG-223", "label": "REG-223", "shape": "dot", "size": 20, "title": "id: REG-223\narticle: 45\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art45(2(b))\ntext: When assessing the adequacy of the level of protection, the Commission shall, in particular, take account of the following elements: (b) the existence and effective functioning of one or more independent supervisory authorities in the third country or to which an international organisation is subject, with responsibility for ensuring and enforcing compliance with the data protection rules, including adequate enforcement powers, for assisting and advising the data subjects in exercising their rights and for cooperation with the supervisory authorities of the Member States; and"}, {"color": "#2B6CB0", "id": "REG-224", "label": "REG-224", "shape": "dot", "size": 20, "title": "id: REG-224\narticle: 45\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art45(2(c))\ntext: When assessing the adequacy of the level of protection, the Commission shall, in particular, take account of the following elements: (c) the international commitments the third country or international organisation concerned has entered into, or other obligations arising from legally binding conventions or instruments as well as from its participation in multilateral or regional systems, in particular in relation to the protection of personal data."}, {"color": "#2B6CB0", "id": "REG-225", "label": "REG-225", "shape": "dot", "size": 20, "title": "id: REG-225\narticle: 45\nnode_type: Provision\nparagraph: 3\nsystem_name: Art45(3)\ntext: The Commission, after assessing the adequacy of the level of protection, may decide, by means of implementing act, that a third country, a territory or one or more specified sectors within a third country, or an international organisation ensures an adequate level of protection within the meaning of paragraph 2 of this Article."}, {"color": "#2B6CB0", "id": "REG-226", "label": "REG-226", "shape": "dot", "size": 20, "title": "id: REG-226\narticle: 45\nnode_type: Provision\nparagraph: 3\nsystem_name: Art45(3)\ntext: The implementing act shall provide for a mechanism for a periodic review, at least every four years, which shall take into account all relevant developments in the third country or international organisation."}, {"color": "#2B6CB0", "id": "REG-227", "label": "REG-227", "shape": "dot", "size": 20, "title": "id: REG-227\narticle: 45\nnode_type: Provision\nparagraph: 3\nsystem_name: Art45(3)\ntext: The implementing act shall specify its territorial and sectoral application and, where applicable, identify the supervisory authority or authorities referred to in point (b) of paragraph 2 of this Article."}, {"color": "#2B6CB0", "id": "REG-228", "label": "REG-228", "shape": "dot", "size": 20, "title": "id: REG-228\narticle: 45\nnode_type: Provision\nparagraph: 3\nsystem_name: Art45(3)\ntext: The implementing act shall be adopted in accordance with the examination procedure referred to in Article 93(2)."}, {"color": "#2B6CB0", "id": "REG-229", "label": "REG-229", "shape": "dot", "size": 20, "title": "id: REG-229\narticle: 45\nnode_type: Provision\nparagraph: 4\nsystem_name: Art45(4)\ntext: The Commission shall, on an ongoing basis, monitor developments in third countries and international organ isations that could affect the functioning of decisions adopted pursuant to paragraph 3 of this Article and decisions adopted on the basis of Article 25(6) of Directive 95/46/EC."}, {"color": "#2B6CB0", "id": "REG-230", "label": "REG-230", "shape": "dot", "size": 20, "title": "id: REG-230\narticle: 45\nnode_type: Provision\nparagraph: 5\nsystem_name: Art45(5)\ntext: The Commission shall, where available information reveals, in particular following the review referred to in paragraph 3 of this Article, that a third country, a territory or one or more specified sectors within a third country, or an international organisation no longer ensures an adequate level of protection within the meaning of paragraph 2 of this Article, to the extent necessary, repeal, amend or suspend the decision referred to in paragraph 3 of this Article by means of implementing acts without retro-active effect. On duly justified imperative grounds of urgency, the Commission shall adopt immediately applicable implementing acts in accordance with the procedure referred to in Article 93(3)."}, {"color": "#2B6CB0", "id": "REG-231", "label": "REG-231", "shape": "dot", "size": 20, "title": "id: REG-231\narticle: 45\nnode_type: Provision\nparagraph: 5\nsystem_name: Art45(5)\ntext: Those implementing acts shall be adopted in accordance with the examination procedure referred to in Article 93(2)."}, {"color": "#2B6CB0", "id": "REG-232", "label": "REG-232", "shape": "dot", "size": 20, "title": "id: REG-232\narticle: 45\nnode_type: Provision\nparagraph: 6\nsystem_name: Art45(6)\ntext: The Commission shall enter into consultations with the third country or international organisation with a view to remedying the situation giving rise to the decision made pursuant to paragraph 5."}, {"color": "#2B6CB0", "id": "REG-233", "label": "REG-233", "shape": "dot", "size": 20, "title": "id: REG-233\narticle: 45\nnode_type: Provision\nparagraph: 7\nsystem_name: Art45(7)\ntext: A decision pursuant to paragraph 5 of this Article is without prejudice to transfers of personal data to the third country, a territory or one or more specified sectors within that third country, or the international organisation in question pursuant to Articles 46 to 49."}, {"color": "#2B6CB0", "id": "REG-234", "label": "REG-234", "shape": "dot", "size": 20, "title": "id: REG-234\narticle: 45\nnode_type: Provision\nparagraph: 8\nsystem_name: Art45(8)\ntext: The Commission shall publish in the Official Journal of the European Union and on its website a list of the third countries, territories and specified sectors within a third country and international organisations for which it has decided that an adequate level of protection is or is no longer ensured."}, {"color": "#2B6CB0", "id": "REG-235", "label": "REG-235", "shape": "dot", "size": 20, "title": "id: REG-235\narticle: 45\nnode_type: Provision\nparagraph: 9\nsystem_name: Art45(9)\ntext: Decisions adopted by the Commission on the basis of Article 25(6) of Directive 95/46/EC shall remain in force until amended, replaced or repealed by a Commission Decision adopted in accordance with paragraph 3 or 5 of this Article."}, {"color": "#2B6CB0", "id": "REG-236", "label": "REG-236", "shape": "dot", "size": 20, "title": "id: REG-236\narticle: 46\nnode_type: Provision\nparagraph: 1\nsystem_name: Art46(1)\ntext: In the absence of a decision pursuant to Article 45(3), a controller or processor may transfer personal data to a third country or an international organisation only if the controller or processor has provided appropriate safeguards, and on condition that enforceable data subject rights and effective legal remedies for data subjects are available."}, {"color": "#C53030", "id": "Art46", "label": "Art46", "shape": "dot", "size": 28, "title": "id: Art46\narticle_number: 46\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-237", "label": "REG-237", "shape": "dot", "size": 20, "title": "id: REG-237\narticle: 46\nnode_type: Provision\nparagraph: 2\nsystem_name: Art46(2)\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by:"}, {"color": "#2B6CB0", "id": "REG-238", "label": "REG-238", "shape": "dot", "size": 20, "title": "id: REG-238\narticle: 46\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art46(2(a))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (a) a legally binding and enforceable instrument between public authorities or bodies;"}, {"color": "#2B6CB0", "id": "REG-239", "label": "REG-239", "shape": "dot", "size": 20, "title": "id: REG-239\narticle: 46\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art46(2(b))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (b) binding corporate rules in accordance with Article 47;"}, {"color": "#2B6CB0", "id": "REG-240", "label": "REG-240", "shape": "dot", "size": 20, "title": "id: REG-240\narticle: 46\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art46(2(c))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (c) standard data protection clauses adopted by the Commission in accordance with the examination procedure referred to in Article 93(2);"}, {"color": "#2B6CB0", "id": "REG-241", "label": "REG-241", "shape": "dot", "size": 20, "title": "id: REG-241\narticle: 46\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art46(2(d))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (d) standard data protection clauses adopted by a supervisory authority and approved by the Commission pursuant to the examination procedure referred to in Article 93(2);"}, {"color": "#2B6CB0", "id": "REG-242", "label": "REG-242", "shape": "dot", "size": 20, "title": "id: REG-242\narticle: 46\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art46(2(e))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (e) an approved code of conduct pursuant to Article 40 together with binding and enforceable commitments of the controller or processor in the third country to apply the appropriate safeguards, including as regards data subjects\u0027 rights; or"}, {"color": "#2B6CB0", "id": "REG-243", "label": "REG-243", "shape": "dot", "size": 20, "title": "id: REG-243\narticle: 46\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art46(2(f))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (f) an approved certification mechanism pursuant to Article 42 together with binding and enforceable commitments of the controller or processor in the third country to apply the appropriate safeguards, including as regards data subjects\u0027 rights."}, {"color": "#2B6CB0", "id": "REG-244", "label": "REG-244", "shape": "dot", "size": 20, "title": "id: REG-244\narticle: 46\nnode_type: Provision\nparagraph: 3\nsystem_name: Art46(3)\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by:"}, {"color": "#2B6CB0", "id": "REG-245", "label": "REG-245", "shape": "dot", "size": 20, "title": "id: REG-245\narticle: 46\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art46(3(a))\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by: (a) contractual clauses between the controller or processor and the controller, processor or the recipient of the personal data in the third country or international organisation; or"}, {"color": "#2B6CB0", "id": "REG-246", "label": "REG-246", "shape": "dot", "size": 20, "title": "id: REG-246\narticle: 46\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art46(3(b))\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by: (b) provisions to be inserted into administrative arrangements between public authorities or bodies which include enforceable and effective data subject rights."}, {"color": "#2B6CB0", "id": "REG-247", "label": "REG-247", "shape": "dot", "size": 20, "title": "id: REG-247\narticle: 46\nnode_type: Provision\nparagraph: 4\nsystem_name: Art46(4)\ntext: The supervisory authority shall apply the consistency mechanism referred to in Article 63 in the cases referred to in paragraph 3 of this Article."}, {"color": "#2B6CB0", "id": "REG-248", "label": "REG-248", "shape": "dot", "size": 20, "title": "id: REG-248\narticle: 46\nnode_type: Provision\nparagraph: 5\nsystem_name: Art46(5)\ntext: Authorisations by a Member State or supervisory authority on the basis of Article 26(2) of Directive 95/46/EC shall remain valid until amended, replaced or repealed, if necessary, by that supervisory authority."}, {"color": "#2B6CB0", "id": "REG-249", "label": "REG-249", "shape": "dot", "size": 20, "title": "id: REG-249\narticle: 46\nnode_type: Provision\nparagraph: 5\nsystem_name: Art46(5)\ntext: Decisions adopted by the Commission on the basis of Article 26(4) of Directive 95/46/EC shall remain in force until amended, replaced or repealed, if necessary, by a Commission Decision adopted in accordance with paragraph 2 of this Article."}, {"color": "#2B6CB0", "id": "REG-250", "label": "REG-250", "shape": "dot", "size": 20, "title": "id: REG-250\narticle: 47\nnode_type: Provision\nparagraph: 1\nsystem_name: Art47(1)\ntext: The competent supervisory authority shall approve binding corporate rules in accordance with the consistency mechanism set out in Article 63, provided that they:"}, {"color": "#C53030", "id": "Art47", "label": "Art47", "shape": "dot", "size": 28, "title": "id: Art47\narticle_number: 47\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-251", "label": "REG-251", "shape": "dot", "size": 20, "title": "id: REG-251\narticle: 47\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art47(1(a))\ntext: The competent supervisory authority shall approve binding corporate rules in accordance with the consistency mechanism set out in Article 63, provided that they: (a) are legally binding and apply to and are enforced by every member concerned of the group of undertakings, or group of enterprises engaged in a joint economic activity, including their employees;"}, {"color": "#2B6CB0", "id": "REG-252", "label": "REG-252", "shape": "dot", "size": 20, "title": "id: REG-252\narticle: 47\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art47(1(b))\ntext: The competent supervisory authority shall approve binding corporate rules in accordance with the consistency mechanism set out in Article 63, provided that they: (b) expressly confer enforceable rights on data subjects with regard to the processing of their personal data; and"}, {"color": "#2B6CB0", "id": "REG-253", "label": "REG-253", "shape": "dot", "size": 20, "title": "id: REG-253\narticle: 47\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art47(1(c))\ntext: The competent supervisory authority shall approve binding corporate rules in accordance with the consistency mechanism set out in Article 63, provided that they: (c) fulfil the requirements laid down in paragraph 2."}, {"color": "#2B6CB0", "id": "REG-254", "label": "REG-254", "shape": "dot", "size": 20, "title": "id: REG-254\narticle: 47\nnode_type: Provision\nparagraph: 2\nsystem_name: Art47(2)\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least:"}, {"color": "#2B6CB0", "id": "REG-255", "label": "REG-255", "shape": "dot", "size": 20, "title": "id: REG-255\narticle: 47\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art47(2(a))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (a) the structure and contact details of the group of undertakings, or group of enterprises engaged in a joint economic activity and of each of its members;"}, {"color": "#2B6CB0", "id": "REG-256", "label": "REG-256", "shape": "dot", "size": 20, "title": "id: REG-256\narticle: 47\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art47(2(b))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (b) the data transfers or set of transfers, including the categories of personal data, the type of processing and its purposes, the type of data subjects affected and the identification of the third country or countries in question;"}, {"color": "#2B6CB0", "id": "REG-257", "label": "REG-257", "shape": "dot", "size": 20, "title": "id: REG-257\narticle: 47\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art47(2(c))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (c) their legally binding nature, both internally and externally;"}, {"color": "#2B6CB0", "id": "REG-258", "label": "REG-258", "shape": "dot", "size": 20, "title": "id: REG-258\narticle: 47\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art47(2(d))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (d) the application of the general data protection principles, in particular purpose limitation, data minimisation, limited storage periods, data quality, data protection by design and by default, legal basis for processing, processing of special categories of personal data, measures to ensure data security, and the requirements in respect of onward transfers to bodies not bound by the binding corporate rules;"}, {"color": "#2B6CB0", "id": "REG-259", "label": "REG-259", "shape": "dot", "size": 20, "title": "id: REG-259\narticle: 47\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art47(2(e))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (e) the rights of data subjects in regard to processing and the means to exercise those rights, including the right not to be subject to decisions based solely on automated processing, including profiling in accordance with Article 22, the right to lodge a complaint with the competent supervisory authority and before the competent courts of the Member States in accordance with Article 79, and to obtain redress and, where appropriate, compensation for a breach of the binding corporate rules;"}, {"color": "#2B6CB0", "id": "REG-260", "label": "REG-260", "shape": "dot", "size": 20, "title": "id: REG-260\narticle: 47\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art47(2(f))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (f) the acceptance by the controller or processor established on the territory of a Member State of liability for any breaches of the binding corporate rules by any member concerned not established in the Union"}, {"color": "#2B6CB0", "id": "REG-261", "label": "REG-261", "shape": "dot", "size": 20, "title": "id: REG-261\narticle: 47\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art47(2(f))\ntext: the controller or the processor shall be exempt from that liability, in whole or in part, only if it proves that that member is not responsible for the event giving rise to the damage;"}, {"color": "#2B6CB0", "id": "REG-262", "label": "REG-262", "shape": "dot", "size": 20, "title": "id: REG-262\narticle: 47\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art47(2(g))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (g) how the information on the binding corporate rules, in particular on the provisions referred to in points (d), (e) and (f) of this paragraph is provided to the data subjects in addition to Articles 13 and 14;"}, {"color": "#2B6CB0", "id": "REG-263", "label": "REG-263", "shape": "dot", "size": 20, "title": "id: REG-263\narticle: 47\nnode_type: Provision\nparagraph: 2(h)\nsystem_name: Art47(2(h))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (h) the tasks of any data protection officer designated in accordance with Article 37 or any other person or entity in charge of the monitoring compliance with the binding corporate rules within the group of undertakings, or group of enterprises engaged in a joint economic activity, as well as monitoring training and complaint-handling;"}, {"color": "#2B6CB0", "id": "REG-264", "label": "REG-264", "shape": "dot", "size": 20, "title": "id: REG-264\narticle: 47\nnode_type: Provision\nparagraph: 2(i)\nsystem_name: Art47(2(i))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (i) the complaint procedures;"}, {"color": "#2B6CB0", "id": "REG-265", "label": "REG-265", "shape": "dot", "size": 20, "title": "id: REG-265\narticle: 47\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art47(2(j))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (j) the mechanisms within the group of undertakings, or group of enterprises engaged in a joint economic activity for ensuring the verification of compliance with the binding corporate rules."}, {"color": "#2B6CB0", "id": "REG-266", "label": "REG-266", "shape": "dot", "size": 20, "title": "id: REG-266\narticle: 47\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art47(2(j))\ntext: Such mechanisms shall include data protection audits and methods for ensuring corrective actions to protect the rights of the data subject."}, {"color": "#2B6CB0", "id": "REG-267", "label": "REG-267", "shape": "dot", "size": 20, "title": "id: REG-267\narticle: 47\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art47(2(j))\ntext: Results of such verification should be communicated to the person or entity referred to in point (h) and to the board of the controlling undertaking of a group of undertakings, or of the group of enterprises engaged in a joint economic activity,"}, {"color": "#2B6CB0", "id": "REG-268", "label": "REG-268", "shape": "dot", "size": 20, "title": "id: REG-268\narticle: 47\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art47(2(j))\ntext: and should be available upon request to the competent supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-269", "label": "REG-269", "shape": "dot", "size": 20, "title": "id: REG-269\narticle: 47\nnode_type: Provision\nparagraph: 2(k)\nsystem_name: Art47(2(k))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (k) the mechanisms for reporting and recording changes to the rules and reporting those changes to the supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-270", "label": "REG-270", "shape": "dot", "size": 20, "title": "id: REG-270\narticle: 47\nnode_type: Provision\nparagraph: 2(l)\nsystem_name: Art47(2(l))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (l) the cooperation mechanism with the supervisory authority to ensure compliance by any member of the group of undertakings, or group of enterprises engaged in a joint economic activity, in particular by making available to the supervisory authority the results of verifications of the measures referred to in point (j);"}, {"color": "#2B6CB0", "id": "REG-271", "label": "REG-271", "shape": "dot", "size": 20, "title": "id: REG-271\narticle: 47\nnode_type: Provision\nparagraph: 2(m)\nsystem_name: Art47(2(m))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (m) the mechanisms for reporting to the competent supervisory authority any legal requirements to which a member of the group of undertakings, or group of enterprises engaged in a joint economic activity is subject in a third country which are likely to have a substantial adverse effect on the guarantees provided by the binding corporate rules; and"}, {"color": "#2B6CB0", "id": "REG-272", "label": "REG-272", "shape": "dot", "size": 20, "title": "id: REG-272\narticle: 47\nnode_type: Provision\nparagraph: 2(n)\nsystem_name: Art47(2(n))\ntext: The binding corporate rules referred to in paragraph 1 shall specify at least: (n) the appropriate data protection training to personnel having permanent or regular access to personal data."}, {"color": "#2B6CB0", "id": "REG-273", "label": "REG-273", "shape": "dot", "size": 20, "title": "id: REG-273\narticle: 47\nnode_type: Provision\nparagraph: 3\nsystem_name: Art47(3)\ntext: The Commission may specify the format and procedures for the exchange of information between controllers, processors and supervisory authorities for binding corporate rules within the meaning of this Article."}, {"color": "#2B6CB0", "id": "REG-274", "label": "REG-274", "shape": "dot", "size": 20, "title": "id: REG-274\narticle: 47\nnode_type: Provision\nparagraph: 3\nsystem_name: Art47(3)\ntext: Those implementing acts shall be adopted in accordance with the examination procedure set out in Article 93(2)."}, {"color": "#2B6CB0", "id": "REG-275", "label": "REG-275", "shape": "dot", "size": 20, "title": "id: REG-275\narticle: 49\nnode_type: Provision\nparagraph: 1\nsystem_name: Art49(1)\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions:"}, {"color": "#C53030", "id": "Art49", "label": "Art49", "shape": "dot", "size": 28, "title": "id: Art49\narticle_number: 49\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-276", "label": "REG-276", "shape": "dot", "size": 20, "title": "id: REG-276\narticle: 49\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art49(1(a))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (a) the data subject has explicitly consented to the proposed transfer, after having been informed of the possible risks of such transfers for the data subject due to the absence of an adequacy decision and appropriate safeguards;"}, {"color": "#2B6CB0", "id": "REG-277", "label": "REG-277", "shape": "dot", "size": 20, "title": "id: REG-277\narticle: 49\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art49(1(b))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (b) the transfer is necessary for the performance of a contract between the data subject and the controller or the implementation of pre-contractual measures taken at the data subject\u0027s request;"}, {"color": "#2B6CB0", "id": "REG-278", "label": "REG-278", "shape": "dot", "size": 20, "title": "id: REG-278\narticle: 49\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art49(1(c))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (c) the transfer is necessary for the conclusion or performance of a contract concluded in the interest of the data subject between the controller and another natural or legal person;"}, {"color": "#2B6CB0", "id": "REG-279", "label": "REG-279", "shape": "dot", "size": 20, "title": "id: REG-279\narticle: 49\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art49(1(d))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (d) the transfer is necessary for important reasons of public interest;"}, {"color": "#2B6CB0", "id": "REG-280", "label": "REG-280", "shape": "dot", "size": 20, "title": "id: REG-280\narticle: 49\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art49(1(e))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (e) the transfer is necessary for the establishment, exercise or defence of legal claims;"}, {"color": "#2B6CB0", "id": "REG-281", "label": "REG-281", "shape": "dot", "size": 20, "title": "id: REG-281\narticle: 49\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art49(1(f))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (f) the transfer is necessary in order to protect the vital interests of the data subject or of other persons, where the data subject is physically or legally incapable of giving consent;"}, {"color": "#2B6CB0", "id": "REG-282", "label": "REG-282", "shape": "dot", "size": 20, "title": "id: REG-282\narticle: 49\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art49(1(g))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in ternational organisation shall take place only on one of the following conditions: (g) the transfer is made from a register which according to Union or Member State law is intended to provide information to the public and which is open to consultation either by the public in general Where a transfer could not be based on a provision in Article 45 or 46, including the provisions on binding corporate rules, and none of the derogations for a specific situation referred to in the first subparagraph of this paragraph is applicable, a transfer to a third country or an international organisation may take place only if the transfer is not repetitive, concerns only a limited number of data subjects, is necessary for the purposes of compelling legitimate interests pursued by the controller which are not overridden by the interests or rights and freedoms of the data subject, and the controller has assessed all the circumstances surrounding the data transfer and has on the basis of that assessment provided suitable safeguards with regard to the protection of personal data. The controller shall inform the supervisory authority of the transfer. The controller shall, in addition to providing the information referred to in Articles 13 and 14, inform the data subject of the transfer and on the compelling legitimate interests pursued."}, {"color": "#2B6CB0", "id": "REG-283", "label": "REG-283", "shape": "dot", "size": 20, "title": "id: REG-283\narticle: 49\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art49(1(g))\ntext: or by any person who can demonstrate a legitimate interest, but only to the extent that the conditions laid down by Union or Member State law for consultation are fulfilled in the particular case."}, {"color": "#2B6CB0", "id": "REG-284", "label": "REG-284", "shape": "dot", "size": 20, "title": "id: REG-284\narticle: 49\nnode_type: Provision\nparagraph: 2\nsystem_name: Art49(2)\ntext: A transfer pursuant to point (g) of the first subparagraph of paragraph 1 shall not involve the entirety of the personal data or entire categories of the personal data contained in the register."}, {"color": "#2B6CB0", "id": "REG-285", "label": "REG-285", "shape": "dot", "size": 20, "title": "id: REG-285\narticle: 49\nnode_type: Provision\nparagraph: 2\nsystem_name: Art49(2)\ntext: Where the register is intended for consultation by persons having a legitimate interest, the transfer shall be made only at the request of those persons or if they are to be the recipients."}, {"color": "#2B6CB0", "id": "REG-286", "label": "REG-286", "shape": "dot", "size": 20, "title": "id: REG-286\narticle: 49\nnode_type: Provision\nparagraph: 3\nsystem_name: Art49(3)\ntext: Points (a), (b) and (c) of the first subparagraph of paragraph 1 and the second subparagraph thereof shall not apply to activities carried out by public authorities in the exercise of their public powers."}, {"color": "#2B6CB0", "id": "REG-287", "label": "REG-287", "shape": "dot", "size": 20, "title": "id: REG-287\narticle: 49\nnode_type: Provision\nparagraph: 4\nsystem_name: Art49(4)\ntext: The public interest referred to in point (d) of the first subparagraph of paragraph 1 shall be recognised in Union law or in the law of the Member State to which the controller is subject."}, {"color": "#2B6CB0", "id": "REG-288", "label": "REG-288", "shape": "dot", "size": 20, "title": "id: REG-288\narticle: 49\nnode_type: Provision\nparagraph: 5\nsystem_name: Art49(5)\ntext: In the absence of an adequacy decision, Union or Member State law may, for important reasons of public interest, expressly set limits to the transfer of specific categories of personal data to a third country or an international organisation."}, {"color": "#2B6CB0", "id": "REG-289", "label": "REG-289", "shape": "dot", "size": 20, "title": "id: REG-289\narticle: 49\nnode_type: Provision\nparagraph: 5\nsystem_name: Art49(5)\ntext: Member States shall notify such provisions to the Commission."}, {"color": "#2B6CB0", "id": "REG-290", "label": "REG-290", "shape": "dot", "size": 20, "title": "id: REG-290\narticle: 49\nnode_type: Provision\nparagraph: 6\nsystem_name: Art49(6)\ntext: The controller or processor shall document the assessment as well as the suitable safeguards referred to in the second subparagraph of paragraph 1 of this Article in the records referred to in Article 30."}, {"color": "#2B6CB0", "id": "REG-291", "label": "REG-291", "shape": "dot", "size": 20, "title": "id: REG-291\narticle: 55\nnode_type: Provision\nparagraph: 1\nsystem_name: Art55(1)\ntext: Each supervisory authority shall be competent for the performance of the tasks assigned to and the exercise of the powers conferred on it in accordance with this Regulation on the territory of its own Member State."}, {"color": "#C53030", "id": "Art55", "label": "Art55", "shape": "dot", "size": 28, "title": "id: Art55\narticle_number: 55\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-292", "label": "REG-292", "shape": "dot", "size": 20, "title": "id: REG-292\narticle: 55\nnode_type: Provision\nparagraph: 2\nsystem_name: Art55(2)\ntext: Where processing is carried out by public authorities or private bodies acting on the basis of point (c) or (e) of Article 6(1), the supervisory authority of the Member State concerned shall be competent. In such cases Article 56 does not apply."}, {"color": "#2B6CB0", "id": "REG-293", "label": "REG-293", "shape": "dot", "size": 20, "title": "id: REG-293\narticle: 55\nnode_type: Provision\nparagraph: 3\nsystem_name: Art55(3)\ntext: Supervisory authorities shall not be competent to supervise processing operations of courts acting in their judicial capacity."}, {"color": "#2B6CB0", "id": "REG-294", "label": "REG-294", "shape": "dot", "size": 20, "title": "id: REG-294\narticle: 89\nnode_type: Provision\nparagraph: 1\nsystem_name: Art89(1)\ntext: Processing for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, shall be subject to appropriate safeguards, in accordance with this Regulation, for the rights and freedoms of the data subject. order to ensure respect for the principle of data minimisation. Those measures may include pseudonymisation provided that those purposes can be fulfilled in that manner. Where those purposes can be fulfilled by further processing which does not permit or no longer permits the identification of data subjects, those purposes shall be fulfilled in that manner."}, {"color": "#C53030", "id": "Art89", "label": "Art89", "shape": "dot", "size": 28, "title": "id: Art89\narticle_number: 89\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-295", "label": "REG-295", "shape": "dot", "size": 20, "title": "id: REG-295\narticle: 89\nnode_type: Provision\nparagraph: 1\nsystem_name: Art89(1)\ntext: Those safeguards shall ensure that technical and organisational measures are in place in particular in"}, {"color": "#2B6CB0", "id": "REG-296", "label": "REG-296", "shape": "dot", "size": 20, "title": "id: REG-296\narticle: 89\nnode_type: Provision\nparagraph: 2\nsystem_name: Art89(2)\ntext: Where personal data are processed for scientific or historical research purposes or statistical purposes, Union or Member State law may provide for derogations from the rights referred to in Articles 15, 16, 18 and 21 subject to the conditions and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes."}, {"color": "#2B6CB0", "id": "REG-297", "label": "REG-297", "shape": "dot", "size": 20, "title": "id: REG-297\narticle: 89\nnode_type: Provision\nparagraph: 3\nsystem_name: Art89(3)\ntext: Where personal data are processed for archiving purposes in the public interest, Union or Member State law may provide for derogations from the rights referred to in Articles 15, 16, 18, 19, 20 and 21 subject to the conditions and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes."}, {"color": "#2B6CB0", "id": "REG-298", "label": "REG-298", "shape": "dot", "size": 20, "title": "id: REG-298\narticle: 89\nnode_type: Provision\nparagraph: 4\nsystem_name: Art89(4)\ntext: Where processing referred to in paragraphs 2 and 3 serves at the same time another purpose, the derogations shall apply only to processing for the purposes referred to in those paragraphs."}, {"color": "#2B6CB0", "id": "REG-299", "label": "REG-299", "shape": "dot", "size": 20, "title": "id: REG-299\narticle: 92\nnode_type: Provision\nparagraph: 1\nsystem_name: Art92(1)\ntext: The power to adopt delegated acts is conferred on the Commission subject to the conditions laid down in this Article."}, {"color": "#C53030", "id": "Art92", "label": "Art92", "shape": "dot", "size": 28, "title": "id: Art92\narticle_number: 92\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-300", "label": "REG-300", "shape": "dot", "size": 20, "title": "id: REG-300\narticle: 92\nnode_type: Provision\nparagraph: 2\nsystem_name: Art92(2)\ntext: The delegation of power referred to in Article 12(8) and Article 43(8) shall be conferred on the Commission for an indeterminate period of time from 24 May 2016."}, {"color": "#2B6CB0", "id": "REG-301", "label": "REG-301", "shape": "dot", "size": 20, "title": "id: REG-301\narticle: 92\nnode_type: Provision\nparagraph: 3\nsystem_name: Art92(3)\ntext: The delegation of power referred to in Article 12(8) and Article 43(8) may be revoked at any time by the European Parliament or by the Council."}, {"color": "#2B6CB0", "id": "REG-302", "label": "REG-302", "shape": "dot", "size": 20, "title": "id: REG-302\narticle: 92\nnode_type: Provision\nparagraph: 3\nsystem_name: Art92(3)\ntext: A decision of revocation s  "REG-308", "shape": "dot", "size": 20, "title": "id: REG-308\narticle: 93\nnode_type: Provision\nparagraph: 1\nsystem_name: Art93(1)\ntext: The Commission shall be assisted by a committee."}, {"color": "#C53030", "id": "Art93", "label": "Art93", "shape": "dot", "size": 28, "title": "id: Art93\narticle_number: 93\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-309", "label": "REG-309", "shape": "dot", "size": 20, "title": "id: REG-309\narticle: 93\nnode_type: Provision\nparagraph: 1\nsystem_name: Art93(1)\ntext: That committee shall be a committee within the meaning of Regulation (EU) No 182/2011."}, {"color": "#2B6CB0", "id": "REG-310", "label": "REG-310", "shape": "dot", "size": 20, "title": "id: REG-310\narticle: 93\nnode_type: Provision\nparagraph: 2\nsystem_name: Art93(2)\ntext: Where reference is made to this paragraph, Article 5 of Regulation (EU) No 182/2011 shall apply."}, {"color": "#2B6CB0", "id": "REG-311", "label": "REG-311", "shape": "dot", "size": 20, "title": "id: REG-311\narticle: 93\nnode_type: Provision\nparagraph: 3\nsystem_name: Art93(3)\ntext: Where reference is made to this paragraph, Article 8 of Regulation (EU) No 182/2011, in conjunction with Article 5 thereof, shall apply."}, {"color": "#C53030", "id": "Art10", "label": "Art10", "shape": "dot", "size": 28, "title": "id: Art10\narticle_number: 10\nnode_type: Article"}, {"color": "#C53030", "id": "Art14", "label": "Art14", "shape": "dot", "size": 28, "title": "id: Art14\narticle_number: 14\nnode_type: Article"}, {"color": "#C53030", "id": "Art5", "label": "Art5", "shape": "dot", "size": 28, "title": "id: Art5\narticle_number: 5\nnode_type: Article"}, {"color": "#C53030", "id": "Art24", "label": "Art24", "shape": "dot", "size": 28, "title": "id: Art24\narticle_number: 24\nnode_type: Article"}, {"color": "#C53030", "id": "Art25", "label": "Art25", "shape": "dot", "size": 28, "title": "id: Art25\narticle_number: 25\nnode_type: Article"}, {"color": "#C53030", "id": "Art32", "label": "Art3
