t that at least one of the following applies: (d) processing is necessary in order to protect the vital interests of the data subject or of another natural person;"}, {"color": "#2B6CB0", "id": "REG-006", "label": "REG-006", "shape": "dot", "size": 20, "title": "id: REG-006\narticle: 6\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art6(1(e))\ntext: Processing shall be lawful only if and to the extent that at least one of the following applies: (e) processing is necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller;"}, {"color": "#2B6CB0", "id": "REG-007", "label": "REG-007", "shape": "dot", "size": 20, "title": "id: REG-007\narticle: 6\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art6(1(f))\ntext: Processing shall be lawful only if and to the extent that at least one of the following applies: (f) processing is necessary for the purposes of the legitimate interests pursued by the controller or by a third party, except where such interests are overridden by the interests or fundamental rights and freedoms of the data subject which require protection of personal data, in particular where the data subject is a child. Point (f) of the first subparagraph shall not apply to processing carried out by public authorities in the performance of their tasks."}, {"color": "#2B6CB0", "id": "REG-008", "label": "REG-008", "shape": "dot", "size": 20, "title": "id: REG-008\narticle: 6\nnode_type: Provision\nparagraph: 2\nsystem_name: Art6(2)\ntext: Member States may maintain or introduce more specific provisions to adapt the application of the rules of this Regulation with regard to processing for compliance with points (c) and (e) of paragraph 1 by determining more precisely specific requirements for the processing and other measures to ensure lawful and fair processing including for other specific processing situations as provided for in Chapter IX."}, {"color": "#2B6CB0", "id": "REG-009", "label": "REG-009", "shape": "dot", "size": 20, "title": "id: REG-009\narticle: 6\nnode_type: Provision\nparagraph: 3\nsystem_name: Art6(3)\ntext: The basis for the processing referred to in point (c) and (e) of paragraph 1 shall be laid down by:"}, {"color": "#2B6CB0", "id": "REG-010", "label": "REG-010", "shape": "dot", "size": 20, "title": "id: REG-010\narticle: 6\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art6(3(a))\ntext: The basis for the processing referred to in point (c) and (e) of paragraph 1 shall be laid down by: (a) Union law; or"}, {"color": "#2B6CB0", "id": "REG-011", "label": "REG-011", "shape": "dot", "size": 20, "title": "id: REG-011\narticle: 6\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art6(3(b))\ntext: The basis for the processing referred to in point (c) and (e) of paragraph 1 shall be laid down by: (b) Member State law to which the controller is subject. The purpose of the processing shall be determined in that legal basis or, as regards the processing referred to in point (e) of paragraph 1, shall be necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller. That legal basis may contain specific provisions to adapt the application of rules of this Regulation, inter alia: the general conditions governing the lawfulness of processing by the controller; the types of data which are subject to the processing; the data subjects concerned; the entities to, and the purposes for which, the personal data may be disclosed; the purpose limitation; storage periods; and processing operations and processing procedures, including measures to ensure lawful and fair processing such as those for other specific processing situations as provided for in Chapter IX. The Union or the Member State law shall meet an objective of public interest and be proportionate to the legitimate aim pursued."}, {"color": "#2B6CB0", "id": "REG-012", "label": "REG-012", "shape": "dot", "size": 20, "title": "id: REG-012\narticle: 6\nnode_type: Provision\nparagraph: 4\nsystem_name: Art6(4)\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia:"}, {"color": "#2B6CB0", "id": "REG-013", "label": "REG-013", "shape": "dot", "size": 20, "title": "id: REG-013\narticle: 6\nnode_type: Provision\nparagraph: 4(a)\nsystem_name: Art6(4(a))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (a) any link between the purposes for which the personal data have been collected and the purposes of the intended further processing;"}, {"color": "#2B6CB0", "id": "REG-014", "label": "REG-014", "shape": "dot", "size": 20, "title": "id: REG-014\narticle: 6\nnode_type: Provision\nparagraph: 4(b)\nsystem_name: Art6(4(b))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (b) the context in which the personal data have been collected, in particular regarding the relationship between data subjects and the controller;"}, {"color": "#2B6CB0", "id": "REG-015", "label": "REG-015", "shape": "dot", "size": 20, "title": "id: REG-015\narticle: 6\nnode_type: Provision\nparagraph: 4(c)\nsystem_name: Art6(4(c))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (c) the nature of the personal data, in particular whether special categories of personal data are processed, pursuant to Article 9, or whether personal data related to criminal convictions and offences are processed, pursuant to Article 10;"}, {"color": "#2B6CB0", "id": "REG-016", "label": "REG-016", "shape": "dot", "size": 20, "title": "id: REG-016\narticle: 6\nnode_type: Provision\nparagraph: 4(d)\nsystem_name: Art6(4(d))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (d) the possible consequences of the intended further processing for data subjects;"}, {"color": "#2B6CB0", "id": "REG-017", "label": "REG-017", "shape": "dot", "size": 20, "title": "id: REG-017\narticle: 6\nnode_type: Provision\nparagraph: 4(e)\nsystem_name: Art6(4(e))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (e) the existence of appropriate safeguards, which may include encryption or pseudonymisation."}, {"color": "#2B6CB0", "id": "REG-018", "label": "REG-018", "shape": "dot", "size": 20, "title": "id: REG-018\narticle: 8\nnode_type: Provision\nparagraph: 1\nsystem_name: Art8(1)\ntext: Where point (a) of Article 6(1) applies, in relation to the offer of information society services directly to a child, the processing of the personal data of a child shall be lawful where the child is at least 16 years old. Member States may provide by law for a lower age for those purposes provided that such lower age is not below 13 years."}, {"color": "#C53030", "id": "Art8", "label": "Art8", "shape": "dot", "size": 28, "title": "id: Art8\narticle_number: 8\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-019", "label": "REG-019", "shape": "dot", "size": 20, "title": "id: REG-019\narticle: 8\nnode_type: Provision\nparagraph: 1\nsystem_name: Art8(1)\ntext: Where the child is below the age of 16 years, such processing shall be lawful only if and to the extent that consent is given or authorised by the holder of parental responsibility over the child."}, {"color": "#2B6CB0", "id": "REG-020", "label": "REG-020", "shape": "dot", "size": 20, "title": "id: REG-020\narticle: 8\nnode_type: Provision\nparagraph: 2\nsystem_name: Art8(2)\ntext: The controller shall make reasonable efforts to verify in such cases that consent is given or authorised by the holder of parental responsibility over the child, taking into consideration available technology."}, {"color": "#2B6CB0", "id": "REG-021", "label": "REG-021", "shape": "dot", "size": 20, "title": "id: REG-021\narticle: 8\nnode_type: Provision\nparagraph: 3\nsystem_name: Art8(3)\ntext: Paragraph 1 shall not affect the general contract law of Member States such as the rules on the validity, formation or effect of a contract in relation to a child."}, {"color": "#2B6CB0", "id": "REG-022", "label": "REG-022", "shape": "dot", "size": 20, "title": "id: REG-022\narticle: 9\nnode_type: Provision\nparagraph: 1\nsystem_name: Art9(1)\ntext: Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs, or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying a natural person, data concerning health or data concerning a natural person\u0027s sex life or sexual orientation shall be prohibited."}, {"color": "#C53030", "id": "Art9", "label": "Art9", "shape": "dot", "size": 28, "title": "id: Art9\narticle_number: 9\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-023", "label": "REG-023", "shape": "dot", "size": 20, "title": "id: REG-023\narticle: 9\nnode_type: Provision\nparagraph: 2\nsystem_name: Art9(2)\ntext: Paragraph 1 shall not apply if one of the following applies:"}, {"color": "#2B6CB0", "id": "REG-024", "label": "REG-024", "shape": "dot", "size": 20, "title": "id: REG-024\narticle: 9\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art9(2(a))\ntext: Paragraph 1 shall not apply if one of the following applies: (a) the data subject has given explicit consent to the processing of those personal data for one or more specified purposes, except where Union or Member State law provide that the prohibition referred to in paragraph 1 may not be lifted by the data subject;"}, {"color": "#2B6CB0", "id": "REG-025", "label": "REG-025", "shape": "dot", "size": 20, "title": "id: REG-025\narticle: 9\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art9(2(b))\ntext: Paragraph 1 shall not apply if one of the following applies: (b) processing is necessary for the purposes of carrying out the obligations and exercising specific rights of the controller or of the data subject in the field of employment and social security and social protection law in so far as it is authorised by Union or Member State law or a collective agreement pursuant to Member State law providing for appropriate safeguards for the fundamental rights and the interests of the data subject;"}, {"color": "#2B6CB0", "id": "REG-026", "label": "REG-026", "shape": "dot", "size": 20, "title": "id: REG-026\narticle: 9\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art9(2(c))\ntext: Paragraph 1 shall not apply if one of the following applies: (c) processing is necessary to protect the vital interests of the data subject or of another natural person where the data subject is physically or legally incapable of giving consent;"}, {"color": "#2B6CB0", "id": "REG-027", "label": "REG-027", "shape": "dot", "size": 20, "title": "id: REG-027\narticle: 9\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art9(2(d))\ntext: Paragraph 1 shall not apply if one of the following applies: (d) processing is carried out in the course of its legitimate activities with appropriate safeguards by a foundation, association or any other not-for-profit body with a political, philosophical, religious or trade union aim and on condition that the processing relates solely to the members or to former members of the body or to persons who have regular contact with it in connection with its purposes and that the personal data are not disclosed outside that body without the consent of the data subjects;"}, {"color": "#2B6CB0", "id": "REG-028", "label": "REG-028", "shape": "dot", "size": 20, "title": "id: REG-028\narticle: 9\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art9(2(e))\ntext: Paragraph 1 shall not apply if one of the following applies: (e) processing relates to personal data which are manifestly made public by the data subject;"}, {"color": "#2B6CB0", "id": "REG-029", "label": "REG-029", "shape": "dot", "size": 20, "title": "id: REG-029\narticle: 9\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art9(2(f))\ntext: Paragraph 1 shall not apply if one of the following applies: (f) processing is necessary for the establishment, exercise or defence of legal claims or whenever courts are acting in their judicial capacity;"}, {"color": "#2B6CB0", "id": "REG-030", "label": "REG-030", "shape": "dot", "size": 20, "title": "id: REG-030\narticle: 9\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art9(2(g))\ntext: Paragraph 1 shall not apply if one of the following applies: (g) processing is necessary for reasons of substantial public interest, on the basis of Union"}, {"color": "#2B6CB0", "id": "REG-031", "label": "REG-031", "shape": "dot", "size": 20, "title": "id: REG-031\narticle: 9\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art9(2(g))\ntext: or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data protection and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the data subject;"}, {"color": "#2B6CB0", "id": "REG-032", "label": "REG-032", "shape": "dot", "size": 20, "title": "id: REG-032\narticle: 9\nnode_type: Provision\nparagraph: 2(h)\nsystem_name: Art9(2(h))\ntext: Paragraph 1 shall not apply if one of the following applies: (h) processing is necessary for the purposes of preventive or occupational medicine, for the assessment of the working capacity of the employee, medical diagnosis, the provision of health or social care or treatment or the management of health or social care systems and services on the basis of Union or Member State law or pursuant to contract with a health professional and subject to the conditions and safeguards referred to in paragraph 3;"}, {"color": "#2B6CB0", "id": "REG-033", "label": "REG-033", "shape": "dot", "size": 20, "title": "id: REG-033\narticle: 9\nnode_type: Provision\nparagraph: 2(i)\nsystem_name: Art9(2(i))\ntext: Paragraph 1 shall not apply if one of the following applies: (i) processing is necessary for reasons of public interest in the area of public health, such as protecting against serious cross-border threats to health or ensuring high standards of quality and safety of health care and of medicinal products or medical devices, on the basis of Union or Member State law which provides for suitable and specific measures to safeguard the rights and freedoms of the data subject, in particular professional secrecy;"}, {"color": "#2B6CB0", "id": "REG-034", "label": "REG-034", "shape": "dot", "size": 20, "title": "id: REG-034\narticle: 9\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art9(2(j))\ntext: Paragraph 1 shall not apply if one of the following applies: (j) processing is necessary for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) based on Union"}, {"color": "#2B6CB0", "id": "REG-035", "label": "REG-035", "shape": "dot", "size": 20, "title": "id: REG-035\narticle: 9\nnode_type: Provision\nparagraph: 2(j)\nsystem_name: Art9(2(j))\ntext: or Member State law which shall be propor tionate to the aim pursued, respect the essence of the right to data protection and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the data subject."}, {"color": "#2B6CB0", "id": "REG-036", "label": "REG-036", "shape": "dot", "size": 20, "title": "id: REG-036\narticle: 9\nnode_type: Provision\nparagraph: 3\nsystem_name: Art9(3)\ntext: Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2 when those data are processed by or under the responsibility of a professional subject to the obligation of professional secrecy under Union or Member State law or rules established by national competent bodies or by another person also subject to an obligation of secrecy under Union or Member State law or rules established by national competent bodies."}, {"color": "#2B6CB0", "id": "REG-037", "label": "REG-037", "shape": "dot", "size": 20, "title": "id: REG-037\narticle: 9\nnode_type: Provision\nparagraph: 4\nsystem_name: Art9(4)\ntext: Member States may maintain or introduce further conditions, including limitations, with regard to the processing of genetic data, biometric data or data concerning health."}, {"color": "#2B6CB0", "id": "REG-038", "label": "REG-038", "shape": "dot", "size": 20, "title": "id: REG-038\narticle: 11\nnode_type: Provision\nparagraph: 1\nsystem_name: Art11(1)\ntext: If the purposes for which a controller processes personal data do not or do no longer require the identification of a data subject by the controller, the controller shall not be obliged to maintain, acquire or process additional information in order to identify the data subject for the sole purpose of complying with this Regulation."}, {"color": "#C53030", "id": "Art11", "label": "Art11", "shape": "dot", "size": 28, "title": "id: Art11\narticle_number: 11\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-039", "label": "REG-039", "shape": "dot", "size": 20, "title": "id: REG-039\narticle: 11\nnode_type: Provision\nparagraph: 2\nsystem_name: Art11(2)\ntext: Where, in cases referred to in paragraph 1 of this Article, the controller is able to demonstrate that it is not in a position to identify the data subject, the controller shall inform the data subject accordingly, if possible."}, {"color": "#2B6CB0", "id": "REG-040", "label": "REG-040", "shape": "dot", "size": 20, "title": "id: REG-040\narticle: 11\nnode_type: Provision\nparagraph: 2\nsystem_name: Art11(2)\ntext: In such cases, Articles 15 to 20 shall not apply except where the data subject, for the purpose of exercising his or her rights under those articles, provides additional information enabling his or her identification."}, {"color": "#2B6CB0", "id": "REG-041", "label": "REG-041", "shape": "dot", "size": 20, "title": "id: REG-041\narticle: 12\nnode_type: Provision\nparagraph: 1\nsystem_name: Art12(1)\ntext: The controller shall take appropriate measures to provide any information referred to in Articles 13 and 14 and any communication under Articles 15 to 22 and 34 relating to processing to the data subject in a concise, transparent, intelligible and easily accessible form, using clear and plain language, in particular for any information addressed specifically to a child."}, {"color": "#C53030", "id": "Art12", "label": "Art12", "shape": "dot", "size": 28, "title": "id: Art12\narticle_number: 12\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-042", "label": "REG-042", "shape": "dot", "size": 20, "title": "id: REG-042\narticle: 12\nnode_type: Provision\nparagraph: 1\nsystem_name: Art12(1)\ntext: The information shall be provided in writing, or by other means, including, where appropriate, by electronic means."}, {"color": "#2B6CB0", "id": "REG-043", "label": "REG-043", "shape": "dot", "size": 20, "title": "id: REG-043\narticle: 12\nnode_type: Provision\nparagraph: 1\nsystem_name: Art12(1)\ntext: When requested by the data subject, the information may be provided orally, provided that the identity of the data subject is proven by other means."}, {"color": "#2B6CB0", "id": "REG-044", "label": "REG-044", "shape": "dot", "size": 20, "title": "id: REG-044\narticle: 12\nnode_type: Provision\nparagraph: 2\nsystem_name: Art12(2)\ntext: The controller shall facilitate the exercise of data subject rights under Articles 15 to 22."}, {"color": "#2B6CB0", "id": "REG-045", "label": "REG-045", "shape": "dot", "size": 20, "title": "id: REG-045\narticle: 12\nnode_type: Provision\nparagraph: 2\nsystem_name: Art12(2)\ntext: In the cases referred to in Article 11(2), the controller shall not refuse to act on the request of the data subject for exercising his or her rights under Articles 15 to 22, unless the controller demonstrates that it is not in a position to identify the data subject."}, {"color": "#2B6CB0", "id": "REG-046", "label": "REG-046", "shape": "dot", "size": 20, "title": "id: REG-046\narticle: 12\nnode_type: Provision\nparagraph: 3\nsystem_name: Art12(3)\ntext: The controller shall provide information on action taken on a request under Articles 15 to 22 to the data subject without undue delay and in any event within one month of receipt of the request."}, {"color": "#2B6CB0", "id": "REG-047", "label": "REG-047", "shape": "dot", "size": 20, "title": "id: REG-047\narticle: 12\nnode_type: Provision\nparagraph: 3\nsystem_name: Art12(3)\ntext: That period may be extended by two further months where necessary, taking into account the complexity and number of the requests."}, {"color": "#2B6CB0", "id": "REG-048", "label": "REG-048", "shape": "dot", "size": 20, "title": "id: REG-048\narticle: 12\nnode_type: Provision\nparagraph: 3\nsystem_name: Art12(3)\ntext: The controller shall inform the data subject of any such extension within one month of receipt of the request, together with the reasons for the delay."}, {"color": "#2B6CB0", "id": "REG-049", "label": "REG-049", "shape": "dot", "size": 20, "title": "id: REG-049\narticle: 12\nnode_type: Provision\nparagraph: 3\nsystem_name: Art12(3)\ntext: Where the data subject makes the request by electronic form means, the information shall be provided by electronic means where possible, unless otherwise requested by the data subject."}, {"color": "#2B6CB0", "id": "REG-050", "label": "REG-050", "shape": "dot", "size": 20, "title": "id: REG-050\narticle: 12\nnode_type: Provision\nparagraph: 4\nsystem_name: Art12(4)\ntext: If the controller does not take action on the request of the data subject, the controller shall inform the data subject without delay and at the latest within one month of receipt of the request of the reasons for not taking action and on the possibility of lodging a complaint with a supervisory authority and seeking a judicial remedy."}, {"color": "#2B6CB0", "id": "REG-051", "label": "REG-051", "shape": "dot", "size": 20, "title": "id: REG-051\narticle: 12\nnode_type: Provision\nparagraph: 5\nsystem_name: Art12(5)\ntext: Information provided under Articles 13 and 14 and any communication and any actions taken under Articles 15 to 22 and 34 shall be provided free of charge."}, {"color": "#2B6CB0", "id": "REG-052", "label": "REG-052", "shape": "dot", "size": 20, "title": "id: REG-052\narticle: 12\nnode_type: Provision\nparagraph: 5\nsystem_name: Art12(5)\ntext: Where requests from a data subject are manifestly unfounded or excessive, in particular because of their repetitive character, the controller may either:"}, {"color": "#2B6CB0", "id": "REG-053", "label": "REG-053", "shape": "dot", "size": 20, "title": "id: REG-053\narticle: 12\nnode_type: Provision\nparagraph: 5(a)\nsystem_name: Art12(5(a))\ntext: Where requests from a data subject are manifestly unfounded or excessive, in particular because of their repetitive character, the controller may either: (a) charge a reasonable fee taking into account the administrative costs of providing the information or communication or taking the action requested; or"}, {"color": "#2B6CB0", "id": "REG-054", "label": "REG-054", "shape": "dot", "size": 20, "title": "id: REG-054\narticle: 12\nnode_type: Provision\nparagraph: 5(b)\nsystem_name: Art12(5(b))\ntext: Where requests from a data subject are manifestly unfounded or excessive, in particular because of their repetitive character, the controller may either: (b) refuse to act on the request. The controller shall bear the burden of demonstrating the manifestly unfounded or excessive character of the request."}, {"color": "#2B6CB0", "id": "REG-055", "label": "REG-055", "shape": "dot", "size": 20, "title": "id: REG-055\narticle: 12\nnode_type: Provision\nparagraph: 6\nsystem_name: Art12(6)\ntext: Without prejudice to Article 11, where the controller has reasonable doubts concerning the identity of the natural person making the request referred to in Articles 15 to 21, the controller may request the provision of additional information necessary to confirm the identity of the data subject."}, {"color": "#2B6CB0", "id": "REG-056", "label": "REG-056", "shape": "dot", "size": 20, "title": "id: REG-056\narticle: 12\nnode_type: Provision\nparagraph: 7\nsystem_name: Art12(7)\ntext: The information to be provided to data subjects pursuant to Articles 13 and 14 may be provided in combination with standardised icons in order to give in an easily visible, intelligible and clearly legible manner a meaningful overview of the intended processing."}, {"color": "#2B6CB0", "id": "REG-057", "label": "REG-057", "shape": "dot", "size": 20, "title": "id: REG-057\narticle: 12\nnode_type: Provision\nparagraph: 7\nsystem_name: Art12(7)\ntext: Where the icons are presented electronically they shall be machine-readable."}, {"color": "#2B6CB0", "id": "REG-058", "label": "REG-058", "shape": "dot", "size": 20, "title": "id: REG-058\narticle: 12\nnode_type: Provision\nparagraph: 8\nsystem_name: Art12(8)\ntext: The Commission shall be empowered to adopt delegated acts in accordance with Article 92 for the purpose of determining the information to be presented by the icons and the procedures for providing standardised icons."}, {"color": "#2B6CB0", "id": "REG-059", "label": "REG-059", "shape": "dot", "size": 20, "title": "id: REG-059\narticle: 13\nnode_type: Provision\nparagraph: 1\nsystem_name: Art13(1)\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information:"}, {"color": "#C53030", "id": "Art13", "label": "Art13", "shape": "dot", "size": 28, "title": "id: Art13\narticle_number: 13\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-060", "label": "REG-060", "shape": "dot", "size": 20, "title": "id: REG-060\narticle: 13\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art13(1(a))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (a) the identity and the contact details of the controller and, where applicable, of the controller\u0027s representative;"}, {"color": "#2B6CB0", "id": "REG-061", "label": "REG-061", "shape": "dot", "size": 20, "title": "id: REG-061\narticle: 13\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art13(1(b))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (b) the contact details of the data protection officer, where applicable;"}, {"color": "#2B6CB0", "id": "REG-062", "label": "REG-062", "shape": "dot", "size": 20, "title": "id: REG-062\narticle: 13\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art13(1(c))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (c) the purposes of the processing for which the personal data are intended as well as the legal basis for the processing;"}, {"color": "#2B6CB0", "id": "REG-063", "label": "REG-063", "shape": "dot", "size": 20, "title": "id: REG-063\narticle: 13\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art13(1(d))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (d) where the processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party;"}, {"color": "#2B6CB0", "id": "REG-064", "label": "REG-064", "shape": "dot", "size": 20, "title": "id: REG-064\narticle: 13\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art13(1(e))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (e) the recipients or categories of recipients of the personal data, if any;"}, {"color": "#2B6CB0", "id": "REG-065", "label": "REG-065", "shape": "dot", "size": 20, "title": "id: REG-065\narticle: 13\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art13(1(f))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (f) where applicable, the fact that the controller intends to transfer personal data to a third country or international organisation and the existence or absence of an adequacy decision by the Commission, or in the case of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate or suitable safeguards and the means by which to obtain a copy of them or where they have been made available."}, {"color": "#2B6CB0", "id": "REG-066", "label": "REG-066", "shape": "dot", "size": 20, "title": "id: REG-066\narticle: 13\nnode_type: Provision\nparagraph: 2\nsystem_name: Art13(2)\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing:"}, {"color": "#2B6CB0", "id": "REG-067", "label": "REG-067", "shape": "dot", "size": 20, "title": "id: REG-067\narticle: 13\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art13(2(a))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (a) the period for which the personal data will be stored, or if that is not possible, the criteria used to determine that period;"}, {"color": "#2B6CB0", "id": "REG-068", "label": "REG-068", "shape": "dot", "size": 20, "title": "id: REG-068\narticle: 13\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art13(2(b))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (b) the existence of the right to request from the controller access to and rectification or erasure of personal data or restriction of processing concerning the data subject or to object to processing as well as the right to data portability;"}, {"color": "#2B6CB0", "id": "REG-069", "label": "REG-069", "shape": "dot", "size": 20, "title": "id: REG-069\narticle: 13\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art13(2(c))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (c) where the processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on consent before its withdrawal;"}, {"color": "#2B6CB0", "id": "REG-070", "label": "REG-070", "shape": "dot", "size": 20, "title": "id: REG-070\narticle: 13\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art13(2(d))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (d) the right to lodge a complaint with a supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-071", "label": "REG-071", "shape": "dot", "size": 20, "title": "id: REG-071\narticle: 13\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art13(2(e))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (e) whether the provision of personal data is a statutory or contractual requirement, or a requirement necessary to enter into a contract, as well as whether the data subject is obliged to provide the personal data and of the possible consequences of failure to provide such data;"}, {"color": "#2B6CB0", "id": "REG-072", "label": "REG-072", "shape": "dot", "size": 20, "title": "id: REG-072\narticle: 13\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art13(2(f))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (f) the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged consequences of such processing for the data subject."}, {"color": "#2B6CB0", "id": "REG-073", "label": "REG-073", "shape": "dot", "size": 20, "title": "id: REG-073\narticle: 13\nnode_type: Provision\nparagraph: 3\nsystem_name: Art13(3)\ntext: Where the controller intends to further process the personal data for a purpose other than that for which the personal data were collected, the controller shall provide the data subject prior to that further processing with information on that other purpose and with any relevant further information as referred to in paragraph 2."}, {"color": "#2B6CB0", "id": "REG-074", "label": "REG-074", "shape": "dot", "size": 20, "title": "id: REG-074\narticle: 13\nnode_type: Provision\nparagraph: 4\nsystem_name: Art13(4)\ntext: Paragraphs 1, 2 and 3 shall not apply where and insofar as the data subject already has the information."}, {"color": "#2B6CB0", "id": "REG-075", "label": "REG-075", "shape": "dot", "size": 20, "title": "id: REG-075\narticle: 15\nnode_type: Provision\nparagraph: 1\nsystem_name: Art15(1)\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information:"}, {"color": "#C53030", "id": "Art15", "label": "Art15", "shape": "dot", "size": 28, "title": "id: Art15\narticle_number: 15\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-076", "label": "REG-076", "shape": "dot", "size": 20, "title": "id: REG-076\narticle: 15\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art15(1(a))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (a) the purposes of the processing;"}, {"color": "#2B6CB0", "id": "REG-077", "label": "REG-077", "shape": "dot", "size": 20, "title": "id: REG-077\narticle: 15\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art15(1(b))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (b) the categories of personal data concerned;"}, {"color": "#2B6CB0", "id": "REG-078", "label": "REG-078", "shape": "dot", "size": 20, "title": "id: REG-078\narticle: 15\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art15(1(c))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (c) the recipients or categories of recipient to whom the personal data have been"}, {"color": "#2B6CB0", "id": "REG-079", "label": "REG-079", "shape": "dot", "size": 20, "title": "id: REG-079\narticle: 15\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art15(1(c))\ntext: or will be disclosed, in particular recipients in third countries or international organisations;"}, {"color": "#2B6CB0", "id": "REG-080", "label": "REG-080", "shape": "dot", "size": 20, "title": "id: REG-080\narticle: 15\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art15(1(d))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (d) where possible, the envisaged period for which the personal data will be stored, or, if not possible, the criteria used to determine that period;"}, {"color": "#2B6CB0", "id": "REG-081", "label": "REG-081", "shape": "dot", "size": 20, "title": "id: REG-081\narticle: 15\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art15(1(e))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (e) the existence of the right to request from the controller rectification or erasure of personal data or restriction of processing of personal data concerning the data subject or to object to such processing;"}, {"color": "#2B6CB0", "id": "REG-082", "label": "REG-082", "shape": "dot", "size": 20, "title": "id: REG-082\narticle: 15\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art15(1(f))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (f) the right to lodge a complaint with a supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-083", "label": "REG-083", "shape": "dot", "size": 20, "title": "id: REG-083\narticle: 15\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art15(1(g))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (g) where the personal data are not collected from the data subject, any available information as to their source;"}, {"color": "#2B6CB0", "id": "REG-084", "label": "REG-084", "shape": "dot", "size": 20, "title": "id: REG-084\narticle: 15\nnode_type: Provision\nparagraph: 1(h)\nsystem_name: Art15(1(h))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (h) the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged consequences of such processing for the data subject."}, {"color": "#2B6CB0", "id": "REG-085", "label": "REG-085", "shape": "dot", "size": 20, "title": "id: REG-085\narticle: 15\nnode_type: Provision\nparagraph: 2\nsystem_name: Art15(2)\ntext: Where personal data are transferred to a third country or to an international organisation, the data subject shall have the right to be informed of the appropriate safeguards pursuant to Article 46 relating to the transfer."}, {"color": "#2B6CB0", "id": "REG-086", "label": "REG-086", "shape": "dot", "size": 20, "title": "id: REG-086\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: The controller shall provide a copy of the personal data undergoing processing."}, {"color": "#2B6CB0", "id": "REG-087", "label": "REG-087", "shape": "dot", "size": 20, "title": "id: REG-087\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: For any further copies requested by the data subject, the controller may charge a reasonable fee based on administrative costs."}, {"color": "#2B6CB0", "id": "REG-088", "label": "REG-088", "shape": "dot", "size": 20, "title": "id: REG-088\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: Where the data subject makes the request by electronic means, and unless otherwise requested by the data subject, the information shall be provided in a commonly used electronic form."}, {"color": "#2B6CB0", "id": "REG-089", "label": "REG-089", "shape": "dot", "size": 20, "title": "id: REG-089\narticle: 15\nnode_type: Provision\nparagraph: 4\nsystem_name: Art15(4)\ntext: The right to obtain a copy referred to in paragraph 3 shall not adversely affect the rights and freedoms of others."}, {"color": "#2B6CB0", "id": "REG-090", "label": "REG-090", "shape": "dot", "size": 20, "title": "id: REG-090\narticle: 17\nnode_type: Provision\nparagraph: 1\nsystem_name: Art17(1)\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#C53030", "id": "Art17", "label": "Art17", "shape": "dot", "size": 28, "title": "id: Art17\narticle_number: 17\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-091", "label": "REG-091", "shape": "dot", "size": 20, "title": "id: REG-091\narticle: 17\nnode_type: Provision\nparagraph: 1\nsystem_name: Art17(1)\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies:"}, {"color": "#2B6CB0", "id": "REG-092", "label": "REG-092", "shape": "dot", "size": 20, "title": "id: REG-092\narticle: 17\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art17(1(a))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-093", "label": "REG-093", "shape": "dot", "size": 20, "title": "id: REG-093\narticle: 17\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art17(1(a))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (a) the personal data are no longer necessary in relation to the purposes for which they were collected or otherwise processed;"}, {"color": "#2B6CB0", "id": "REG-094", "label": "REG-094", "shape": "dot", "size": 20, "title": "id: REG-094\narticle: 17\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art17(1(b))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-095", "label": "REG-095", "shape": "dot", "size": 20, "title": "id: REG-095\narticle: 17\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art17(1(b))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (b) the data subject withdraws consent on which the processing is based according to point (a) of Article 6(1), or point (a) of Article 9(2), and where there is no other legal ground for the processing;"}, {"color": "#2B6CB0", "id": "REG-096", "label": "REG-096", "shape": "dot", "size": 20, "title": "id: REG-096\narticle: 17\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art17(1(c))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-097", "label": "REG-097", "shape": "dot", "size": 20, "title": "id: REG-097\narticle: 17\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art17(1(c))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (c) the data subject objects to the processing pursuant to Article 21(1) and there are no overriding legitimate grounds for the processing, or the data subject objects to the processing pursuant to Article 21(2);"}, {"color": "#2B6CB0", "id": "REG-098", "label": "REG-098", "shape": "dot", "size": 20, "title": "id: REG-098\narticle: 17\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art17(1(d))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-099", "label": "REG-099", "shape": "dot", "size": 20, "title": "id: REG-099\narticle: 17\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art17(1(d))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (d) the personal data have been unlawfully processed;"}, {"color": "#2B6CB0", "id": "REG-100", "label": "REG-100", "shape": "dot", "size": 20, "title": "id: REG-100\narticle: 17\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art17(1(e))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-101", "label": "REG-101", "shape": "dot", "size": 20, "title": "id: REG-101\narticle: 17\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art17(1(e))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (e) the personal data have to be erased for compliance with a legal obligation in Union or Member State law to which the controller is subject;"}, {"color": "#2B6CB0", "id": "REG-102", "label": "REG-102", "shape": "dot", "size": 20, "title": "id: REG-102\narticle: 17\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art17(1(f))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-103", "label": "REG-103", "shape": "dot", "size": 20, "title": "id: REG-103\narticle: 17\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art17(1(f))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (f) the personal data have been collected in relation to the offer of information society services referred to in Article 8(1)."}, {"color": "#2B6CB0", "id": "REG-104", "label": "REG-104", "shape": "dot", "size": 20, "title": "id: REG-104\narticle: 17\nnode_type: Provision\nparagraph: 2\nsystem_name: Art17(2)\ntext: Where the controller has made the personal data public and is obliged pursuant to paragraph 1 to erase the personal data, the controller, taking account of available technology and the cost of implementation, shall take reasonable steps, including technical measures, to inform controllers which are processing the personal data that the data subject has requested the erasure by such controllers of any links to, or copy or replication of, those personal data."}, {"color": "#2B6CB0", "id": "REG-105", "label": "REG-105", "shape": "dot", "size": 20, "title": "id: REG-105\narticle: 17\nnode_type: Provision\nparagraph: 3\nsystem_name: Art17(3)\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary:"}, {"color": "#2B6CB0", "id": "REG-106", "label": "REG-106", "shape": "dot", "size": 20, "title": "id: REG-106\narticle: 17\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art17(3(a))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (a) for exercising the right of freedom of expression and information;"}, {"color": "#2B6CB0", "id": "REG-107", "label": "REG-107", "shape": "dot", "size": 20, "title": "id: REG-107\narticle: 17\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art17(3(b))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (b) for compliance with a legal obligation which requires processing by Union or Member State law to which the controller is subject or for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller;"}, {"color": "#2B6CB0", "id": "REG-108", "label": "REG-108", "shape": "dot", "size": 20, "title": "id: REG-108\narticle: 17\nnode_type: Provision\nparagraph: 3(c)\nsystem_name: Art17(3(c))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (c) for reasons of public interest in the area of public health in accordance with points (h) and (i) of Article 9(2) as well as Article 9(3);"}, {"color": "#2B6CB0", "id": "REG-109", "label": "REG-109", "shape": "dot", "size": 20, "title": "id: REG-109\narticle: 17\nnode_type: Provision\nparagraph: 3(d)\nsystem_name: Art17(3(d))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (d) for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) in so far as the right referred to in paragraph 1 is likely to render impossible or seriously impair the achievement of the objectives of that processing or"}, {"color": "#2B6CB0", "id": "REG-110", "label": "REG-110", "shape": "dot", "size": 20, "title": "id: REG-110\narticle: 17\nnode_type: Provision\nparagraph: 3(e)\nsystem_name: Art17(3(e))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (e) for the establishment, exercise or defence of legal claims."}, {"color": "#2B6CB0", "id": "REG-111", "label": "REG-111", "shape": "dot", "size": 20, "title": "id: REG-111\narticle: 20\nnode_type: Provision\nparagraph: 1\nsystem_name: Art20(1)\ntext: The data subject shall have the right to receive the personal data concerning him or her, which he or she has provided to a controller, in a structured, commonly used and machine-readable format and have the right to transmit those data to another controller without hindrance from the controller to which the personal data have been provided, where:"}, {"color": "#C53030", "id": "Art20", "label": "Art20", "shape": "dot", "size": 28, "title": "id: Art20\narticle_number: 20\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-112", "label": "REG-112", "shape": "dot", "size": 20, "title": "id: REG-112\narticle: 20\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art20(1(a))\ntext: The data subject shall have the right to receive the personal data concerning him or her, which he or she has provided to a controller, in a structured, commonly used and machine-readable format and have the right to transmit those data to another controller without hindrance from the controller to which the personal data have been provided, where: (a) the processing is based on consent pursuant to point (a) of Article 6(1) or point (a) of Article 9(2) or on a contract pursuant to point (b) of Article 6(1); and"}, {"color": "#2B6CB0", "id": "REG-113", "label": "REG-113", "shape": "dot", "size": 20, "title": "id: REG-113\narticle: 20\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art20(1(b))\ntext: The data subject shall have the right to receive the personal data concerning him or her, which he or she has provided to a controller, in a structured, commonly used and machine-readable format and have the right to transmit those data to another controller without hindrance from the controller to which the personal data have been provided, where: (b) the processing is carried out by automated means."}, {"color": "#2B6CB0", "id": "REG-114", "label": "REG-114", "shape": "dot", "size": 20, "title": "id: REG-114\narticle: 20\nnode_type: Provision\nparagraph: 2\nsystem_name: Art20(2)\ntext: In exercising his or her right to data portability pursuant to paragraph 1, the data subject shall have the right to have the personal data transmitted directly from one controller to another, where technically feasible."}, {"color": "#2B6CB0", "id": "REG-115", "label": "REG-115", "shape": "dot", "size": 20, "title": "id: REG-115\narticle: 20\nnode_type: Provision\nparagraph: 3\nsystem_name: Art20(3)\ntext: The exercise of the right referred to in paragraph 1 of this Article shall be without prejudice to Article 17."}, {"color": "#2B6CB0", "id": "REG-116", "label": "REG-116", "shape": "dot", "size": 20, "title": "id: REG-116\narticle: 20\nnode_type: Provision\nparagraph: 3\nsystem_name: Art20(3)\ntext: That right shall not apply to processing necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller."}, {"color": "#2B6CB0", "id": "REG-117", "label": "REG-117", "shape": "dot", "size": 20, "title": "id: REG-117\narticle: 20\nnode_type: Provision\nparagraph: 4\nsystem_name: Art20(4)\ntext: The right referred to in paragraph 1 shall not adversely affect the rights and freedoms of others."}, {"color": "#2B6CB0", "id": "REG-118", "label": "REG-118", "shape": "dot", "size": 20, "title": "id: REG-118\narticle: 21\nnode_type: Provision\nparagraph: 1\nsystem_name: Art21(1)\ntext: The data subject shall have the right to object, on grounds relating to his or her particular situation, at any time to processing of personal data concerning him or her which is based on point (e) or (f) of Article 6(1), including profiling based on those provisions."}, {"color": "#C53030", "id": "Art21", "label": "Art21", "shape": "dot", "size": 28, "title": "id: Art21\narticle_number: 21\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-119", "label": "REG-119", "shape": "dot", "size": 20, "title": "id: REG-119\narticle: 21\nnode_type: Provision\nparagraph: 1\nsystem_name: Art21(1)\ntext: The controller shall no longer process the personal data unless the controller demonstrates compelling legitimate grounds for the processing which override the interests, rights and freedoms of the data subject or for the establishment, exercise or defence of legal claims."}, {"color": "#2B6CB0", "id": "REG-120", "label": "REG-120", "shape": "dot", "size": 20, "title": "id: REG-120\narticle: 21\nnode_type: Provision\nparagraph: 2\nsystem_name: Art21(2)\ntext: Where personal data are processed for direct marketing purposes, the data subject shall have the right to object at any time to processing of personal data concerning him or her for such marketing, which includes profiling to the extent that it is related to such direct marketing."}, {"color": "#2B6CB0", "id": "REG-121", "label": "REG-121", "shape": "dot", "size": 20, "title": "id: REG-121\narticle: 21\nnode_type: Provision\nparagraph: 3\nsystem_name: Art21(3)\ntext: Where the data subject objects to processing for direct marketing purposes, the personal data shall no longer be processed for such purposes."}, {"color": "#2B6CB0", "id": "REG-122", "label": "REG-122", "shape": "dot", "size": 20, "title": "id: REG-122\narticle: 21\nnode_type: Provision\nparagraph: 4\nsystem_name: Art21(4)\ntext: At the latest at the time of the first communication with the data subject, the right referred to in paragraphs 1 and 2 shall be explicitly brought to the attention of the data subject and shall be presented clearly and separately from any other information."}, {"color": "#2B6CB0", "id": "REG-123", "label": "REG-123", "shape": "dot", "size": 20, "title": "id: REG-123\narticle: 21\nnode_type: Provision\nparagraph: 5\nsystem_name: Art21(5)\ntext: In the context of the use of information society services, and notwithstanding Directive 2002/58/EC, the data subject may exercise his or her right to object by automated means using technical specifications."}, {"color": "#2B6CB0", "id": "REG-124", "label": "REG-124", "shape": "dot", "size": 20, "title": "id: REG-124\narticle: 21\nnode_type: Provision\nparagraph: 6\nsystem_name: Art21(6)\ntext: Where personal data are processed for scientific or historical research purposes or statistical purposes pursuant to Article 89(1), the data subject, on grounds relating to his or her particular situation, shall have the right to object to processing of personal data concerning him or her, unless the processing is necessary for the performance of a task carried out for reasons of public interest."}, {"color": "#2B6CB0", "id": "REG-125", "label": "REG-125", "shape": "dot", "size": 20, "title": "id: REG-125\narticle: 22\nnode_type: Provision\nparagraph: 1\nsystem_name: Art22(1)\ntext: The data subject shall have the right not to be subject to a decision based solely on automated processing, including profiling, which produces legal effects concerning him or her or similarly significantly affects him or her."}, {"color": "#C53030", "id": "Art22", "label": "Art22", "shape": "dot", "size": 28, "title": "id: Art22\narticle_number: 22\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-126", "label": "REG-126", "shape": "dot", "size": 20, "title": "id: REG-126\narticle: 22\nnode_type: Provision\nparagraph: 2\nsystem_name: Art22(2)\ntext: Paragraph 1 shall not apply if the decision:"}, {"color": "#2B6CB0", "id": "REG-127", "label": "REG-127", "shape": "dot", "size": 20, "title": "id: REG-127\narticle: 22\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art22(2(a))\ntext: Paragraph 1 shall not apply if the decision: (a) is necessary for entering into, or performance of, a contract between the data subject and a data controller;"}, {"color": "#2B6CB0", "id": "REG-128", "label": "REG-128", "shape": "dot", "size": 20, "title": "id: REG-128\narticle: 22\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art22(2(b))\ntext: Paragraph 1 shall not apply if the decision: (b) is authorised by Union or Member State law to which the controller is subject and which also lays down suitable measures to safeguard the data subject\u0027s rights and freedoms and legitimate interests or"}, {"color": "#2B6CB0", "id": "REG-129", "label": "REG-129", "shape": "dot", "size": 20, "title": "id: REG-129\narticle: 22\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art22(2(c))\ntext: Paragraph 1 shall not apply if the decision: (c) is based on the data subject\u0027s explicit consent."}, {"color": "#2B6CB0", "id": "REG-130", "label": "REG-130", "shape": "dot", "size": 20, "title": "id: REG-130\narticle: 22\nnode_type: Provision\nparagraph: 3\nsystem_name: Art22(3)\ntext: In the cases referred to in points (a) and (c) of paragraph 2, the data controller shall implement suitable measures to safeguard the data subject\u0027s rights and freedoms and legitimate interests, at least the right to obtain human intervention on the part of the controller, to express his or her point of view and to contest the decision."}, {"color": "#2B6CB0", "id": "REG-131", "label": "REG-131", "shape": "dot", "size": 20, "title": "id: REG-131\narticle: 22\nnode_type: Provision\nparagraph: 4\nsystem_name: Art22(4)\ntext: Decisions referred to in paragraph 2 shall not be based on special categories of personal data referred to in Article 9(1), unless point (a) or (g) of Article 9(2) applies and suitable measures to safeguard the data subject\u0027s rights and freedoms and legitimate interests are in place."}, {"color": "#2B6CB0", "id": "REG-132", "label": "REG-132", "shape": "dot", "size": 20, "title": "id: REG-132\narticle: 23\nnode_type: Provision\nparagraph: 1\nsystem_name: Art23(1)\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard:"}, {"color": "#C53030", "id": "Art23", "label": "Art23", "shape": "dot", "size": 28, "title": "id: Art23\narticle_number: 23\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-133", "label": "REG-133", "shape": "dot", "size": 20, "title": "id: REG-133\narticle: 23\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art23(1(a))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (a) national security;"}, {"color": "#2B6CB0", "id": "REG-134", "label": "REG-134", "shape": "dot", "size": 20, "title": "id: REG-134\narticle: 23\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art23(1(b))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (b) defence;"}, {"color": "#2B6CB0", "id": "REG-135", "label": "REG-135", "shape": "dot", "size": 20, "title": "id: REG-135\narticle: 23\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art23(1(c))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (c) public security;"}, {"color": "#2B6CB0", "id": "REG-136", "label": "REG-136", "shape": "dot", "size": 20, "title": "id: REG-136\narticle: 23\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art23(1(d))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (d) the prevention, investigation, detection or prosecution of criminal offences or the execution of criminal penalties, including the safeguarding against and the prevention of threats to public security;"}, {"color": "#2B6CB0", "id": "REG-137", "label": "REG-137", "shape": "dot", "size": 20, "title": "id: REG-137\narticle: 23\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art23(1(e))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (e) other important objectives of general public interest of the Union or of a Member State, in particular an important economic or financial interest of the Union or of a Member State, including monetary, budgetary and taxation a matters, public health and social security;"}, {"color": "#2B6CB0", "id": "REG-138", "label": "REG-138", "shape": "dot", "size": 20, "title": "id: REG-138\narticle: 23\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art23(1(f))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (f) the protection of judicial independence and judicial proceedings;"}, {"color": "#2B6CB0", "id": "REG-139", "label": "REG-139", "shape": "dot", "size": 20, "title": "id: REG-139\narticle: 23\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art23(1(g))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (g) the prevention, investigation, detection and prosecution of breaches of ethics for regulated professions;"}, {"color": "#2B6CB0", "id": "REG-140", "label": "REG-140", "shape": "dot", "size": 20, "title": "id: REG-140\narticle: 23\nnode_type: Provision\nparagraph: 1(h)\nsystem_name: Art23(1(h))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (h) a monitoring, inspection or regulatory function connected, even occasionally, to the exercise of official authority in the cases referred to in points (a) to (e) and (g);"}, {"color": "#2B6CB0", "id": "REG-141", "label": "REG-141", "shape": "dot", "size": 20, "title": "id: REG-141\narticle: 23\nnode_type: Provision\nparagraph: 1(i)\nsystem_name: Art23(1(i))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (i) the protection of the data subject or the rights and freedoms of others;"}, {"color": "#2B6CB0", "id": "REG-142", "label": "REG-142", "shape": "dot", "size": 20, "title": "id: REG-142\narticle: 23\nnode_type: Provision\nparagraph: 1(j)\nsystem_name: Art23(1(j))\ntext: Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article 5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure in a democratic society to safeguard: (j) the enforcement of civil law claims."}, {"color": "#2B6CB0", "id": "REG-143", "label": "REG-143", "shape": "dot", "size": 20, "title": "id: REG-143\narticle: 23\nnode_type: Provision\nparagraph: 2\nsystem_name: Art23(2)\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to:"}, {"color": "#2B6CB0", "id": "REG-144", "label": "REG-144", "shape": "dot", "size": 20, "title": "id: REG-144\narticle: 23\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art23(2(a))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (a) the purposes of the processing or categories of processing;"}, {"color": "#2B6CB0", "id": "REG-145", "label": "REG-145", "shape": "dot", "size": 20, "title": "id: REG-145\narticle: 23\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art23(2(b))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (b) the categories of personal data;"}, {"color": "#2B6CB0", "id": "REG-146", "label": "REG-146", "shape": "dot", "size": 20, "title": "id: REG-146\narticle: 23\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art23(2(c))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (c) the scope of the restrictions introduced;"}, {"color": "#2B6CB0", "id": "REG-147", "label": "REG-147", "shape": "dot", "size": 20, "title": "id: REG-147\narticle: 23\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art23(2(d))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (d) the safeguards to prevent abuse or unlawful access or transfer;"}, {"color": "#2B6CB0", "id": "REG-148", "label": "REG-148", "shape": "dot", "size": 20, "title": "id: REG-148\narticle: 23\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art23(2(e))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (e) the specification of the controller or categories of controllers;"}, {"color": "#2B6CB0", "id": "REG-149", "label": "REG-149", "shape": "dot", "size": 20, "title": "id: REG-149\narticle: 23\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art23(2(f))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (f) the storage periods and the applicable safeguards taking into account the nature, scope and purposes of the processing or categories of processing;"}, {"color": "#2B6CB0", "id": "REG-150", "label": "REG-150", "shape": "dot", "size": 20, "title": "id: REG-150\narticle: 23\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art23(2(g))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (g) the risks to the rights and freedoms of data subjects; and"}, {"color": "#2B6CB0", "id": "REG-151", "label": "REG-151", "shape": "dot", "size": 20, "title": "id: REG-151\narticle: 23\nnode_type: Provision\nparagraph: 2(h)\nsystem_name: Art23(2(h))\ntext: In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where relevant, as to: (h) the right of data subjects to be informed about the restriction, unless that may be prejudicial to the purpose of the restriction."}, {"color": "#2B6CB0", "id": "REG-152", "label": "REG-152", "shape": "dot", "size": 20, "title": "id: REG-152\narticle: 26\nnode_type: Provision\nparagraph: 1\nsystem_name: Art26(1)\ntext: Where two or more controllers jointly determine the purposes and means of processing, they shall be joint controllers."}, {"color": "#C53030", "id": "Art26", "label": "Art26", "shape": "dot", "size": 28, "title": "id: Art26\narticle_number: 26\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-153", "label": "REG-153", "shape": "dot", "size": 20, "title": "id: REG-153\narticle: 26\nnode_type: Provision\nparagraph: 1\nsystem_name: Art26(1)\ntext: They shall in a transparent manner determine their respective responsibilities for compliance with the obligations under this Regulation, in particular as regards the exercising of the rights of the data subject and their respective duties to provide the information referred to in Articles 13 and 14, by means of an arrangement between them unless, and in so far as, the respective responsibilities of the controllers are determined by Union or Member State law to which the controllers are subject."}, {"color": "#2B6CB0", "id": "REG-154", "label": "REG-154", "shape": "dot", "size": 20, "title": "id: REG-154\narticle: 26\nnode_type: Provision\nparagraph: 1\nsystem_name: Art26(1)\ntext: The arrangement may designate a contact point for data subjects."}, {"color": "#2B6CB0", "id": "REG-155", "label": "REG-155", "shape": "dot", "size": 20, "title": "id: REG-155\narticle: 26\nnode_type: Provision\nparagraph: 2\nsystem_name: Art26(2)\ntext: The arrangement referred to in paragraph 1 shall duly reflect the respective roles and relationships of the joint controllers vis-\u00e0-vis the data subjects."}, {"color": "#2B6CB0", "id": "REG-156", "label": "REG-156", "shape": "dot", "size": 20, "title": "id: REG-156\narticle: 26\nnode_type: Provision\nparagraph: 2\nsystem_name: Art26(2)\ntext: The essence of the arrangement shall be made available to the data subject."}, {"color": "#2B6CB0", "id": "REG-157", "label": "REG-157", "shape": "dot", "size": 20, "title": "id: REG-157\narticle: 26\nnode_type: Provision\nparagraph: 3\nsystem_name: Art26(3)\ntext: Irrespective of the terms of the arrangement referred to in paragraph 1, the data subject may exercise his or her rights under this Regulation in respect of and against each of the controllers."}, {"color": "#2B6CB0", "id": "REG-158", "label": "REG-158", "shape": "dot", "size": 20, "title": "id: REG-158\narticle: 33\nnode_type: Provision\nparagraph: 1\nsystem_name: Art33(1)\ntext: In the case of a personal data breach, the controller shall without undue delay and, where feasible, not later than 72 hours after having become aware of it, notify the personal data breach to the supervisory authority competent in accordance with Article 55, unless the personal data breach is unlikely to result in a risk to the rights and freedoms of natural persons."}, {"color": "#C53030", "id": "Art33", "label": "Art33", "shape": "dot", "size": 28, "title": "id: Art33\narticle_number: 33\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-159", "label": "REG-159", "shape": "dot", "size": 20, "title": "id: REG-159\narticle: 33\nnode_type: Provision\nparagraph: 1\nsystem_name: Art33(1)\ntext: Where the notification to the supervisory authority is not made within 72 hours, it shall be accompanied by reasons for the delay."}, {"color": "#2B6CB0", "id": "REG-160", "label": "REG-160", "shape": "dot", "size": 20, "title": "id: REG-160\narticle: 33\nnode_type: Provision\nparagraph: 2\nsystem_name: Art33(2)\ntext: The processor shall notify the controller without undue delay after becoming aware of a personal data breach."}, {"color": "#2B6CB0", "id": "REG-161", "label": "REG-161", "shape": "dot", "size": 20, "title": "id: REG-161\narticle: 33\nnode_type: Provision\nparagraph: 3\nsystem_name: Art33(3)\ntext: The notification referred to in paragraph 1 shall at least:"}, {"color": "#2B6CB0", "id": "REG-162", "label": "REG-162", "shape": "dot", "size": 20, "title": "id: REG-162\narticle: 33\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art33(3(a))\ntext: The notification referred to in paragraph 1 shall at least: (a) describe the nature of the personal data breach including where possible, the categories and approximate number of data subjects concerned and the categories and approximate number of personal data records concerned;"}, {"color": "#2B6CB0", "id": "REG-163", "label": "REG-163", "shape": "dot", "size": 20, "title": "id: REG-163\narticle: 33\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art33(3(b))\ntext: The notification referred to in paragraph 1 shall at least: (b) communicate the name and contact details of the data protection officer or other contact point where more information can be obtained;"}, {"color": "#2B6CB0", "id": "REG-164", "label": "REG-164", "shape": "dot", "size": 20, "title": "id: REG-164\narticle: 33\nnode_type: Provision\nparagraph: 3(c)\nsystem_name: Art33(3(c))\ntext: The notification referred to in paragraph 1 shall at least: (c) describe the likely consequences of the personal
