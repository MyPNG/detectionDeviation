t that at least one of the following applies: (d) processing is necessary in order to protect the vital interests of the data subject or of another natural person;"}, {"color": "#2B6CB0", "id": "REG-006", "label": "REG-006", "shape": "dot", "size": 20, "title": "id: REG-006\narticle: 6\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art6(1(e))\ntext: Processing shall be lawful only if and to the extent that at least one of the following applies: (e) processing is necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller;"}, {"color": "#2B6CB0", "id": "REG-007", "label": "REG-007", "shape": "dot", "size": 20, "title": "id: REG-007\narticle: 6\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art6(1(f))\ntext: Processing shall be lawful only if and to the extent that at least one of the following applies: (f) processing is necessary for the purposes of the legitimate interests pursued by the controller or by a third party, except where such interests are overridden by the interests or fundamental rights and freedoms of the data subject which require protection of personal data, in particular where the data subject is a child. Point (f) of the first subparagraph shall not apply to processing carried out by public authorities in the performance of their tasks."}, {"color": "#2B6CB0", "id": "REG-008", "label": "REG-008", "shape": "dot", "size": 20, "title": "id: REG-008\narticle: 6\nnode_type: Provision\nparagraph: 2\nsystem_name: Art6(2)\ntext: Member States may maintain or introduce more specific provisions to adapt the application of the rules of this Regulation with regard to processing for compliance with points (c) and (e) of paragraph 1 by determining more precisely specific requirements for the processing and other measures to ensure lawful and fair processing including for other specific processing situations as provided for in Chapter IX."}, {"color": "#2B6CB0", "id": "RE ape": "dot", "size": 20, "title": "id: REG-012\narticle: 6\nnode_type: Provision\nparagraph: 4\nsystem_name: Art6(4)\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia:"}, {"color": "#2B6CB0", "id": "REG-013", "label": "REG-013", "shape": "dot", "size": 20, "title": "id: REG-013\narticle: 6\nnode_type: Provision\nparagraph: 4(a)\nsystem_name: Art6(4(a))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (a) any link between the purposes for which the personal data have been collected and the purposes of the intended further processing;"}, {"color": "#2B6CB0", "id": "REG-014", "label": "REG-014", "shape": "dot", "size": 20, "title": "id: REG-014\narticle: 6\nnode_type: Provision\nparagraph: 4(b)\nsystem_name: Art6(4(b))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (b) the context in which the personal data have been collected, in particular regarding the relationship between data subjects and the controller;"}, {"color": "#2B6CB0", "id": "REG-015", "label": "REG-015", "shape": "dot", "size": 20, "title": "id: REG-015\narticle: 6\nnode_type: Provision\nparagraph: 4(c)\nsystem_name: Art6(4(c))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (c) the nature of the personal data, in particular whether special categories of personal data are processed, pursuant to Article 9, or whether personal data related to criminal convictions and offences are processed, pursuant to Article 10;"}, {"color": "#2B6CB0", "id": "REG-016", "label": "REG-016", "shape": "dot", "size": 20, "title": "id: REG-016\narticle: 6\nnode_type: Provision\nparagraph: 4(d)\nsystem_name: Art6(4(d))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (d) the possible consequences of the intended further processing for data subjects;"}, {"color": "#2B6CB0", "id": "REG-017", "label": "REG-017", "shape": "dot", "size": 20, "title": "id: REG-017\narticle: 6\nnode_type: Provision\nparagraph: 4(e)\nsystem_name: Art6(4(e))\ntext: Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject\u0027s consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia: (e) the existence of appropriate safeguards, which may include encryption or pseudonymisation."}, {"color": "#2B6CB0", "id": "REG-018", "label": "REG-018", "shape": "dot", "size": 20, "title": "id: REG-018\narticle: 13\nnode_type: Provision\nparagraph: 1\nsystem_name: Art13(1)\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information:"}, {"color": "#C53030", "id": "Art13", "label": "Art13", "shape": "dot", "size": 28, "title": "id: Art13\narticle_number: 13\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-019", "label": "REG-019", "shape": "dot", "size": 20, "title": "id: REG-019\narticle: 13\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art13(1(a))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (a) the identity and the contact details of the controller and, where applicable, of the controller\u0027s representative;"}, {"color": "#2B6CB0", "id": "REG-020", "label": "REG-020", "shape": "dot", "size": 20, "title": "id: REG-020\narticle: 13\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art13(1(b))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (b) the contact details of the data protection officer, where applicable;"}, {"color": "#2B6CB0", "id": "REG-021", "label": "REG-021", "shape": "dot", "size": 20, "title": "id: REG-021\narticle: 13\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art13(1(c))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (c) the purposes of the processing for which the personal data are intended as well as the legal basis for the processing;"}, {"color": "#2B6CB0", "id": "REG-022", "label": "REG-022", "shape": "dot", "size": 20, "title": "id: REG-022\narticle: 13\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art13(1(d))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (d) where the processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party;"}, {"color": "#2B6CB0", "id": "REG-023", "label": "REG-023", "shape": "dot", "size": 20, "title": "id: REG-023\narticle: 13\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art13(1(e))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (e) the recipients or categories of recipients of the personal data, if any;"}, {"color": "#2B6CB0", "id": "REG-024", "label": "REG-024", "shape": "dot", "size": 20, "title": "id: REG-024\narticle: 13\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art13(1(f))\ntext: Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time when personal data are obtained, provide the data subject with all of the following information: (f) where applicable, the fact that the controller intends to transfer personal data to a third country or international organisation and the existence or absence of an adequacy decision by the Commission, or in the case of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate or suitable safeguards and the means by which to obtain a copy of them or where they have been made available."}, {"color": "#2B6CB0", "id": "REG-025", "label": "REG-025", "shape": "dot", "size": 20, "title": "id: REG-025\narticle: 13\nnode_type: Provision\nparagraph: 2\nsystem_name: Art13(2)\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing:"}, {"color": "#2B6CB0", "id": "REG-026", "label": "REG-026", "shape": "dot", "size": 20, "title": "id: REG-026\narticle: 13\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art13(2(a))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (a) the period for which the personal data will be stored, or if that is not possible, the criteria used to determine that period;"}, {"color": "#2B6CB0", "id": "REG-027", "label": "REG-027", "shape": "dot", "size": 20, "title": "id: REG-027\narticle: 13\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art13(2(b))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (b) the existence of the right to request from the controller access to and rectification or erasure of personal data or restriction of processing concerning the data subject or to object to processing as well as the right to data portability;"}, {"color": "#2B6CB0", "id": "REG-028", "label": "REG-028", "shape": "dot", "size": 20, "title": "id: REG-028\narticle: 13\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art13(2(c))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (c) where the processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on consent before its withdrawal;"}, {"color": "#2B6CB0", "id": "REG-029", "label": "REG-029", "shape": "dot", "size": 20, "title": "id: REG-029\narticle: 13\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art13(2(d))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (d) the right to lodge a complaint with a supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-030", "label": "REG-030", "shape": "dot", "size": 20, "title": "id: REG-030\narticle: 13\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art13(2(e))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (e) whether the provision of personal data is a statutory or contractual requirement, or a requirement necessary to enter into a contract, as well as whether the data subject is obliged to provide the personal data and of the possible consequences of failure to provide such data;"}, {"color": "#2B6CB0", "id": "REG-031", "label": "REG-031", "shape": "dot", "size": 20, "title": "id: REG-031\narticle: 13\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art13(2(f))\ntext: In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: (f) the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged consequences of such processing for the data subject."}, {"color": "#2B6CB0", "id": "REG-032", "label": "REG-032", "shape": "dot", "size": 20, "title": "id: REG-032\narticle: 13\nnode_type: Provision\nparagraph: 3\nsystem_name: Art13(3)\ntext: Where the controller intends to further process the personal data for a purpose other than that for which the personal data were collected, the controller shall provide the data subject prior to that further processing with information on that other purpose and with any relevant further information as referred to in paragraph 2."}, {"color": "#2B6CB0", "id": "REG-033", "label": "REG-033", "shape": "dot", "size": 20, "title": "id: REG-033\narticle: 13\nnode_type: Provision\nparagraph: 4\nsystem_name: Art13(4)\ntext: Paragraphs 1, 2 and 3 shall not apply where and insofar as the data subject already has the information."}, {"color": "#2B6CB0", "id": "REG-034", "label": "REG-034", "shape": "dot", "size": 20, "title": "id: REG-034\narticle: 14\nnode_type: Provision\nparagraph: 1\nsystem_name: Art14(1)\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information:"}, {"color": "#C53030", "id": "Art14", "label": "Art14", "shape": "dot", "size": 28, "title": "id: Art14\narticle_number: 14\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-035", "label": "REG-035", "shape": "dot", "size": 20, "title": "id: REG-035\narticle: 14\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art14(1(a))\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information: (a) the identity and the contact details of the controller and, where applicable, of the controller\u0027s representative;"}, {"color": "#2B6CB0", "id": "REG-036", "label": "REG-036", "shape": "dot", "size": 20, "title": "id: REG-036\narticle: 14\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art14(1(b))\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information: (b) the contact details of the data protection officer, where applicable;"}, {"color": "#2B6CB0", "id": "REG-037", "label": "REG-037", "shape": "dot", "size": 20, "title": "id: REG-037\narticle: 14\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art14(1(c))\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information: (c) the purposes of the processing for which the personal data are intended as well as the legal basis for the processing;"}, {"color": "#2B6CB0", "id": "REG-038", "label": "REG-038", "shape": "dot", "size": 20, "title": "id: REG-038\narticle: 14\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art14(1(d))\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information: (d) the categories of personal data concerned;"}, {"color": "#2B6CB0", "id": "REG-039", "label": "REG-039", "shape": "dot", "size": 20, "title": "id: REG-039\narticle: 14\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art14(1(e))\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information: (e) the recipients or categories of recipients of the personal data, if any;"}, {"color": "#2B6CB0", "id": "REG-040", "label": "REG-040", "shape": "dot", "size": 20, "title": "id: REG-040\narticle: 14\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art14(1(f))\ntext: Where personal data have not been obtained from the data subject, the controller shall provide the data subject with the following information: (f) where applicable, that the controller intends to transfer personal data to a recipient in a third country or internat ional organisation and the existence or absence of an adequacy decision by the Commission, or in the case of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate or suitable safeguards and the means to obtain a copy of them or where they have been made available."}, {"color": "#2B6CB0", "id": "REG-041", "label": "REG-041", "shape": "dot", "size": 20, "title": "id: REG-041\narticle: 14\nnode_type: Provision\nparagraph: 2\nsystem_name: Art14(2)\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject:"}, {"color": "#2B6CB0", "id": "REG-042", "label": "REG-042", "shape": "dot", "size": 20, "title": "id: REG-042\narticle: 14\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art14(2(a))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (a) the period for which the personal data will be stored, or if that is not possible, the criteria used to determine that period;"}, {"color": "#2B6CB0", "id": "REG-043", "label": "REG-043", "shape": "dot", "size": 20, "title": "id: REG-043\narticle: 14\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art14(2(b))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (b) where the processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party;"}, {"color": "#2B6CB0", "id": "REG-044", "label": "REG-044", "shape": "dot", "size": 20, "title": "id: REG-044\narticle: 14\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art14(2(c))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (c) the existence of the right to request from the controller access to and rectification or erasure of personal data or restriction of processing concerning the data subject and to object to processing as well as the right to data portability;"}, {"color": "#2B6CB0", "id": "REG-045", "label": "REG-045", "shape": "dot", "size": 20, "title": "id: REG-045\narticle: 14\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art14(2(d))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (d) where processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on consent before its withdrawal;"}, {"color": "#2B6CB0", "id": "REG-046", "label": "REG-046", "shape": "dot", "size": 20, "title": "id: REG-046\narticle: 14\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art14(2(e))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (e) the right to lodge a complaint with a supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-047", "label": "REG-047", "shape": "dot", "size": 20, "title": "id: REG-047\narticle: 14\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art14(2(f))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (f) from which source the personal data originate, and if applicable, whether it came from publicly accessible sources;"}, {"color": "#2B6CB0", "id": "REG-048", "label": "REG-048", "shape": "dot", "size": 20, "title": "id: REG-048\narticle: 14\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art14(2(g))\ntext: In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following information necessary to ensure fair and transparent processing in respect of the data subject: (g) the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged consequences of such processing for the data subject."}, {"color": "#2B6CB0", "id": "REG-049", "label": "REG-049", "shape": "dot", "size": 20, "title": "id: REG-049\narticle: 14\nnode_type: Provision\nparagraph: 3\nsystem_name: Art14(3)\ntext: The controller shall provide the information referred to in paragraphs 1 and 2:"}, {"color": "#2B6CB0", "id": "REG-050", "label": "REG-050", "shape": "dot", "size": 20, "title": "id: REG-050\narticle: 14\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art14(3(a))\ntext: The controller shall provide the information referred to in paragraphs 1 and 2: (a) within a reasonable period after obtaining the personal data, but at the latest within one month, having regard to the specific circumstances in which the personal data are processed;"}, {"color": "#2B6CB0", "id": "REG-051", "label": "REG-051", "shape": "dot", "size": 20, "title": "id: REG-051\narticle: 14\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art14(3(b))\ntext: The controller shall provide the information referred to in paragraphs 1 and 2: (b) if the personal data are to be used for communication with the data subject, at the latest at the time of the first communication to that data subject; or"}, {"color": "#2B6CB0", "id": "REG-052", "label": "REG-052", "shape": "dot", "size": 20, "title": "id: REG-052\narticle: 14\nnode_type: Provision\nparagraph: 3(c)\nsystem_name: Art14(3(c))\ntext: The controller shall provide the information referred to in paragraphs 1 and 2: (c) if a disclosure to another recipient is envisaged, at the latest when the personal data are first disclosed."}, {"color": "#2B6CB0", "id": "REG-053", "label": "REG-053", "shape": "dot", "size": 20, "title": "id: REG-053\narticle: 14\nnode_type: Provision\nparagraph: 4\nsystem_name: Art14(4)\ntext: Where the controller intends to further process the personal data for a purpose other than that for which the personal data were obtained, the controller shall provide the data subject prior to that further processing with information on that other purpose and with any relevant further information as referred to in paragraph 2."}, {"color": "#2B6CB0", "id": "REG-054", "label": "REG-054", "shape": "dot", "size": 20, "title": "id: REG-054\narticle: 14\nnode_type: Provision\nparagraph: 5\nsystem_name: Art14(5)\ntext: Paragraphs 1 to 4 shall not apply where and insofar as:"}, {"color": "#2B6CB0", "id": "REG-055", "label": "REG-055", "shape": "dot", "size": 20, "title": "id: REG-055\narticle: 14\nnode_type: Provision\nparagraph: 5(a)\nsystem_name: Art14(5(a))\ntext: Paragraphs 1 to 4 shall not apply where and insofar as: (a) the data subject already has the information;"}, {"color": "#2B6CB0", "id": "REG-056", "label": "REG-056", "shape": "dot", "size": 20, "title": "id: REG-056\narticle: 14\nnode_type: Provision\nparagraph: 5(b)\nsystem_name: Art14(5(b))\ntext: Paragraphs 1 to 4 shall not apply where and insofar as: (b) the provision of such information proves impossible or would involve a disproportionate effort, in particular for processing for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, subject to the conditions and safeguards referred to in Article 89(1) or in so far as the obligation referred to in paragraph 1 of this Article is likely to render impossible or seriously impair the achievement of the objectives of that processing."}, {"color": "#2B6CB0", "id": "REG-057", "label": "REG-057", "shape": "dot", "size": 20, "title": "id: REG-057\narticle: 14\nnode_type: Provision\nparagraph: 5(b)\nsystem_name: Art14(5(b))\ntext: In such cases the controller shall take appropriate measures to protect the data subject\u0027s rights and freedoms and legitimate interests, including making the information publicly available;"}, {"color": "#2B6CB0", "id": "REG-058", "label": "REG-058", "shape": "dot", "size": 20, "title": "id: REG-058\narticle: 14\nnode_type: Provision\nparagraph: 5(c)\nsystem_name: Art14(5(c))\ntext: Paragraphs 1 to 4 shall not apply where and insofar as: (c) obtaining or disclosure is expressly laid down by Union or Member State law to which the controller is subject and which provides appropriate measures to protect the data subject\u0027s legitimate interests or"}, {"color": "#2B6CB0", "id": "REG-059", "label": "REG-059", "shape": "dot", "size": 20, "title": "id: REG-059\narticle: 14\nnode_type: Provision\nparagraph: 5(d)\nsystem_name: Art14(5(d))\ntext: Paragraphs 1 to 4 shall not apply where and insofar as: (d) where the personal data must remain confidential subject to an obligation of professional secrecy regulated by Union or Member State law, including a statutory obligation of secrecy."}, {"color": "#2B6CB0", "id": "REG-060", "label": "REG-060", "shape": "dot", "size": 20, "title": "id: REG-060\narticle: 15\nnode_type: Provision\nparagraph: 1\nsystem_name: Art15(1)\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information:"}, {"color": "#C53030", "id": "Art15", "label": "Art15", "shape": "dot", "size": 28, "title": "id: Art15\narticle_number: 15\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-061", "label": "REG-061", "shape": "dot", "size": 20, "title": "id: REG-061\narticle: 15\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art15(1(a))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (a) the purposes of the processing;"}, {"color": "#2B6CB0", "id": "REG-062", "label": "REG-062", "shape": "dot", "size": 20, "title": "id: REG-062\narticle: 15\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art15(1(b))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (b) the categories of personal data concerned;"}, {"color": "#2B6CB0", "id": "REG-063", "label": "REG-063", "shape": "dot", "size": 20, "title": "id: REG-063\narticle: 15\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art15(1(c))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (c) the recipients or categories of recipient to whom the personal data have been"}, {"color": "#2B6CB0", "id": "REG-064", "label": "REG-064", "shape": "dot", "size": 20, "title": "id: REG-064\narticle: 15\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art15(1(c))\ntext: or will be disclosed, in particular recipients in third countries or international organisations;"}, {"color": "#2B6CB0", "id": "REG-065", "label": "REG-065", "shape": "dot", "size": 20, "title": "id: REG-065\narticle: 15\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art15(1(d))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (d) where possible, the envisaged period for which the personal data will be stored, or, if not possible, the criteria used to determine that period;"}, {"color": "#2B6CB0", "id": "REG-066", "label": "REG-066", "shape": "dot", "size": 20, "title": "id: REG-066\narticle: 15\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art15(1(e))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (e) the existence of the right to request from the controller rectification or erasure of personal data or restriction of processing of personal data concerning the data subject or to object to such processing;"}, {"color": "#2B6CB0", "id": "REG-067", "label": "REG-067", "shape": "dot", "size": 20, "title": "id: REG-067\narticle: 15\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art15(1(f))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (f) the right to lodge a complaint with a supervisory authority;"}, {"color": "#2B6CB0", "id": "REG-068", "label": "REG-068", "shape": "dot", "size": 20, "title": "id: REG-068\narticle: 15\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art15(1(g))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (g) where the personal data are not collected from the data subject, any available information as to their source;"}, {"color": "#2B6CB0", "id": "REG-069", "label": "REG-069", "shape": "dot", "size": 20, "title": "id: REG-069\narticle: 15\nnode_type: Provision\nparagraph: 1(h)\nsystem_name: Art15(1(h))\ntext: The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data concerning him or her are being processed, and, where that is the case, access to the personal data and the following information: (h) the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged consequences of such processing for the data subject."}, {"color": "#2B6CB0", "id": "REG-070", "label": "REG-070", "shape": "dot", "size": 20, "title": "id: REG-070\narticle: 15\nnode_type: Provision\nparagraph: 2\nsystem_name: Art15(2)\ntext: Where personal data are transferred to a third country or to an international organisation, the data subject shall have the right to be informed of the appropriate safeguards pursuant to Article 46 relating to the transfer."}, {"color": "#2B6CB0", "id": "REG-071", "label": "REG-071", "shape": "dot", "size": 20, "title": "id: REG-071\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: The controller shall provide a copy of the personal data undergoing processing."}, {"color": "#2B6CB0", "id": "REG-072", "label": "REG-072", "shape": "dot", "size": 20, "title": "id: REG-072\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: For any further copies requested by the data subject, the controller may charge a reasonable fee based on administrative costs."}, {"color": "#2B6CB0", "id": "REG-073", "label": "REG-073", "shape": "dot", "size": 20, "title": "id: REG-073\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: Where the data subject makes the request by electronic means, and unless otherwise requested by the data subject, the information shall be provided in a commonly used electronic form."}, {"color": "#2B6CB0", "id": "REG-074", "label": "REG-074", "shape": "dot", "size": 20, "title": "id: REG-074\narticle: 15\nnode_type: Provision\nparagraph: 4\nsystem_name: Art15(4)\ntext: The right to obtain a copy referred to in paragraph 3 shall not adversely affect the rights and freedoms of others."}, {"color": "#2B6CB0", "id": "REG-075", "label": "REG-075", "shape": "dot", "size": 20, "title": "id: REG-075\narticle: 17\nnode_type: Provision\nparagraph: 1\nsystem_name: Art17(1)\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#C53030", "id": "Art17", "label": "Art17", "shape": "dot", "size": 28, "title": "id: Art17\narticle_number: 17\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-076", "label": "REG-076", "shape": "dot", "size": 20, "title": "id: REG-076\narticle: 17\nnode_type: Provision\nparagraph: 1\nsystem_name: Art17(1)\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies:"}, {"color": "#2B6CB0", "id": "REG-077", "label": "REG-077", "shape": "dot", "size": 20, "title": "id: REG-077\narticle: 17\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art17(1(a))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-078", "label": "REG-078", "shape": "dot", "size": 20, "title": "id: REG-078\narticle: 17\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art17(1(a))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (a) the personal data are no longer necessary in relation to the purposes for which they were collected or otherwise processed;"}, {"color": "#2B6CB0", "id": "REG-079", "label": "REG-079", "shape": "dot", "size": 20, "title": "id: REG-079\narticle: 17\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art17(1(b))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-080", "label": "REG-080", "shape": "dot", "size": 20, "title": "id: REG-080\narticle: 17\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art17(1(b))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (b) the data subject withdraws consent on which the processing is based according to point (a) of Article 6(1), or point (a) of Article 9(2), and where there is no other legal ground for the processing;"}, {"color": "#2B6CB0", "id": "REG-081", "label": "REG-081", "shape": "dot", "size": 20, "title": "id: REG-081\narticle: 17\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art17(1(c))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-082", "label": "REG-082", "shape": "dot", "size": 20, "title": "id: REG-082\narticle: 17\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art17(1(c))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (c) the data subject objects to the processing pursuant to Article 21(1) and there are no overriding legitimate grounds for the processing, or the data subject objects to the processing pursuant to Article 21(2);"}, {"color": "#2B6CB0", "id": "REG-083", "label": "REG-083", "shape": "dot", "size": 20, "title": "id: REG-083\narticle: 17\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art17(1(d))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-084", "label": "REG-084", "shape": "dot", "size": 20, "title": "id: REG-084\narticle: 17\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art17(1(d))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (d) the personal data have been unlawfully processed;"}, {"color": "#2B6CB0", "id": "REG-085", "label": "REG-085", "shape": "dot", "size": 20, "title": "id: REG-085\narticle: 17\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art17(1(e))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-086", "label": "REG-086", "shape": "dot", "size": 20, "title": "id: REG-086\narticle: 17\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art17(1(e))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (e) the personal data have to be erased for compliance with a legal obligation in Union or Member State law to which the controller is subject;"}, {"color": "#2B6CB0", "id": "REG-087", "label": "REG-087", "shape": "dot", "size": 20, "title": "id: REG-087\narticle: 17\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art17(1(f))\ntext: The data subject shall have the right to obtain from the controller the erasure of personal data concerning him or her without undue delay"}, {"color": "#2B6CB0", "id": "REG-088", "label": "REG-088", "shape": "dot", "size": 20, "title": "id: REG-088\narticle: 17\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art17(1(f))\ntext: and the controller shall have the obligation to erase personal data without undue delay where one of the following grounds applies: (f) the personal data have been collected in relation to the offer of information society services referred to in Article 8(1)."}, {"color": "#2B6CB0", "id": "REG-089", "label": "REG-089", "shape": "dot", "size": 20, "title": "id: REG-089\narticle: 17\nnode_type: Provision\nparagraph: 2\nsystem_name: Art17(2)\ntext: Where the controller has made the personal data public and is obliged pursuant to paragraph 1 to erase the personal data, the controller, taking account of available technology and the cost of implementation, shall take reasonable steps, including technical measures, to inform controllers which are processing the personal data that the data subject has requested the erasure by such controllers of any links to, or copy or replication of, those personal data."}, {"color": "#2B6CB0", "id": "REG-090", "label": "REG-090", "shape": "dot", "size": 20, "title": "id: REG-090\narticle: 17\nnode_type: Provision\nparagraph: 3\nsystem_name: Art17(3)\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary:"}, {"color": "#2B6CB0", "id": "REG-091", "label": "REG-091", "shape": "dot", "size": 20, "title": "id: REG-091\narticle: 17\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art17(3(a))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (a) for exercising the right of freedom of expression and information;"}, {"color": "#2B6CB0", "id": "REG-092", "label": "REG-092", "shape": "dot", "size": 20, "title": "id: REG-092\narticle: 17\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art17(3(b))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (b) for compliance with a legal obligation which requires processing by Union or Member State law to which the controller is subject or for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller;"}, {"color": "#2B6CB0", "id": "REG-093", "label": "REG-093", "shape": "dot", "size": 20, "title": "id: REG-093\narticle: 17\nnode_type: Provision\nparagraph: 3(c)\nsystem_name: Art17(3(c))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (c) for reasons of public interest in the area of public health in accordance with points (h) and (i) of Article 9(2) as well as Article 9(3);"}, {"color": "#2B6CB0", "id": "REG-094", "label": "REG-094", "shape": "dot", "size": 20, "title": "id: REG-094\narticle: 17\nnode_type: Provision\nparagraph: 3(d)\nsystem_name: Art17(3(d))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (d) for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) in so far as the right referred to in paragraph 1 is likely to render impossible or seriously impair the achievement of the objectives of that processing or"}, {"color": "#2B6CB0", "id": "REG-095", "label": "REG-095", "shape": "dot", "size": 20, "title": "id: REG-095\narticle: 17\nnode_type: Provision\nparagraph: 3(e)\nsystem_name: Art17(3(e))\ntext: Paragraphs 1 and 2 shall not apply to the extent that processing is necessary: (e) for the establishment, exercise or defence of legal claims."}, {"color": "#2B6CB0", "id": "REG-096", "label": "REG-096", "shape": "dot", "size": 20, "title": "id: REG-096\narticle: 18\nnode_type: Provision\nparagraph: 1\nsystem_name: Art18(1)\ntext: The data subject shall have the right to obtain from the controller restriction of processing where one of the following applies:"}, {"color": "#C53030", "id": "Art18", "label": "Art18", "shape": "dot", "size": 28, "title": "id: Art18\narticle_number: 18\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-097", "label": "REG-097", "shape": "dot", "size": 20, "title": "id: REG-097\narticle: 18\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art18(1(a))\ntext: The data subject shall have the right to obtain from the controller restriction of processing where one of the following applies: (a) the accuracy of the personal data is contested by the data subject, for a period enabling the controller to verify the accuracy of the personal data;"}, {"color": "#2B6CB0", "id": "REG-098", "label": "REG-098", "shape": "dot", "size": 20, "title": "id: REG-098\narticle: 18\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art18(1(b))\ntext: The data subject shall have the right to obtain from the controller restriction of processing where one of the following applies: (b) the processing is unlawful and the data subject opposes the erasure of the personal data and requests the restriction of their use instead;"}, {"color": "#2B6CB0", "id": "REG-099", "label": "REG-099", "shape": "dot", "size": 20, "title": "id: REG-099\narticle: 18\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art18(1(c))\ntext: The data subject shall have the right to obtain from the controller restriction of processing where one of the following applies: (c) the controller no longer needs the personal data for the purposes of the processing, but they are required by the data subject for the establishment, exercise or defence of legal claims;"}, {"color": "#2B6CB0", "id": "REG-100", "label": "REG-100", "shape": "dot", "size": 20, "title": "id: REG-100\narticle: 18\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art18(1(d))\ntext: The data subject shall have the right to obtain from the controller restriction of processing where one of the following applies: (d) the data subject has objected to processing pursuant to Article 21(1) pending the verification whether the legitimate grounds of the controller override those of the data subject."}, {"color": "#2B6CB0", "id": "REG-101", "label": "REG-101", "shape": "dot", "size": 20, "title": "id: REG-101\narticle: 18\nnode_type: Provision\nparagraph: 2\nsystem_name: Art18(2)\ntext: Where processing has been restricted under paragraph 1, such personal data shall, with the exception of storage, only be processed with the data subject\u0027s consent or for the establishment, exercise or defence of legal claims or for the protection of the rights of another natural or legal person or for reasons of important public interest of the Union or of a Member State."}, {"color": "#2B6CB0", "id": "REG-102", "label": "REG-102", "shape": "dot", "size": 20, "title": "id: REG-102\narticle: 18\nnode_type: Provision\nparagraph: 3\nsystem_name: Art18(3)\ntext: A data subject who has obtained restriction of processing pursuant to paragraph 1 shall be informed by the controller before the restriction of processing is lifted."}, {"color": "#2B6CB0", "id": "REG-103", "label": "REG-103", "shape": "dot", "size": 20, "title": "id: REG-103\narticle: 20\nnode_type: Provision\nparagraph: 1\nsystem_name: Art20(1)\ntext: The data subject shall have the right to receive the personal data concerning him or her, which he or she has provided to a controller, in a structured, commonly used and machine-readable format and have the right to transmit those data to another controller without hindrance from the controller to which the personal data have been provided, where:"}, {"color": "#C53030", "id": "Art20", "label": "Art20", "shape": "dot", "size": 28, "title": "id: Art20\narticle_number: 20\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-104", "label": "REG-104", "shape": "dot", "size": 20, "title": "id: REG-104\narticle: 20\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art20(1(a))\ntext: The data subject shall have the right to receive the personal data concerning him or her, which he or she has provided to a controller, in a structured, commonly used and machine-readable format and have the right to transmit those data to another controller without hindrance from the controller to which the personal data have been provided, where: (a) the processing is based on consent pursuant to point (a) of Article 6(1) or point (a) of Article 9(2) or on a contract pursuant to point (b) of Article 6(1); and"}, {"color": "#2B6CB0", "id": "REG-105", "label": "REG-105", "shape": "dot", "size": 20, "title": "id: REG-105\narticle: 20\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art20(1(b))\ntext: The data subject shall have the right to receive the personal data concerning him or her, which he or she has provided to a controller, in a structured, commonly used and machine-readable format and have the right to transmit those data to another controller without hindrance from the controller to which the personal data have been provided, where: (b) the processing is carried out by automated means."}, {"color": "#2B6CB0", "id": "REG-106", "label": "REG-106", "shape": "dot", "size": 20, "title": "id: REG-106\narticle: 20\nnode_type: Provision\nparagraph: 2\nsystem_name: Art20(2)\ntext: In exercising his or her right to data portability pursuant to paragraph 1, the data subject shall have the right to have the personal data transmitted directly from one controller to another, where technically feasible."}, {"color": "#2B6CB0", "id": "REG-107", "label": "REG-107", "shape": "dot", "size": 20, "title": "id: REG-107\narticle: 20\nnode_type: Provision\nparagraph: 3\nsystem_name: Art20(3)\ntext: The exercise of the right referred to in paragraph 1 of this Article shall be without prejudice to Article 17."}, {"color": "#2B6CB0", "id": "REG-108", "label": "REG-108", "shape": "dot", "size": 20, "title": "id: REG-108\narticle: 20\nnode_type: Provision\nparagraph: 3\nsystem_name: Art20(3)\ntext: That right shall not apply to processing necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller."}, {"color": "#2B6CB0", "id": "REG-109", "label": "REG-109", "shape": "dot", "size": 20, "title": "id: REG-109\narticle: 20\nnode_type: Provision\nparagraph: 4\nsystem_name: Art20(4)\ntext: The right referred to in paragraph 1 shall not adversely affect the rights and freedoms of others."}, {"color": "#2B6CB0", "id": "REG-110", "label": "REG-110", "shape": "dot", "size": 20, "title": "id: REG-110\narticle: 21\nnode_type: Provision\nparagraph: 1\nsystem_name: Art21(1)\ntext: The data subject shall have the right to object, on grounds relating to his or her particular situation, at any time to processing of personal data concerning him or her which is based on point (e) or (f) of Article 6(1), including profiling based on those provisions."}, {"color": "#C53030", "id": "Art21", "label": "Art21", "shape": "dot", "size": 28, "title": "id: Art21\narticle_number: 21\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-111", "label": "REG-111", "shape": "dot", "size": 20, "title": "id: REG-111\narticle: 21\nnode_type: Provision\nparagraph: 1\nsystem_name: Art21(1)\ntext: The controller shall no longer process the personal data unless the controller demonstrates compelling legitimate grounds for the processing which override the interests, rights and freedoms of the data subject or for the establishment, exercise or defence of legal claims."}, {"color": "#2B6CB0", "id": "REG-112", "label": "REG-112", "shape": "dot", "size": 20, "title": "id: REG-112\narticle: 21\nnode_type: Provision\nparagraph: 2\nsystem_name: Art21(2)\ntext: Where personal data are processed for direct marketing purposes, the data subject shall have the right to object at any time to processing of personal data concerning him or her for such marketing, which includes profiling to the extent that it is related to such direct marketing."}, {"color": "#2B6CB0", "id": "REG-113", "label": "REG-113", "shape": "dot", "size": 20, "title": "id: REG-113\narticle: 21\nnode_type: Provision\nparagraph: 3\nsystem_name: Art21(3)\ntext: Where the data subject objects to processing for direct marketing purposes, the personal data shall no longer be processed for such purposes."}, {"color": "#2B6CB0", "id": "REG-114", "label": "REG-114", "shape": "dot", "size": 20, "title": "id: REG-114\narticle: 21\nnode_type: Provision\nparagraph: 4\nsystem_name: Art21(4)\ntext: At the latest at the time of the first communication with the data subject, the right referred to in paragraphs 1 and 2 shall be explicitly brought to the attention of the data subject and shall be presented clearly and separately from any other information."}, {"color": "#2B6CB0", "id": "REG-115", "label": "REG-115", "shape": "dot", "size": 20, "title": "id: REG-115\narticle: 21\nnode_type: Provision\nparagraph: 5\nsystem_name: Art21(5)\ntext: In the context of the use of information society services, and notwithstanding Directive 2002/58/EC, the data subject may exercise his or her right to object by automated means using technical specifications."}, {"color": "#2B6CB0", "id": "REG-116", "label": "REG-116", "shape": "dot", "size": 20, "title": "id: REG-116\narticle: 21\nnode_type: Provision\nparagraph: 6\nsystem_name: Art21(6)\ntext: Where personal data are processed for scientific or historical research purposes or statistical purposes pursuant to Article 89(1), the data subject, on grounds relating to his or her particular situation, shall have the right to object to processing of personal data concerning him or her, unless the processing is necessary for the performance of a task carried out for reasons of public interest."}, {"color": "#2B6CB0", "id": "REG-117", "label": "REG-117", "shape": "dot", "size": 20, "title": "id: REG-117\narticle: 46\nnode_type: Provision\nparagraph: 1\nsystem_name: Art46(1)\ntext: In the absence of a decision pursuant to Article 45(3), a controller or processor may transfer personal data to a third country or an international organisation only if the controller or processor has provided appropriate safeguards, and on condition that enforceable data subject rights and effective legal remedies for data subjects are available."}, {"color": "#C53030", "id": "Art46", "label": "Art46", "shape": "dot", "size": 28, "title": "id: Art46\narticle_number: 46\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-118", "label": "REG-118", "shape": "dot", "size": 20, "title": "id: REG-118\narticle: 46\nnode_type: Provision\nparagraph: 2\nsystem_name: Art46(2)\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by:"}, {"color": "#2B6CB0", "id": "REG-119", "label": "REG-119", "shape": "dot", "size": 20, "title": "id: REG-119\narticle: 46\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art46(2(a))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (a) a legally binding and enforceable instrument between public authorities or bodies;"}, {"color": "#2B6CB0", "id": "REG-120", "label": "REG-120", "shape": "dot", "size": 20, "title": "id: REG-120\narticle: 46\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art46(2(b))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (b) binding corporate rules in accordance with Article 47;"}, {"color": "#2B6CB0", "id": "REG-121", "label": "REG-121", "shape": "dot", "size": 20, "title": "id: REG-121\narticle: 46\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art46(2(c))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (c) standard data protection clauses adopted by the Commission in accordance with the examination procedure referred to in Article 93(2);"}, {"color": "#2B6CB0", "id": "REG-122", "label": "REG-122", "shape": "dot", "size": 20, "title": "id: REG-122\narticle: 46\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art46(2(d))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (d) standard data protection clauses adopted by a supervisory authority and approved by the Commission pursuant to the examination procedure referred to in Article 93(2);"}, {"color": "#2B6CB0", "id": "REG-123", "label": "REG-123", "shape": "dot", "size": 20, "title": "id: REG-123\narticle: 46\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art46(2(e))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (e) an approved code of conduct pursuant to Article 40 together with binding and enforceable commitments of the controller or processor in the third country to apply the appropriate safeguards, including as regards data subjects\u0027 rights; or"}, {"color": "#2B6CB0", "id": "REG-124", "label": "REG-124", "shape": "dot", "size": 20, "title": "id: REG-124\narticle: 46\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art46(2(f))\ntext: The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authoris ation from a supervisory authority, by: (f) an approved certification mechanism pursuant to Article 42 together with binding and enforceable commitments of the controller or processor in the third country to apply the appropriate safeguards, including as regards data subjects\u0027 rights."}, {"color": "#2B6CB0", "id": "REG-125", "label": "REG-125", "shape": "dot", "size": 20, "title": "id: REG-125\narticle: 46\nnode_type: Provision\nparagraph: 3\nsystem_name: Art46(3)\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by:"}, {"color": "#2B6CB0", "id": "REG-126", "label": "REG-126", "shape": "dot", "size": 20, "title": "id: REG-126\narticle: 46\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art46(3(a))\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by: (a) contractual clauses between the controller or processor and the controller, processor or the recipient of the personal data in the third country or international organisation; or"}, {"color": "#2B6CB0", "id": "REG-127", "label": "REG-127", "shape": "dot", "size": 20, "title": "id: REG-127\narticle: 46\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art46(3(b))\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by: (b) provisions to be inserted into administrative arrangements between public authorities or bodies which include enforceable and effective data subject rights."}, {"color": "#2B6CB0", "id": "REG-128", "label": "REG-128", "shape": "dot", "size": 20, "title": "id: REG-128\narticle: 46\nnode_type: Provision\nparagraph: 4\nsystem_name: Art46(4)\ntext: The supervisory authority shall apply the consistency mechanism referred to in Article 63 in the cases referred to in paragraph 3 of this Article."}, {"color": "#2B6CB0", "id": "REG-129", "label": "REG-129", "shape": "dot", "size": 20, "title": "id: REG-129\narticle: 46\nnode_type: Provision\nparagraph: 5\nsystem_name: Art46(5)\ntext: Authorisations by a Member State or supervisory authority on the basis of Article 26(2) of Directive 95/46/EC shall remain valid until amended, replaced or repealed, if necessary, by that supervisory authority."}, {"color": "#2B6CB0", "id": "REG-130", "label": "REG-130", "shape": "dot", "size": 20, "title": "id: REG-130\narticle: 46\nnode_type: Provision\nparagraph: 5\nsystem_name: Art46(5)\ntext: Decisions adopted by the Commission on the basis of Article 26(4) of Directive 95/46/EC shall remain in force until amended, replaced or repealed, if necessary, by a Commission Decision adopted in accordance with paragraph 2 of this Article."}, {"color": "#2B6CB0", "id": "REG-131", "label": "REG-131", "shape": "dot", "size": 20, "title": "id: REG-131\narticle: 71\nnode_type: Provision\nparagraph: 1\nsystem_name: Art71(1)\ntext: The Board shall draw up an annual report regarding the protection of natural persons with regard to processing in the Union and, where relevant, in third countries and international organisations."}, {"color": "#C53030", "id": "Art71", "label": "Art71", "shape": "dot", "size": 28, "title": "id: Art71\narticle_number: 71\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-132", "label": "REG-132", "shape": "dot", "size": 20, "title": "id: REG-132\narticle: 71\nnode_type: Provision\nparagraph: 1\nsystem_name: Art71(1)\ntext: The report shall be made public and be transmitted to the European Parliament, to the Council and to the Commission."}, {"color": "#2B6CB0", "id": "REG-133", "label": "REG-133", "shape": "dot", "size": 20, "title": "id: REG-133\narticle: 71\nnode_type: Provision\nparagraph: 2\nsystem_name: Art71(2)\ntext: The annual report shall include a review of the practical application of the guidelines, recommendations and best practices referred to in point (l) of Article 70(1) as well as of the binding decisions referred to in Article 65."}, {"color": "#C53030", "id": "Art23", "label": "Art23", "shape": "dot", "size": 28, "title": "id: Art23\narticle_number: 23\nnode_type: Article"}, {"color": "#C53030", "id": "Art9", "label": "Art9", "shape": "dot", "size": 28, "title": "id: Art9\narticle_number: 9\nnode_type: Article"}, {"color": "#C53030", "id": "Art10", "label": "Art10", "shape": "dot", "size": 28, "title": "id: Art10\narticle_number: 10\nnode_type: Article"}, {"color": "#C53030", "id": "Art47", "label": "Art47", "shape": "dot", "size": 28, "title": "id: Art47\narticle_number: 47\nnode_type: Article"}, {"color": "#C53030", "id": "Art49", "label": "Art49", "shape": "dot", "size": 28, "title": "id: Art49\narticle_number: 49\nnode_type: Article"}, {"color": "#C53030", "id": "Art22", "label": "Art22", "shape": "dot", "size": 28, "title": "id: Art22\narticle_number: 22\nnode_type: Article"}, {"color": "#C53030", "id": "Art89", "label": "Art89", "shape": "dot", "size": 28, "title": "id: Art89\narticle_number: 89\nnode_type: Article"}, {"color": "#C53030", "id": "Art8", "label": "Art8", "shape": "dot", "size": 28, "title": "id: Art8\narticle_number: 8\nnode_type: Article"}, {"color": "#C53030", "id": "Art45", "label": "Art45", "shape": "dot", "size": 28, "title": "id: Art45\narticle_number: 45\nnode_type: Article"}, {"color": "#C53030", "id": "Art93", "label": "Art93", "shape": "dot", "size": 28, "title": "id: Art93\narticle_number: 93\nnode_type: Article"}, {"color": "#C53
