              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#2B6CB0", "id": "REG-001", "label": "REG-001", "shape": "dot", "size": 20, "title": "id: REG-001\narticle: 9\nnode_type: Provision\nparagraph: 1\nsystem_name: Art9(1)\ntext: A risk management system shall be established, implemented, documented and maintained in relation to high-risk AI systems."}, {"color": "#C53030", "id": "Art9", "label": "Art9", "shape": "dot", "size": 28, "title": "id: Art9\narticle_number: 9\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-002", "label": "REG-002", "shape": "dot", "size": 20, "title": "id: REG-002\narticle: 9\nnode_type: Provision\nparagraph: 2\nsystem_name: Art9(2)\ntext: The risk management system shall be understood as a continuous iterative process planned and run throughout the entire lifecycle of a high-risk AI system, requiring regular systematic review and updating."}, {"color": "#2B6CB0", "id": "REG-003", "label": "REG-003", "shape": "dot", "size": 20, "title": "id: REG-003\narticle: 9\nnode_type: Provision\nparagraph: 2\nsystem_name: Art9(2)\ntext: The risk management system shall comprise the following steps:"}, {"color": "#2B6CB0", "id": "REG-004", "label": "REG-004", "shape": "dot", "size": 20, "title": "id: REG-004\narticle: 9\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art9(2(a))\ntext: The risk management system shall comprise the following steps: (a) the identification and analysis of the known and the reasonably foreseeable risks that the high-risk AI system can pose to health, safety or fundamental rights when the high-risk AI system is used in accordance with its intended purpose;"}, {"color": "#2B6CB0", "id": "REG-005", "label": "REG-005", "shape": "dot", "size": 20, "title": "id: REG-005\narticle: 9\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art9(2(b))\ntext: The risk management system shall comprise the following steps: (b) the estimation and evaluation of the risks that may emerge when the high-risk AI system is used in accordance with its intended purpose, and under conditions of reasonably foreseeable misuse;"}, {"color": "#2B6CB0", "id": "REG-006", "label": "REG-006", "shape": "dot", "size": 20, "title": "id: REG-006\narticle: 9\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art9(2(c))\ntext: The risk management system shall comprise the following steps: (c) the evaluation of other risks possibly arising, based on the analysis of data gathered from the post-market monitoring system referred to in Article 72;"}, {"color": "#2B6CB0", "id": "REG-007", "label": "REG-007", "shape": "dot", "size": 20, "title": "id: REG-007\narticle: 9\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art9(2(d))\ntext: The risk management system shall comprise the following steps: (d) the adoption of appropriate and targeted risk management measures designed to address the risks identified pursuant to point (a)."}, {"color": "#2B6CB0", "id": "REG-008", "label": "REG-008", "shape": "dot", "size": 20, "title": "id: REG-008\narticle: 9\nnode_type: Provision\nparagraph: 3\nsystem_name: Art9(3)\ntext: The risks referred to in this Article shall concern only those which may be reasonably mitigated or eliminated through the development or design of the high-risk AI system, or the provision of adequate technical information."}, {"color": "#2B6CB0", "id": "REG-009", "label": "REG-009", "shape": "dot", "size": 20, "title": "id: REG-009\narticle: 9\nnode_type: Provision\nparagraph: 4\nsystem_name: Art9(4)\ntext: The risk management measures referred to in paragraph 2, point (d), shall give due consideration to the effects and possible interaction resulting from the combined application of the requirements set out in this Section, with a view to minimising risks more effectively while achieving an appropriate balance in implementing the measures to fulfil those requirements."}, {"color": "#2B6CB0", "id": "REG-010", "label": "REG-010", "shape": "dot", "size": 20, "title": "id: REG-010\narticle: 9\nnode_type: Provision\nparagraph: 5\nsystem_name: Art9(5)\ntext: The risk management measures referred to in paragraph 2, point (d), shall be such that the relevant residual risk associated with each hazard, as well as the overall residual risk of the high-risk AI systems is judged to be acceptable. In identifying the most appropriate risk management measures, the following shall be ensured:"}, {"color": "#2B6CB0", "id": "REG-011", "label": "REG-011", "shape": "dot", "size": 20, "title": "id: REG-011\narticle: 9\nnode_type: Provision\nparagraph: 5(a)\nsystem_name: Art9(5(a))\ntext: The risk management measures referred to in paragraph 2, point (d), shall be such that the relevant residual risk associated with each hazard, as well as the overall residual risk of the high-risk AI systems is judged to be acceptable. (a) elimination or reduction of risks identified and evaluated pursuant to paragraph 2 in as far as technically feasible through adequate design and development of the high-risk AI system;"}, {"color": "#2B6CB0", "id": "REG-012", "label": "REG-012", "shape": "dot", "size": 20, "title": "id: REG-012\narticle: 9\nnode_type: Provision\nparagraph: 5(b)\nsystem_name: Art9(5(b))\ntext: The risk management measures referred to in paragraph 2, point (d), shall be such that the relevant residual risk associated with each hazard, as well as the overall residual risk of the high-risk AI systems is judged to be acceptable. (b) where appropriate, implementation of adequate mitigation and control measures addressing risks that cannot be eliminated;"}, {"color": "#2B6CB0", "id": "REG-013", "label": "REG-013", "shape": "dot", "size": 20, "title": "id: REG-013\narticle: 9\nnode_type: Provision\nparagraph: 5(c)\nsystem_name: Art9(5(c))\ntext: The risk management measures referred to in paragraph 2, point (d), shall be such that the relevant residual risk associated with each hazard, as well as the overall residual risk of the high-risk AI systems is judged to be acceptable. (c) provision of information required pursuant to Article 13 and, where appropriate, training to deployers. With a view to eliminating or reducing risks related to the use of the high-risk AI system, due consideration shall be given to the technical knowledge, experience, education, the training to be expected by the deployer, and the presumable context in which the system is intended to be used."}, {"color": "#2B6CB0", "id": "REG-014", "label": "REG-014", "shape": "dot", "size": 20, "title": "id: REG-014\narticle: 9\nnode_type: Provision\nparagraph: 6\nsystem_name: Art9(6)\ntext: High-risk AI systems shall be tested for the purpose of identifying the most appropriate and targeted risk management measures."}, {"color": "#2B6CB0", "id": "REG-015", "label": "REG-015", "shape": "dot", "size": 20, "title": "id: REG-015\narticle: 9\nnode_type: Provision\nparagraph: 6\nsystem_name: Art9(6)\ntext: Testing shall ensure that high-risk AI systems perform consistently for their intended purpose and that they are in compliance with the requirements set out in this Section."}, {"color": "#2B6CB0", "id": "REG-016", "label": "REG-016", "shape": "dot", "size": 20, "title": "id: REG-016\narticle: 9\nnode_type: Provision\nparagraph: 7\nsystem_name: Art9(7)\ntext: Testing procedures may include testing in real-world conditions in accordance with Article 60."}, {"color": "#2B6CB0", "id": "REG-017", "label": "REG-017", "shape": "dot", "size": 20, "title": "id: REG-017\narticle: 9\nnode_type: Provision\nparagraph: 8\nsystem_name: Art9(8)\ntext: The testing of high-risk AI systems shall be performed, as appropriate, at any time throughout the development process, and, in any event, prior to their being placed on the market or put into service."}, {"color": "#2B6CB0", "id": "REG-018", "label": "REG-018", "shape": "dot", "size": 20, "title": "id: REG-018\narticle: 9\nnode_type: Provision\nparagraph: 8\nsystem_name: Art9(8)\ntext: Testing shall be carried out against prior defined metrics and probabilistic thresholds that are appropriate to the intended purpose of the high-risk AI system."}, {"color": "#2B6CB0", "id": "REG-019", "label": "REG-019", "shape": "dot", "size": 20, "title": "id: REG-019\narticle: 9\nnode_type: Provision\nparagraph: 9\nsystem_name: Art9(9)\ntext: When implementing the risk management system as provided for in paragraphs 1 to 7, providers shall give consideration to whether in view of its intended purpose the high-risk AI system is likely to have an adverse impact on persons under the age of 18 and, as appropriate, other vulnerable groups."}, {"color": "#2B6CB0", "id": "REG-020", "label": "REG-020", "shape": "dot", "size": 20, "title": "id: REG-020\narticle: 9\nnode_type: Provision\nparagraph: 10\nsystem_name: Art9(10)\ntext: For providers of high-risk AI systems that are subject to requirements regarding internal risk management processes under other relevant provisions of Union law, the aspects provided in paragraphs 1 to 9 may be part of, or combined with, the risk management procedures established pursuant to that law."}, {"color": "#2B6CB0", "id": "REG-021", "label": "REG-021", "shape": "dot", "size": 20, "title": "id: REG-021\narticle: 10\nnode_type: Provision\nparagraph: 1\nsystem_name: Art10(1)\ntext: High-risk AI systems which make use of techniques involving the training of AI models with data shall be developed on the basis of training, validation and testing data sets that meet the quality criteria referred to in paragraphs 2 to 5 whenever such data sets are used."}, {"color": "#C53030", "id": "Art10", "label": "Art10", "shape": "dot", "size": 28, "title": "id: Art10\narticle_number: 10\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-022", "label": "REG-022", "shape": "dot", "size": 20, "title": "id: REG-022\narticle: 10\nnode_type: Provision\nparagraph: 2\nsystem_name: Art10(2)\ntext: Training, validation and testing data sets shall be subject to data governance and management practices appropriate for the intended purpose of the high-risk AI system."}, {"color": "#2B6CB0", "id": "REG-023", "label": "REG-023", "shape": "dot", "size": 20, "title": "id: REG-023\narticle: 10\nnode_type: Provision\nparagraph: 2\nsystem_name: Art10(2)\ntext: Those practices shall concern in particular:"}, {"color": "#2B6CB0", "id": "REG-024", "label": "REG-024", "shape": "dot", "size": 20, "title": "id: REG-024\narticle: 10\nnode_type: Provision\nparagraph: 2(a)\nsystem_name: Art10(2(a))\ntext: Those practices shall concern in particular: (a) the relevant design choices;"}, {"color": "#2B6CB0", "id": "REG-025", "label": "REG-025", "shape": "dot", "size": 20, "title": "id: REG-025\narticle: 10\nnode_type: Provision\nparagraph: 2(b)\nsystem_name: Art10(2(b))\ntext: Those practices shall concern in particular: (b) data collection processes and the origin of data, and in the case of personal data, the original purpose of the data collection;"}, {"color": "#2B6CB0", "id": "REG-026", "label": "REG-026", "shape": "dot", "size": 20, "title": "id: REG-026\narticle: 10\nnode_type: Provision\nparagraph: 2(c)\nsystem_name: Art10(2(c))\ntext: Those practices shall concern in particular: (c) relevant data-preparation processing operations, such as annotation, labelling, cleaning, updating, enrichment and aggregation;"}, {"color": "#2B6CB0", "id": "REG-027", "label": "REG-027", "shape": "dot", "size": 20, "title": "id: REG-027\narticle: 10\nnode_type: Provision\nparagraph: 2(d)\nsystem_name: Art10(2(d))\ntext: Those practices shall concern in particular: (d) the formulation of assumptions, in particular with respect to the information that the data are supposed to measure and represent;"}, {"color": "#2B6CB0", "id": "REG-028", "label": "REG-028", "shape": "dot", "size": 20, "title": "id: REG-028\narticle: 10\nnode_type: Provision\nparagraph: 2(e)\nsystem_name: Art10(2(e))\ntext: Those practices shall concern in particular: (e) an assessment of the availability, quantity and suitability of the data sets that are needed;"}, {"color": "#2B6CB0", "id": "REG-029", "label": "REG-029", "shape": "dot", "size": 20, "title": "id: REG-029\narticle: 10\nnode_type: Provision\nparagraph: 2(f)\nsystem_name: Art10(2(f))\ntext: Those practices shall concern in particular: (f) examination in view of possible biases that are likely to affect the health and safety of persons, have a negative impact on fundamental rights or lead to discrimination prohibited under Union law, especially where data outputs influence inputs for future operations;"}, {"color": "#2B6CB0", "id": "REG-030", "label": "REG-030", "shape": "dot", "size": 20, "title": "id: REG-030\narticle: 10\nnode_type: Provision\nparagraph: 2(g)\nsystem_name: Art10(2(g))\ntext: Those practices shall concern in particular: (g) appropriate measures to detect, prevent and mitigate possible biases identified according to point (f);"}, {"color": "#2B6CB0", "id": "REG-031", "label": "REG-031", "shape": "dot", "size": 20, "title": "id: REG-031\narticle: 10\nnode_type: Provision\nparagraph: 2(h)\nsystem_name: Art10(2(h))\ntext: Those practices shall concern in particular: (h) the identification of relevant data gaps or shortcomings that prevent compliance with this Regulation, and how those gaps"}, {"color": "#2B6CB0", "id": "REG-032", "label": "REG-032", "shape": "dot", "size": 20, "title": "id: REG-032\narticle: 10\nnode_type: Provision\nparagraph: 2(h)\nsystem_name: Art10(2(h))\ntext: and shortcomings can be addressed."}, {"color": "#2B6CB0", "id": "REG-033", "label": "REG-033", "shape": "dot", "size": 20, "title": "id: REG-033\narticle: 10\nnode_type: Provision\nparagraph: 3\nsystem_name: Art10(3)\ntext: Training, validation and testing data sets shall be relevant, sufficiently representative, and to the best extent possible, free of errors and complete in view of the intended purpose."}, {"color": "#2B6CB0", "id": "REG-034", "label": "REG-034", "shape": "dot", "size": 20, "title": "id: REG-034\narticle: 10\nnode_type: Provision\nparagraph: 3\nsystem_name: Art10(3)\ntext: They shall have the appropriate statistical properties, including, where applicable, as regards the persons or groups of persons in relation to whom the high-risk AI system is intended to be used."}, {"color": "#2B6CB0", "id": "REG-035", "label": "REG-035", "shape": "dot", "size": 20, "title": "id: REG-035\narticle: 10\nnode_type: Provision\nparagraph: 3\nsystem_name: Art10(3)\ntext: Those characteristics of the data sets may be met at the level of individual data sets or at the level of a combination thereof."}, {"color": "#2B6CB0", "id": "REG-036", "label": "REG-036", "shape": "dot", "size": 20, "title": "id: REG-036\narticle: 10\nnode_type: Provision\nparagraph: 4\nsystem_name: Art10(4)\ntext: Data sets shall take into account, to the extent required by the intended purpose, the characteristics or elements that are particular to the specific geographical, contextual, behavioural or functional setting within which the high-risk AI system is intended to be used."}, {"color": "#2B6CB0", "id": "REG-037", "label": "REG-037", "shape": "dot", "size": 20, "title": "id: REG-037\narticle: 10\nnode_type: Provision\nparagraph: 5\nsystem_name: Art10(5)\ntext: To the extent that it is strictly necessary for the purpose of ensuring bias detection and correction in relation to the high-risk AI systems in accordance with paragraph (2), points (f) and (g) of this Article, the providers of such systems may exceptionally process special categories of personal data, subject to appropriate safeguards for the fundamental rights and freedoms of natural persons."}, {"color": "#2B6CB0", "id": "REG-038", "label": "REG-038", "shape": "dot", "size": 20, "title": "id: REG-038\narticle: 10\nnode_type: Provision\nparagraph: 5\nsystem_name: Art10(5)\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur:"}, {"color": "#2B6CB0", "id": "REG-039", "label": "REG-039", "shape": "dot", "size": 20, "title": "id: REG-039\narticle: 10\nnode_type: Provision\nparagraph: 5(a)\nsystem_name: Art10(5(a))\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur: (a) the bias detection and correction cannot be effectively fulfilled by processing other data, including synthetic or anonymised data;"}, {"color": "#2B6CB0", "id": "REG-040", "label": "REG-040", "shape": "dot", "size": 20, "title": "id: REG-040\narticle: 10\nnode_type: Provision\nparagraph: 5(b)\nsystem_name: Art10(5(b))\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur: (b) the special categories of personal data are subject to technical limitations on the re-use of the personal data, and state-of-the-art security and privacy-preserving measures, including pseudonymisation;"}, {"color": "#2B6CB0", "id": "REG-041", "label": "REG-041", "shape": "dot", "size": 20, "title": "id: REG-041\narticle: 10\nnode_type: Provision\nparagraph: 5(c)\nsystem_name: Art10(5(c))\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur: (c) the special categories of personal data are subject to measures to ensure that the personal data processed are secured, protected, subject to suitable safeguards, including strict controls and documentation of the access, to avoid misuse and ensure that only authorised persons have access to those personal data with appropriate confidentiality obligations;"}, {"color": "#2B6CB0", "id": "REG-042", "label": "REG-042", "shape": "dot", "size": 20, "title": "id: REG-042\narticle: 10\nnode_type: Provision\nparagraph: 5(d)\nsystem_name: Art10(5(d))\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur: (d) the special categories of personal data are not to be transmitted, transferred or otherwise accessed by other parties;"}, {"color": "#2B6CB0", "id": "REG-043", "label": "REG-043", "shape": "dot", "size": 20, "title": "id: REG-043\narticle: 10\nnode_type: Provision\nparagraph: 5(e)\nsystem_name: Art10(5(e))\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur: (e) the special categories of personal data are deleted once the bias has been corrected or the personal data has reached the end of its retention period, whichever comes first;"}, {"color": "#2B6CB0", "id": "REG-044", "label": "REG-044", "shape": "dot", "size": 20, "title": "id: REG-044\narticle: 10\nnode_type: Provision\nparagraph: 5(f)\nsystem_name: Art10(5(f))\ntext: In addition to the provisions set out in Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680, all the following conditions must be met in order for such processing to occur: (f) the records of processing activities pursuant to Regulations (EU) 2016/679 and (EU) 2018/1725 and Directive (EU) 2016/680 include the reasons why the processing of special categories of personal data was strictly necessary to detect and correct biases, and why that objective could not be achieved by processing other data."}, {"color": "#2B6CB0", "id": "REG-045", "label": "REG-045", "shape": "dot", "size": 20, "title": "id: REG-045\narticle: 10\nnode_type: Provision\nparagraph: 6\nsystem_name: Art10(6)\ntext: For the development of high-risk AI systems not using techniques involving the training of AI models, paragraphs 2 to 5 apply only to the testing data sets."}, {"color": "#2B6CB0", "id": "REG-046", "label": "REG-046", "shape": "dot", "size": 20, "title": "id: REG-046\narticle: 11\nnode_type: Provision\nparagraph: 1\nsystem_name: Art11(1)\ntext: The technical documentation of a high-risk AI system shall be drawn up before that system is placed on the market The technical documentation shall be drawn up in such a way as to demonstrate that the high-risk AI system complies with the requirements set out in this Section and to provide national competent authorities and notified bodies with the necessary information in a clear and comprehensive form to assess the compliance of the AI system with those requirements. It shall contain, at a minimum, the elements set out in Annex IV. SMEs, including start-ups, may provide the elements of the technical documentation specified in Annex IV in a simplified manner. To that end, the Commission shall establish a simplified technical documentation form targeted at the needs of small and microenterprises. Where an SME, including a start-up, opts to provide the information required in Annex IV in a simplified manner, it shall use the form referred to in this paragraph. Notified bodies shall accept the form for the purposes of the conformity assessment."}, {"color": "#C53030", "id": "Art11", "label": "Art11", "shape": "dot", "size": 28, "title": "id: Art11\narticle_number: 11\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-047", "label": "REG-047", "shape": "dot", "size": 20, "title": "id: REG-047\narticle: 11\nnode_type: Provision\nparagraph: 1\nsystem_name: Art11(1)\ntext: or put into service and shall be kept up-to date."}, {"color": "#2B6CB0", "id": "REG-048", "label": "REG-048", "shape": "dot", "size": 20, "title": "id: REG-048\narticle: 11\nnode_type: Provision\nparagraph: 2\nsystem_name: Art11(2)\ntext: Where a high-risk AI system related to a product covered by the Union harmonisation legislation listed in Section A of Annex I is placed on the market or put into service, a single set of technical documentation shall be drawn up containing all the information set out in paragraph 1, as well as the information required under those legal acts."}, {"color": "#2B6CB0", "id": "REG-049", "label": "REG-049", "shape": "dot", "size": 20, "title": "id: REG-049\narticle: 11\nnode_type: Provision\nparagraph: 3\nsystem_name: Art11(3)\ntext: The Commission is empowered to adopt delegated acts in accordance with Article 97 in order to amend Annex IV, where necessary, to ensure that, in light of technical progress, the technical documentation provides all the information necessary to assess the compliance of the system with the requirements set out in this Section."}, {"color": "#2B6CB0", "id": "REG-050", "label": "REG-050", "shape": "dot", "size": 20, "title": "id: REG-050\narticle: 13\nnode_type: Provision\nparagraph: 1\nsystem_name: Art13(1)\ntext: High-risk AI systems shall be designed and developed in such a way as to ensure that their operation is sufficiently transparent to enable deployers to interpret a system\u0027s output and use it appropriately."}, {"color": "#C53030", "id": "Art13", "label": "Art13", "shape": "dot", "size": 28, "title": "id: Art13\narticle_number: 13\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-051", "label": "REG-051", "shape": "dot", "size": 20, "title": "id: REG-051\narticle: 13\nnode_type: Provision\nparagraph: 1\nsystem_name: Art13(1)\ntext: An appropriate type and degree of transparency shall be ensured with a view to achieving compliance with the relevant obligations of the provider and deployer set out in Section 3."}, {"color": "#2B6CB0", "id": "REG-052", "label": "REG-052", "shape": "dot", "size": 20, "title": "id: REG-052\narticle: 13\nnode_type: Provision\nparagraph: 2\nsystem_name: Art13(2)\ntext: High-risk AI systems shall be accompanied by instructions for use in an appropriate digital format or otherwise that include concise, complete, correct and clear information that is relevant, accessible and comprehensible to deployers."}, {"color": "#2B6CB0", "id": "REG-053", "label": "REG-053", "shape": "dot", "size": 20, "title": "id: REG-053\narticle: 13\nnode_type: Provision\nparagraph: 3\nsystem_name: Art13(3)\ntext: The instructions for use shall contain at least the following information:"}, {"color": "#2B6CB0", "id": "REG-054", "label": "REG-054", "shape": "dot", "size": 20, "title": "id: REG-054\narticle: 13\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art13(3(a))\ntext: The instructions for use shall contain at least the following information: (a) the identity and the contact details of the provider and, where applicable, of its authorised representative;"}, {"color": "#2B6CB0", "id": "REG-055", "label": "REG-055", "shape": "dot", "size": 20, "title": "id: REG-055\narticle: 13\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art13(3(b))\ntext: The instructions for use shall contain at least the following information: (b) the characteristics, capabilities and limitations of performance of the high-risk AI system, including:"}, {"color": "#2B6CB0", "id": "REG-056", "label": "REG-056", "shape": "dot", "size": 20, "title": "id: REG-056\narticle: 13\nnode_type: Provision\nparagraph: 3(i)\nsystem_name: Art13(3(i))\ntext: The instructions for use shall contain at least the following information: (i) its intended purpose;"}, {"color": "#2B6CB0", "id": "REG-057", "label": "REG-057", "shape": "dot", "size": 20, "title": "id: REG-057\narticle: 13\nnode_type: Provision\nparagraph: 4\nsystem_name: Art13(4)\ntext: (ii) the level of accuracy, including its metrics, robustness and cybersecurity referred to in Article 15 against which the high-risk AI system has been tested and validated and which can be expected, and any known and foreseeable circumstances that may have an impact on that expected level of accuracy, robustness and cybersecurity;"}, {"color": "#2B6CB0", "id": "REG-058", "label": "REG-058", "shape": "dot", "size": 20, "title": "id: REG-058\narticle: 13\nnode_type: Provision\nparagraph: 5\nsystem_name: Art13(5)\ntext: (iii) any known or foreseeable circumstance, related to the use of the high-risk AI system in accordance with its intended purpose or under conditions of reasonably foreseeable misuse, which may lead to risks to the health and safety or fundamental rights referred to in Article 9(2);"}, {"color": "#2B6CB0", "id": "REG-059", "label": "REG-059", "shape": "dot", "size": 20, "title": "id: REG-059\narticle: 13\nnode_type: Provision\nparagraph: 6\nsystem_name: Art13(6)\ntext: (iv) where applicable, the technical capabilities and characteristics of the high-risk AI system to provide information that is relevant to explain its output;"}, {"color": "#2B6CB0", "id": "REG-060", "label": "REG-060", "shape": "dot", "size": 20, "title": "id: REG-060\narticle: 13\nnode_type: Provision\nparagraph: 6(v)\nsystem_name: Art13(6(v))\ntext: (iv) where applicable, the technical capabilities and characteristics of the high-risk AI system to provide information that is relevant to explain its output; (v) when appropriate, its performance regarding specific persons or groups of persons on which the system is intended to be used;"}, {"color": "#2B6CB0", "id": "REG-061", "label": "REG-061", "shape": "dot", "size": 20, "title": "id: REG-061\narticle: 13\nnode_type: Provision\nparagraph: 7\nsystem_name: Art13(7)\ntext: (vi) when appropriate, specifications for the input data, or any other relevant information in terms of the training, validation and testing data sets used, taking into account the intended purpose of the high-risk AI system;"}, {"color": "#2B6CB0", "id": "REG-062", "label": "REG-062", "shape": "dot", "size": 20, "title": "id: REG-062\narticle: 13\nnode_type: Provision\nparagraph: 8\nsystem_name: Art13(8)\ntext: (vii) where applicable, information to enable deployers to interpret the output of the high-risk AI system and use it appropriately;"}, {"color": "#2B6CB0", "id": "REG-063", "label": "REG-063", "shape": "dot", "size": 20, "title": "id: REG-063\narticle: 13\nnode_type: Provision\nparagraph: 8(c)\nsystem_name: Art13(8(c))\ntext: (vii) where applicable, information to enable deployers to interpret the output of the high-risk AI system and use it appropriately; (c) the changes to the high-risk AI system and its performance which have been pre-determined by the provider at the moment of the initial conformity assessment, if any;"}, {"color": "#2B6CB0", "id": "REG-064", "label": "REG-064", "shape": "dot", "size": 20, "title": "id: REG-064\narticle: 13\nnode_type: Provision\nparagraph: 8(d)\nsystem_name: Art13(8(d))\ntext: (vii) where applicable, information to enable deployers to interpret the output of the high-risk AI system and use it appropriately; (d) the human oversight measures referred to in Article 14, including the technical measures put in place to facilitate the interpretation of the outputs of the high-risk AI systems by the deployers;"}, {"color": "#2B6CB0", "id": "REG-065", "label": "REG-065", "shape": "dot", "size": 20, "title": "id: REG-065\narticle: 13\nnode_type: Provision\nparagraph: 8(e)\nsystem_name: Art13(8(e))\ntext: (vii) where applicable, information to enable deployers to interpret the output of the high-risk AI system and use it appropriately; (e) the computational and hardware resources needed, the expected lifetime of the high-risk AI system and any necessary maintenance and care measures, including their frequency, to ensure the proper functioning of that AI system, including as regards software updates;"}, {"color": "#2B6CB0", "id": "REG-066", "label": "REG-066", "shape": "dot", "size": 20, "title": "id: REG-066\narticle: 13\nnode_type: Provision\nparagraph: 8(f)\nsystem_name: Art13(8(f))\ntext: (vii) where applicable, information to enable deployers to interpret the output of the high-risk AI system and use it appropriately; (f) where relevant, a description of the mechanisms included within the high-risk AI system that allows deployers to properly collect, store and interpret the logs in accordance with Article 12."}, {"color": "#2B6CB0", "id": "REG-067", "label": "REG-067", "shape": "dot", "size": 20, "title": "id: REG-067\narticle: 14\nnode_type: Provision\nparagraph: 1\nsystem_name: Art14(1)\ntext: High-risk AI systems shall be designed and developed in such a way, including with appropriate human-machine interface tools, that they can be effectively overseen by natural persons during the period in which they are in use."}, {"color": "#C53030", "id": "Art14", "label": "Art14", "shape": "dot", "size": 28, "title": "id: Art14\narticle_number: 14\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-068", "label": "REG-068", "shape": "dot", "size": 20, "title": "id: REG-068\narticle: 14\nnode_type: Provision\nparagraph: 2\nsystem_name: Art14(2)\ntext: Human oversight shall aim to prevent or minimise the risks to health, safety"}, {"color": "#2B6CB0", "id": "REG-069", "label": "REG-069", "shape": "dot", "size": 20, "title": "id: REG-069\narticle: 14\nnode_type: Provision\nparagraph: 2\nsystem_name: Art14(2)\ntext: or fundamental rights that may emerge when a high-risk AI system is used in accordance with its intended purpose or under conditions of reasonably foreseeable misuse, in particular where such risks persist despite the application of other requirements set out in this Section."}, {"color": "#2B6CB0", "id": "REG-070", "label": "REG-070", "shape": "dot", "size": 20, "title": "id: REG-070\narticle: 14\nnode_type: Provision\nparagraph: 3\nsystem_name: Art14(3)\ntext: The oversight measures shall be commensurate with the risks, level of autonomy and context of use of the high-risk AI system,"}, {"color": "#2B6CB0", "id": "REG-071", "label": "REG-071", "shape": "dot", "size": 20, "title": "id: REG-071\narticle: 14\nnode_type: Provision\nparagraph: 3\nsystem_name: Art14(3)\ntext: and shall be ensured through either one or both of the following types of measures:"}, {"color": "#2B6CB0", "id": "REG-072", "label": "REG-072", "shape": "dot", "size": 20, "title": "id: REG-072\narticle: 14\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art14(3(a))\ntext: The oversight measures shall be commensurate with the risks, level of autonomy and context of use of the high-risk AI system,"}, {"color": "#2B6CB0", "id": "REG-073", "label": "REG-073", "shape": "dot", "size": 20, "title": "id: REG-073\narticle: 14\nnode_type: Provision\nparagraph: 3(a)\nsystem_name: Art14(3(a))\ntext: and shall be ensured through either one or both of the following types of measures: (a) measures identified and built, when technically feasible, into the high-risk AI system by the provider before it is placed on the market or put into service;"}, {"color": "#2B6CB0", "id": "REG-074", "label": "REG-074", "shape": "dot", "size": 20, "title": "id: REG-074\narticle: 14\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art14(3(b))\ntext: The oversight measures shall be commensurate with the risks, level of autonomy and context of use of the high-risk AI system,"}, {"color": "#2B6CB0", "id": "REG-075", "label": "REG-075", "shape": "dot", "size": 20, "title": "id: REG-075\narticle: 14\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art14(3(b))\ntext: and shall be ensured through either one or both of the following types of measures: (b) measures identified by the provider before placing the high-risk AI system on the market or putting it into service and that are appropriate to be implemented by the deployer."}, {"color": "#2B6CB0", "id": "REG-076", "label": "REG-076", "shape": "dot", "size": 20, "title": "id: REG-076\narticle: 14\nnode_type: Provision\nparagraph: 4\nsystem_name: Art14(4)\ntext: For the purpose of implementing paragraphs 1, 2 and 3, the high-risk AI system shall be provided to the deployer in such a way that natural persons to whom human oversight is assigned are enabled, as appropriate and proportionate:"}, {"color": "#2B6CB0", "id": "REG-077", "label": "REG-077", "shape": "dot", "size": 20, "title": "id: REG-077\narticle: 14\nnode_type: Provision\nparagraph: 4(a)\nsystem_name: Art14(4(a))\ntext: For the purpose of implementing paragraphs 1, 2 and 3, the high-risk AI system shall be provided to the deployer in such a way that natural persons to whom human oversight is assigned are enabled, as appropriate and proportionate: (a) to properly understand the relevant capacities and limitations of the high-risk AI system and be able to duly monitor its operation, including in view of detecting and addressing anomalies, dysfunctions and unexpected performance;"}, {"color": "#2B6CB0", "id": "REG-078", "label": "REG-078", "shape": "dot", "size": 20, "title": "id: REG-078\narticle: 14\nnode_type: Provision\nparagraph: 4(b)\nsystem_name: Art14(4(b))\ntext: For the purpose of implementing paragraphs 1, 2 and 3, the high-risk AI system shall be provided to the deployer in such a way that natural persons to whom human oversight is assigned are enabled, as appropriate and proportionate: (b) to remain aware of the possible tendency of automatically relying or over-relying on the output produced by a high-risk AI system (automation bias), in particular for high-risk AI systems used to provide information or recommendations for decisions to be taken by natural persons;"}, {"color": "#2B6CB0", "id": "REG-079", "label": "REG-079", "shape": "dot", "size": 20, "title": "id: REG-079\narticle: 14\nnode_type: Provision\nparagraph: 4(c)\nsystem_name: Art14(4(c))\ntext: For the purpose of implementing paragraphs 1, 2 and 3, the high-risk AI system shall be provided to the deployer in such a way that natural persons to whom human oversight is assigned are enabled, as appropriate and proportionate: (c) to correctly interpret the high-risk AI system\u0027s output, taking into account, for example, the interpretation tools and methods available;"}, {"color": "#2B6CB0", "id": "REG-080", "label": "REG-080", "shape": "dot", "size": 20, "title": "id: REG-080\narticle: 14\nnode_type: Provision\nparagraph: 4(d)\nsystem_name: Art14(4(d))\ntext: For the purpose of implementing paragraphs 1, 2 and 3, the high-risk AI system shall be provided to the deployer in such a way that natural persons to whom human oversight is assigned are enabled, as appropriate and proportionate: (d) to decide, in any particular situation, not to use the high-risk AI system or to otherwise disregard, override or reverse the output of the high-risk AI system;"}, {"color": "#2B6CB0", "id": "REG-081", "label": "REG-081", "shape": "dot", "size": 20, "title": "id: REG-081\narticle: 14\nnode_type: Provision\nparagraph: 4(e)\nsystem_name: Art14(4(e))\ntext: For the purpose of implementing paragraphs 1, 2 and 3, the high-risk AI system shall be provided to the deployer in such a way that natural persons to whom human oversight is assigned are enabled, as appropriate and proportionate: (e) to intervene in the operation of the high-risk AI system or interrupt the system through a \u0027stop\u0027 button or a similar procedure that allows the system to come to a halt in a safe state."}, {"color": "#2B6CB0", "id": "REG-082", "label": "REG-082", "shape": "dot", "size": 20, "title": "id: REG-082\narticle: 14\nnode_type: Provision\nparagraph: 5\nsystem_name: Art14(5)\ntext: For high-risk AI systems referred to in point 1(a) of Annex III, the measures referred to in paragraph 3 of this Article shall be such as to ensure that, in addition, no action or decision is taken by the deployer on the basis of the identification resulting from the system unless that identification has been separately verified and confirmed by at least two natural persons with the necessary competence, training and authority. The requirement for a separate verification by at least two natural persons shall not apply to high-risk AI systems used for the purposes of law enforcement, migration, border control or asylum, where Union or national law considers the application of this requirement to be disproportionate."}, {"color": "#2B6CB0", "id": "REG-083", "label": "REG-083", "shape": "dot", "size": 20, "title": "id: REG-083\narticle: 15\nnode_type: Provision\nparagraph: 1\nsystem_name: Art15(1)\ntext: High-risk AI systems shall be designed and developed in such a way that they achieve an appropriate level of accuracy, robustness, and cybersecurity, and that they perform consistently in those respects throughout their lifecycle."}, {"color": "#C53030", "id": "Art15", "label": "Art15", "shape": "dot", "size": 28, "title": "id: Art15\narticle_number: 15\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-084", "label": "REG-084", "shape": "dot", "size": 20, "title": "id: REG-084\narticle: 15\nnode_type: Provision\nparagraph: 2\nsystem_name: Art15(2)\ntext: To address the technical aspects of how to measure the appropriate levels of accuracy and robustness set out in paragraph 1 and any other relevant performance metrics, the Commission shall, in cooperation with relevant stakeholders and organisations such as metrology and benchmarking authorities, encourage, as appropriate, the development of benchmarks and measurement methodologies."}, {"color": "#2B6CB0", "id": "REG-085", "label": "REG-085", "shape": "dot", "size": 20, "title": "id: REG-085\narticle: 15\nnode_type: Provision\nparagraph: 3\nsystem_name: Art15(3)\ntext: The levels of accuracy and the relevant accuracy metrics of high-risk AI systems shall be declared in the accompanying instructions of use."}, {"color": "#2B6CB0", "id": "REG-086", "label": "REG-086", "shape": "dot", "size": 20, "title": "id: REG-086\narticle: 15\nnode_type: Provision\nparagraph: 4\nsystem_name: Art15(4)\ntext: High-risk AI systems shall be as resilient as possible regarding errors, faults The robustness of high-risk AI systems may be achieved through technical redundancy solutions, which may include backup or fail-safe plans. High-risk AI systems that continue to learn after being placed on the market or put into service shall be developed in such a way as to eliminate or reduce as far as possible the risk of possibly biased outputs influencing input for future operations (feedback loops), and as to ensure that any such feedback loops are duly addressed with appropriate mitigation measures."}, {"color": "#2B6CB0", "id": "REG-087", "label": "REG-087", "shape": "dot", "size": 20, "title": "id: REG-087\narticle: 15\nnode_type: Provision\nparagraph: 4\nsystem_name: Art15(4)\ntext: or inconsistencies that may occur within the system or the environment in which the system operates, in particular due to their interaction with natural persons or other systems."}, {"color": "#2B6CB0", "id": "REG-088", "label": "REG-088", "shape": "dot", "size": 20, "title": "id: REG-088\narticle: 15\nnode_type: Provision\nparagraph: 4\nsystem_name: Art15(4)\ntext: Technical and organisational measures shall be taken in this regard."}, {"color": "#2B6CB0", "id": "REG-089", "label": "REG-089", "shape": "dot", "size": 20, "title": "id: REG-089\narticle: 15\nnode_type: Provision\nparagraph: 5\nsystem_name: Art15(5)\ntext: High-risk AI systems shall be resilient against attempts by unauthorised third parties to alter their use, outputs or performance by exploiting system vulnerabilities. The technical solutions aiming to ensure the cybersecurity of high-risk AI systems shall be appropriate to the relevant circumstances and the risks. The technical solutions to address AI specific vulnerabilities shall include, where appropriate, measures to prevent, detect, respond to, resolve and control for attacks trying to manipulate the training data set (data poisoning), or pre-trained components used in training (model poisoning), inputs designed to cause the AI model to make a mistake (adversarial examples or model evasion), confidentiality attacks or model flaws."}, {"color": "#C53030", "id": "Art72", "label": "Art72", "shape": "dot", "size": 28, "title": "id: Art72\narticle_number: 72\nnode_type: Article"}, {"color": "#C53030", "id": "Art60", "label": "Art60", "shape": "dot", "size": 28, "title": "id: Art60\narticle_number: 60\nnode_type: Article"}, {"color": "#C53030", "id": "Art97", "label": "Art97", "shape": "dot", "size": 28, "title": "id: Art97\narticle_number: 97\nnode_type: Article"}, {"color": "#C53030", "id": "Art12", "label": "Art12", "shape": "dot", "size": 28, "title": "id: Art12\narticle_number: 12\nnode_type: Article"}]);
