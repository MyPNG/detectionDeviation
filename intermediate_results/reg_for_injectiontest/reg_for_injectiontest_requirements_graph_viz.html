cessor or the recipient of the personal data in the third country or international organisation; or"}, {"color": "#2B6CB0", "id": "REG-202", "label": "REG-202", "shape": "dot", "size": 20, "title": "id: REG-202\narticle: 46\nnode_type: Provision\nparagraph: 3(b)\nsystem_name: Art46(3(b))\ntext: Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph 1 may also be provided for, in particular, by: (b) provisions to be inserted into administrative arrangements between public authorities or bodies which include enforceable and effective data subject rights."}, {"color": "#2B6CB0", "id": "REG-203", "label": "REG-203", "shape": "dot", "size": 20, "title": "id: REG-203\narticle: 46\nnode_type: Provision\nparagraph: 4\nsystem_name: Art46(4)\ntext: The supervisory authority shall apply the consistency mechanism referred to in Article 63 in the cases referred to in paragraph 3 of this Article."}, {"color": "#2B6CB0", "id": "REG-204", "label": "REG-204", "shape": "dot", "size": 20, "title": "id: REG-204\narticle: 46\nnode_type: Provision\nparagraph: 5\nsystem_name: Art46(5)\ntext: Authorisations by a Member State or supervisory authority on the basis of Article 26(2) of Directive 95/46/EC shall remain valid until amended, replaced or repealed, if necessary, by that supervisory authority."}, {"color": "#2B6CB0", "id": "REG-205", "label": "REG-205", "shape": "dot", "size": 20, "title": "id: REG-205\narticle: 46\nnode_type: Provision\nparagraph: 5\nsystem_name: Art46(5)\ntext: Decisions adopted by the Commission on the basis of Article 26(4) of Directive 95/46/EC shall remain in force until amended, replaced or repealed, if necessary, by a Commission Decision adopted in accordance with paragraph 2 of this Article."}, {"color": "#2B6CB0", "id": "REG-206", "label": "REG-206", "shape": "dot", "size": 20, "title": "id: REG-206\narticle: 49\nnode_type: Provision\nparagraph: 1\nsystem_name: Art49(1)\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions:"}, {"color": "#C53030", "id": "Art49", "label": "Art49", "shape": "dot", "size": 28, "title": "id: Art49\narticle_number: 49\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-207", "label": "REG-207", "shape": "dot", "size": 20, "title": "id: REG-207\narticle: 49\nnode_type: Provision\nparagraph: 1(a)\nsystem_name: Art49(1(a))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (a) the data subject has explicitly consented to the proposed transfer, after having been informed of the possible risks of such transfers for the data subject due to the absence of an adequacy decision and appropriate safeguards;"}, {"color": "#2B6CB0", "id": "REG-208", "label": "REG-208", "shape": "dot", "size": 20, "title": "id: REG-208\narticle: 49\nnode_type: Provision\nparagraph: 1(b)\nsystem_name: Art49(1(b))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (b) the transfer is necessary for the performance of a contract between the data subject and the controller or the implementation of pre-contractual measures taken at the data subject\u0027s request;"}, {"color": "#2B6CB0", "id": "REG-209", "label": "REG-209", "shape": "dot", "size": 20, "title": "id: REG-209\narticle: 49\nnode_type: Provision\nparagraph: 1(c)\nsystem_name: Art49(1(c))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (c) the transfer is necessary for the conclusion or performance of a contract concluded in the interest of the data subject between the controller and another natural or legal person;"}, {"color": "#2B6CB0", "id": "REG-210", "label": "REG-210", "shape": "dot", "size": 20, "title": "id: REG-210\narticle: 49\nnode_type: Provision\nparagraph: 1(d)\nsystem_name: Art49(1(d))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (d) the transfer is necessary for important reasons of public interest;"}, {"color": "#2B6CB0", "id": "REG-211", "label": "REG-211", "shape": "dot", "size": 20, "title": "id: REG-211\narticle: 49\nnode_type: Provision\nparagraph: 1(e)\nsystem_name: Art49(1(e))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (e) the transfer is necessary for the establishment, exercise or defence of legal claims;"}, {"color": "#2B6CB0", "id": "REG-212", "label": "REG-212", "shape": "dot", "size": 20, "title": "id: REG-212\narticle: 49\nnode_type: Provision\nparagraph: 1(f)\nsystem_name: Art49(1(f))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (f) the transfer is necessary in order to protect the vital interests of the data subject or of other persons, where the data subject is physically or legally incapable of giving consent;"}, {"color": "#2B6CB0", "id": "REG-213", "label": "REG-213", "shape": "dot", "size": 20, "title": "id: REG-213\narticle: 49\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art49(1(g))\ntext: In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an in\u00ad ternational organisation shall take place only on one of the following conditions: (g) the transfer is made from a register which according to Union or Member State law is intended to provide information to the public and which is open to consultation either by the public in general Where a transfer could not be based on a provision in Article 45 or 46, including the provisions on binding corporate rules, and none of the derogations for a specific situation referred to in the first subparagraph of this paragraph is applicable, a transfer to a third country or an international organisation may take place only if the transfer is not repetitive, concerns only a limited number of data subjects, is necessary for the purposes of compelling legitimate interests pursued by the controller which are not overridden by the interests or rights and freedoms of the data subject, and the controller has assessed all the circumstances surrounding the data transfer and has on the basis of that assessment provided suitable safeguards with regard to the protection of personal data. The controller shall inform the supervisory authority of the transfer. The controller shall, in addition to providing the information referred to in Articles 13 and 14, inform the data subject of the transfer and on the compelling legitimate interests pursued."}, {"color": "#2B6CB0", "id": "REG-214", "label": "REG-214", "shape": "dot", "size": 20, "title": "id: REG-214\narticle: 49\nnode_type: Provision\nparagraph: 1(g)\nsystem_name: Art49(1(g))\ntext: or by any person who can demonstrate a legitimate interest, but only to the extent that the conditions laid down by Union or Member State law for consultation are fulfilled in the particular case."}, {"color": "#2B6CB0", "id": "REG-215", "label": "REG-215", "shape": "dot", "size": 20, "title": "id: REG-215\narticle: 49\nnode_type: Provision\nparagraph: 2\nsystem_name: Art49(2)\ntext: A transfer pursuant to point (g) of the first subparagraph of paragraph 1 shall not involve the entirety of the personal data or entire categories of the personal data contained in the register."}, {"color": "#2B6CB0", "id": "REG-216", "label": "REG-216", "shape": "dot", "size": 20, "title": "id: REG-216\narticle: 49\nnode_type: Provision\nparagraph: 2\nsystem_name: Art49(2)\ntext: Where the register is intended for consultation by persons having a legitimate interest, the transfer shall be made only at the request of those persons or if they are to be the recipients."}, {"color": "#2B6CB0", "id": "REG-217", "label": "REG-217", "shape": "dot", "size": 20, "title": "id: REG-217\narticle: 49\nnode_type: Provision\nparagraph: 3\nsystem_name: Art49(3)\ntext: Points (a), (b) and (c) of the first subparagraph of paragraph 1 and the second subparagraph thereof shall not apply to activities carried out by public authorities in the exercise of their public powers."}, {"color": "#2B6CB0", "id": "REG-218", "label": "REG-218", "shape": "dot", "size": 20, "title": "id: REG-218\narticle: 49\nnode_type: Provision\nparagraph: 4\nsystem_name: Art49(4)\ntext: The public interest referred to in point (d) of the first subparagraph of paragraph 1 shall be recognised in Union law or in the law of the Member State to which the controller is subject."}, {"color": "#2B6CB0", "id": "REG-219", "label": "REG-219", "shape": "dot", "size": 20, "title": "id: REG-219\narticle: 49\nnode_type: Provision\nparagraph: 5\nsystem_name: Art49(5)\ntext: In the absence of an adequacy decision, Union or Member State law may, for important reasons of public interest, expressly set limits to the transfer of specific categories of personal data to a third country or an international organisation."}, {"color": "#2B6CB0", "id": "REG-220", "label": "REG-220", "shape": "dot", "size": 20, "title": "id: REG-220\narticle: 49\nnode_type: Provision\nparagraph: 5\nsystem_name: Art49(5)\ntext: Member States shall notify such provisions to the Commission."}, {"color": "#2B6CB0", "id": "REG-221", "label": "REG-221", "shape": "dot", "size": 20, "title": "id: REG-221\narticle: 49\nnode_type: Provision\nparagraph: 6\nsystem_name: Art49(6)\ntext: The controller or processor shall document the assessment as well as the suitable safeguards referred to in the second subparagraph of paragraph 1 of this Article in the records referred to in Article 30."}, {"color": "#2B6CB0", "id": "REG-222", "label": "REG-222", "shape": "dot", "size": 20, "title": "id: REG-222\narticle: 55\nnode_type: Provision\nparagraph: 1\nsystem_name: Art55(1)\ntext: Each supervisory authority shall be competent for the performance of the tasks assigned to and the exercise of the powers conferred on it in accordance with this Regulation on the territory of its own Member State."}, {"color": "#C53030", "id": "Art55", "label": "Art55", "shape": "dot", "size": 28, "title": "id: Art55\narticle_number: 55\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-223", "label": "REG-223", "shape": "dot", "size": 20, "title": "id: REG-223\narticle: 55\nnode_type: Provision\nparagraph: 2\nsystem_name: Art55(2)\ntext: Where processing is carried out by public authorities or private bodies acting on the basis of point (c) or (e) of Article 6(1), the supervisory authority of the Member State concerned shall be competent. In such cases Article 56 does not apply."}, {"color": "#2B6CB0", "id": "REG-224", "label": "REG-224", "shape": "dot", "size": 20, "title": "id: REG-224\narticle: 55\nnode_type: Provision\nparagraph: 3\nsystem_name: Art55(3)\ntext: Supervisory authorities shall not be competent to supervise processing operations of courts acting in their judicial capacity."}, {"color": "#2B6CB0", "id": "REG-225", "label": "REG-225", "shape": "dot", "size": 20, "title": "id: REG-225\narticle: 89\nnode_type: Provision\nparagraph: 1\nsystem_name: Art89(1)\ntext: Processing for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, shall be subject to appropriate safeguards, in accordance with this Regulation, for the rights and freedoms of the data subject. order to ensure respect for the principle of data minimisation. Those measures may include pseudonymisation provided that those purposes can be fulfilled in that manner. Where those purposes can be fulfilled by further processing which does not permit or no longer permits the identification of data subjects, those purposes shall be fulfilled in that manner."}, {"color": "#C53030", "id": "Art89", "label": "Art89", "shape": "dot", "size": 28, "title": "id: Art89\narticle_number: 89\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-226", "label": "REG-226", "shape": "dot", "size": 20, "title": "id: REG-226\narticle: 89\nnode_type: Provision\nparagraph: 1\nsystem_name: Art89(1)\ntext: Those safeguards shall ensure that technical and organisational measures are in place in particular in"}, {"color": "#2B6CB0", "id": "REG-227", "label": "REG-227", "shape": "dot", "size": 20, "title": "id: REG-227\narticle: 89\nnode_type: Provision\nparagraph: 2\nsystem_name: Art89(2)\ntext: Where personal data are processed for scientific or historical research purposes or statistical purposes, Union or Member State law may provide for derogations from the rights referred to in Articles 15, 16, 18 and 21 subject to the conditions and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes."}, {"color": "#2B6CB0", "id": "REG-228", "label": "REG-228", "shape": "dot", "size": 20, "title": "id: REG-228\narticle: 89\nnode_type: Provision\nparagraph: 3\nsystem_name: Art89(3)\ntext: Where personal data are processed for archiving purposes in the public interest, Union or Member State law may provide for derogations from the rights referred to in Articles 15, 16, 18, 19, 20 and 21 subject to the conditions and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes."}, {"color": "#2B6CB0", "id": "REG-229", "label": "REG-229", "shape": "dot", "size": 20, "title": "id: REG-229\narticle: 89\nnode_type: Provision\nparagraph: 4\nsystem_name: Art89(4)\ntext: Where processing referred to in paragraphs 2 and 3 serves at the same time another purpose, the derogations shall apply only to processing for the purposes referred to in those paragraphs."}, {"color": "#2B6CB0", "id": "REG-230", "label": "REG-230", "shape": "dot", "size": 20, "title": "id: REG-230\narticle: 92\nnode_type: Provision\nparagraph: 1\nsystem_name: Art92(1)\ntext: The power to adopt delegated acts is conferred on the Commission subject to the conditions laid down in this Article."}, {"color": "#C53030", "id": "Art92", "label": "Art92", "shape": "dot", "size": 28, "title": "id: Art92\narticle_number: 92\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-231", "label": "REG-231", "shape": "dot", "size": 20, "title": "id: REG-231\narticle: 92\nnode_type: Provision\nparagraph: 2\nsystem_name: Art92(2)\ntext: The delegation of power referred to in Article 12(8) and Article 43(8) shall be conferred on the Commission for an indeterminate period of time from 24 May 2016."}, {"color": "#2B6CB0", "id": "REG-232", "label": "REG-232", "shape": "dot", "size": 20, "title": "id: REG-232\narticle: 92\nnode_type: Provision\nparagraph: 3\nsystem_name: Art92(3)\ntext: The delegation of power referred to in Article 12(8) and Article 43(8) may be revoked at any time by the European Parliament or by the Council."}, {"color": "#2B6CB0", "id": "REG-233", "label": "REG-233", "shape": "dot", "size": 20, "title": "id: REG-233\narticle: 92\nnode_type: Provision\nparagraph: 3\nsystem_name: Art92(3)\ntext: A decision of revocation shall put an end to the delegation of power specified in that decision."}, {"color": "#2B6CB0", "id": "REG-234", "label": "REG-234", "shape": "dot", "size": 20, "title": "id: REG-234\narticle: 92\nnode_type: Provision\nparagraph: 3\nsystem_name: Art92(3)\ntext: A decision of revocation shall take effect the day following that of its publication in the Official Journal of the European Union or at a later date specified therein."}, {"color": "#2B6CB0", "id": "REG-235", "label": "REG-235", "shape": "dot", "size": 20, "title": "id: REG-235\narticle: 92\nnode_type: Provision\nparagraph: 3\nsystem_name: Art92(3)\ntext: A decision of revocation shall not affect the validity of any delegated acts already in force."}, {"color": "#2B6CB0", "id": "REG-236", "label": "REG-236", "shape": "dot", "size": 20, "title": "id: REG-236\narticle: 92\nnode_type: Provision\nparagraph: 4\nsystem_name: Art92(4)\ntext: As soon as it adopts a delegated act, the Commission shall notify it simultaneously to the European Parliament and to the Council."}, {"color": "#2B6CB0", "id": "REG-237", "label": "REG-237", "shape": "dot", "size": 20, "title": "id: REG-237\narticle: 92\nnode_type: Provision\nparagraph: 5\nsystem_name: Art92(5)\ntext: A delegated act adopted pursuant to Article 12(8) and Article 43(8) shall enter into force only if no objection has been expressed by either the European Parliament or the Council within a period of three months of notification of that act to the European Parliament and the Council or if, before the expiry of that period, the European Parliament and the Council have both informed the Commission that they will not object."}, {"color": "#2B6CB0", "id": "REG-238", "label": "REG-238", "shape": "dot", "size": 20, "title": "id: REG-238\narticle: 92\nnode_type: Provision\nparagraph: 5\nsystem_name: Art92(5)\ntext: That period shall be extended by three months at the initiative of the European Parliament or of the Council."}, {"color": "#C53030", "id": "Art23", "label": "Art23", "shape": "dot", "size": 28, "title": "id: Art23\narticle_number: 23\nnode_type: Article"}, {"color": "#C53030", "id": "Art10", "label": "Art10", "shape": "dot", "size": 28, "title": "id: Art10\narticle_number: 10\nnode_type: Article"}, {"color": "#C53030", "id": "Art47", "label": "Art47", "shape": "dot", "size": 28, "title": "id: Art47\narticle_number: 47\nnode_type: Article"}, {"color": "#C53030", "id": "Art8", "label": "Art8", "shape": "dot", "size": 28, "title": "id: Art8\narticle_number: 8\nnode_type: Article"}, {"color": "#C53030", "id": "Art32", "label": "Art32", "shape": "dot", "size": 28, "title": "id: Art32\narticle_number: 32\nnode_type: Article"}, {"color": "#C53030", "id": "Art45", "label": "Art45", "shape": "dot", "size": 28, "title": "id: Art45\narticle_number: 45\nnode_type: Article"}, {"color": "#C53030", "id": "Art93", "label": "Art93", "shape": "dot", "size": 28, "title": "id: Art93\narticle_number: 93\nnode_type: Article"}, {"color": "#C53030", "id": "Art40", "label": "Art40", "shape": "dot", "size": 28, "title": "id: Art                   var options = {"physics": {"enabled": true, "solver": "barnesHut", "barnesHut": {"gravitationalConstant": -8000, "springLength": 180}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  
                      network.on("stabilizationProgress", function(params) {
                          document.getElementById('loadingBar').removeAttribute("style");
                          var maxWidth = 496;
                          var minWidth = 20;
                          var widthFactor = params.iterations/params.total;
                          var width = Math.max(minWidth,maxWidth * widthFactor);
                          document.getElementById('bar').style.width = width + 'px';
                          document.getElementById('text').innerHTML = Math.round(widthFactor*100) + '%';
                      });
                      network.once("stabilizationIterationsDone", function() {
                          document.getElementById('text').innerHTML = '100%';
                          document.getElementById('bar').style.width = '496px';
                          document.getElementById('loadingBar').style.opacity = 0;
                          // really clean the dom element
                          setTimeout(function () {document.getElementById('loadingBar').style.display = 'none';}, 500);
                      });
                  

                  return network;

              }
              drawGraph();
        </script>
    </body>
</html>
