y may prescribe, and in any event within the shorter of 15 working days, or as provided for in the relevant Union harmonisation legislation. The market surveillance authority shall inform the relevant notified body accordingly. Article 18 of Regulation (EU) 2019/1020 shall apply to the measures referred to in the second subparagraph of this paragraph."}, {"color": "#2B6CB0", "id": "REG-160", "label": "REG-160", "shape": "dot", "size": 20, "title": "id: REG-160\narticle: 79\nnode_type: Provision\nparagraph: 4\nsystem_name: Art79(4)\ntext: Where the market surveillance authority considers that the non-compliance is not restricted to its national territory, it shall inform the Commission and the other Member States without undue delay of the results of the evaluation and of the actions which it has required the operator to take."}, {"color": "#2B6CB0", "id": "REG-161", "label": "REG-161", "shape": "dot", "size": 20, "title": "id: REG-161\narticle: 79\nnode_type: Provision\nparagraph: 5\nsystem_name: Art79(5)\ntext: The operator shall ensure that all appropriate corrective action is taken in respect of all the AI systems concerned that it has made available on the Union market."}, {"color": "#2B6CB0", "id": "REG-162", "label": "REG-162", "shape": "dot", "size": 20, "title": "id: REG-162\narticle: 79\nnode_type: Provision\nparagraph: 6\nsystem_name: Art79(6)\ntext: Where the operator of an AI system does not take adequate corrective action within the period referred to in paragraph 2, the market surveillance authority shall take all appropriate provisional measures to prohibit or restrict the AI system\u0027s being made available on its national market or put into service, to withdraw the product or the standalone AI system from that market or to recall it."}, {"color": "#2B6CB0", "id": "REG-163", "label": "REG-163", "shape": "dot", "size": 20, "title": "id: REG-163\narticle: 79\nnode_type: Provision\nparagraph: 6\nsystem_name: Art79(6)\ntext: That authority shall without undue delay notify the Commission and the other Member States of those measures."}, {"color": "#2B6CB0", "id": "REG-164", "label": "REG-164", "shape": "dot", "size": 20, "title": "id: REG-164\narticle: 79\nnode_type: Provision\nparagraph: 7\nsystem_name: Art79(7)\ntext: The notification referred to in paragraph 5 shall include all available details, in particular the information necessary for the identification of the non-compliant AI system, the origin of the AI system and the supply chain, the nature of the non-compliance alleged and the risk involved, the nature and duration of the national measures taken and the arguments put forward by the relevant operator."}, {"color": "#2B6CB0", "id": "REG-165", "label": "REG-165", "shape": "dot", "size": 20, "title": "id: REG-165\narticle: 79\nnode_type: Provision\nparagraph: 7\nsystem_name: Art79(7)\ntext: In particular, the market surveillance authorities shall indicate whether the non-compliance is due to one or more of the following:"}, {"color": "#2B6CB0", "id": "REG-166", "label": "REG-166", "shape": "dot", "size": 20, "title": "id: REG-166\narticle: 79\nnode_type: Provision\nparagraph: 7(a)\nsystem_name: Art79(7(a))\ntext: In particular, the market surveillance authorities shall indicate whether the non-compliance is due to one or more of the following: (a) non-compliance with the prohibition of the AI practices referred to in Article 5;"}, {"color": "#2B6CB0", "id": "REG-167", "label": "REG-167", "shape": "dot", "size": 20, "title": "id: REG-167\narticle: 79\nnode_type: Provision\nparagraph: 7(b)\nsystem_name: Art79(7(b))\ntext: In particular, the market surveillance authorities shall indicate whether the non-compliance is due to one or more of the following: (b) a failure of a high-risk AI system to meet requirements set out in Chapter III, Section 2;"}, {"color": "#2B6CB0", "id": "REG-168", "label": "REG-168", "shape": "dot", "size": 20, "title": "id: REG-168\narticle: 79\nnode_type: Provision\nparagraph: 7(c)\nsystem_name: Art79(7(c))\ntext: In particular, the market surveillance authorities shall indicate whether the non-compliance is due to one or more of the following: (c) shortcomings in the harmonised standards or common specifications referred to in Articles 40 and 41 conferring a presumption of conformity;"}, {"color": "#2B6CB0", "id": "REG-169", "label": "REG-169", "shape": "dot", "size": 20, "title": "id: REG-169\narticle: 79\nnode_type: Provision\nparagraph: 7(d)\nsystem_name: Art79(7(d))\ntext: In particular, the market surveillance authorities shall indicate whether the non-compliance is due to one or more of the following: (d) non-compliance with Article 50."}, {"color": "#2B6CB0", "id": "REG-170", "label": "REG-170", "shape": "dot", "size": 20, "title": "id: REG-170\narticle: 79\nnode_type: Provision\nparagraph: 8\nsystem_name: Art79(8)\ntext: The market surveillance authorities other than the market surveillance authority of the Member State initiating the procedure shall, without undue delay, inform the Commission and the other Member States of any measures adopted and of any additional information at their disposal relating to the non-compliance of the AI system concerned, and, in the event of disagreement with the notified national measure, of their objections."}, {"color": "#2B6CB0", "id": "REG-171", "label": "REG-171", "shape": "dot", "size": 20, "title": "id: REG-171\narticle: 79\nnode_type: Provision\nparagraph: 9\nsystem_name: Art79(9)\ntext: Where, within three months of receipt of the notification referred to in paragraph 5 of this Article, no objection has been raised by either a market surveillance authority of a Member State or by the Commission in respect of a provisional measure taken by a market surveillance authority of another Member State, that measure shall be deemed justified."}, {"color": "#2B6CB0", "id": "REG-172", "label": "REG-172", "shape": "dot", "size": 20, "title": "id: REG-172\narticle: 79\nnode_type: Provision\nparagraph: 9\nsystem_name: Art79(9)\ntext: three months shall be without prejudice to the procedural rights of the concerned operator in accordance with Article 18 of Regulation (EU) 2019/1020."}, {"color": "#2B6CB0", "id": "REG-173", "label": "REG-173", "shape": "dot", "size": 20, "title": "id: REG-173\narticle: 79\nnode_type: Provision\nparagraph: 9\nsystem_name: Art79(9)\ntext: The three-month period referred to in this paragraph shall be reduced to 30 days in the event of non-compliance with the prohibition of the AI practices referred to in Article 5 of this Regulation."}, {"color": "#2B6CB0", "id": "REG-174", "label": "REG-174", "shape": "dot", "size": 20, "title": "id: REG-174\narticle: 79\nnode_type: Provision\nparagraph: 10\nsystem_name: Art79(10)\ntext: The market surveillance authorities shall ensure that appropriate restrictive measures are taken in respect of the product or the AI system concerned, such as withdrawal of the product or the AI system from their market, without undue delay."}, {"color": "#2B6CB0", "id": "REG-175", "label": "REG-175", "shape": "dot", "size": 20, "title": "id: REG-175\narticle: 97\nnode_type: Provision\nparagraph: 1\nsystem_name: Art97(1)\ntext: The power to adopt delegated acts is conferred on the Commission subject to the conditions laid down in this Article."}, {"color": "#C53030", "id": "Art97", "label": "Art97", "shape": "dot", "size": 28, "title": "id: Art97\narticle_number: 97\nnode_type: Article"}, {"color": "#2B6CB0", "id": "REG-176", "label": "REG-176", "shape": "dot", "size": 20, "title": "id: REG-176\narticle: 97\nnode_type: Provision\nparagraph: 2\nsystem_name: Art97(2)\ntext: The power to adopt delegated acts referred to in Article 6(6) and (7), Article 7(1) and (3), Article 11(3), Article 43(5) and (6), Article 47(5), Article 51(3), Article 52(4) and Article 53(5) and (6) shall be conferred on the Commission for a period of five years from 1 August 2024."}, {"color": "#2B6CB0", "id": "REG-177", "label": "REG-177", "shape": "dot", "size": 20, "title": "id: REG-177\narticle: 97\nnode_type: Provision\nparagraph: 2\nsystem_name: Art97(2)\ntext: The Commission shall draw up a report in respect of the delegation of power not later than nine months before the end of the five-year period."}, {"color": "#2B6CB0", "id": "REG-178", "label": "REG-178", "shape": "dot", "size": 20, "title": "id: REG-178\narticle: 97\nnode_type: Provision\nparagraph: 2\nsystem_name: Art97(2)\ntext: The delegation of power shall be tacitly extended for periods of an identical duration, unless the European Parliament or the Council opposes such extension not later than three months before the end of each period."}, {"color": "#2B6CB0", "id": "REG-179", "label": "REG-179", "shape": "dot", "size": 20, "title": "id: REG-179\narticle: 97\nnode_type: Provision\nparagraph: 3\nsystem_name: Art97(3)\ntext: The delegation of power referred to in Article 6(6) and (7), Article 7(1) and (3), Article 11(3), Article 43(5) and (6), Article 47(5), Article 51(3), Article 52(4) and Article 53(5) and (6) may be revoked at any time by the European Parliament or by the Council."}, {"color": "#2B6CB0", "id": "REG-180", "label": "REG-180", "shape": "dot", "size": 20, "title": "id: REG-180\narticle: 97\nnode_type: Provision\nparagraph: 3\nsystem_name: Art97(3)\ntext: A decision of revocation shall put an end to the delegation of power specified in that decision."}, {"color": "#2B6CB0", "id": "REG-181", "label": "REG-181", "shape": "dot", "size": 20, "title": "id: REG-181\narticle: 97\nnode_type: Provision\nparagraph: 3\nsystem_name: Art97(3)\ntext: A decision of revocation shall take effect the day following that of its publication in the Official Journal of the European Union or at a later date specified therein."}, {"color": "#2B6CB0", "id": "REG-182", "label": "REG-182", "shape": "dot", "size": 20, "title": "id: REG-182\narticle: 97\nnode_type: Provision\nparagraph: 3\nsystem_name: Art97(3)\ntext: A decision of revocation shall not affect the validity of any delegated acts already in force."}, {"color": "#2B6CB0", "id": "REG-183", "label": "REG-183", "shape": "dot", "size": 20, "title": "id: REG-183\narticle: 97\nnode_type: Provision\nparagraph: 4\nsystem_name: Art97(4)\ntext: Before adopting a delegated act, the Commission shall consult experts designated by each Member State in accordance with the principles laid down in the Interinstitutional Agreement of 13 April 2016 on Better Law-Making."}, {"color": "#2B6CB0", "id": "REG-184", "label": "REG-184", "shape": "dot", "size": 20, "title": "id: REG-184\narticle: 97\nnode_type: Provision\nparagraph: 5\nsystem_name: Art97(5)\ntext: As soon as it adopts a delegated act, the Commission shall notify it simultaneously to the European Parliament and to the Council."}, {"color": "#2B6CB0", "id": "REG-185", "label": "REG-185", "shape": "dot", "size": 20, "title": "id: REG-185\narticle: 97\nnode_type: Provision\nparagraph: 6\nsystem_name: Art97(6)\ntext: Any delegated act adopted pursuant to Article 6(6) or (7), Article 7(1) or (3), Article 11(3), Article 43(5) or (6), Article 47(5), Article 51(3), Article 52(4) or Article 53(5) or (6) shall enter into force only if no objection has been expressed by either the European Parliament or the Council within a period of three months of notification of that act to the European Parliament and the Council or if, before the expiry of that period, the European Parliament and the Council have both informed the Commission that they will not object."}, {"color": "#2B6CB0", "id": "REG-186", "label": "REG-186", "shape": "dot", "size": 20, "title": "id: REG-186\narticle: 97\nnode_type: Provision\nparagraph: 6\nsystem_name: Art97(6)\ntext: That period shall be extended by three months at the initiative of the European Parliament or of the Council."}, {"color": "#C53030", "id": "Art72", "label": "Art72", "shape": "dot", "size": 28, "title": "id: Art72\narticle_number: 72\nnode_type: Article"}, {"color": "#C53030", "id": "Art73",                   data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "barnesHut", "barnesHut": {"gravitationalConstant": -8000, "springLength": 180}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  
                      network.on("stabilizationProgress", function(params) {
                          document.getElementById('loadingBar').removeAttribute("style");
                          var maxWidth = 496;
                          var minWidth = 20;
                          var widthFactor = params.iterations/params.total;
                          var width = Math.max(minWidth,maxWidth * widthFactor);
                          document.getElementById('bar').style.width = width + 'px';
                          document.getElementById('text').innerHTML = Math.round(widthFactor*100) + '%';
                      });
                      network.once("stabilizationIterationsDone", function() {
                          document.getElementById('text').innerHTML = '100%';
                          document.getElementById('bar').style.width = '496px';
                          document.getElementById('loadingBar').style.opacity = 0;
                          // really clean the dom element
                          setTimeout(function () {document.getElementById('loadingBar').style.display = 'none';}, 500);
                      });
                  

                  return network;

              }
              drawGraph();
        </script>
    </body>
</html>
